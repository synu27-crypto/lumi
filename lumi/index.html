<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>루미 : 어반 에디션 Pro+</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212; --panel-bg: rgba(30, 30, 30, 0.95); --tile-bg: #f8f5f0;
            --accent-purple: #9d50bb; --accent-green: #27ae60; --accent-gold: #f1c40f; --accent-red: #e74c3c;
            --chat-bg: rgba(25, 25, 25, 0.95); --turn-blue: #3498db;
        }
        body { background-color: var(--bg-color); color: #e0e0e0; margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; overflow: hidden; user-select: none; }
        
        @keyframes pulse-border {
            0%, 100% { box-shadow: inset 0 0 20px rgba(52, 152, 219, 0.2); }
            50% { box-shadow: inset 0 0 60px rgba(52, 152, 219, 0.5); }
        }
        body.is-my-turn-frame { animation: pulse-border 1.5s infinite; }

        #main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        #ui-layer { padding: 10px 20px; background: var(--panel-bg); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 500; }
        
        #game-board { flex: 7; background: #1e1e1e; position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 75px; transition: filter 0.3s; }
        #game-board.not-my-turn { pointer-events: none; filter: grayscale(0.6) brightness(0.7); }

        #reg-info { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 30px; border: 1px solid var(--accent-gold); color: var(--accent-gold); font-weight: bold; font-size: 0.9rem; z-index: 800; display: none; }

        .audio-ctrl { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px; }
        #vol-slider { width: 60px; accent-color: var(--accent-gold); cursor: pointer; height: 4px; }
        #btn-bgm { background: transparent; border: none; font-size: 0.7rem; color: #fff; cursor: pointer; font-weight: bold; }

        #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: rgba(45, 45, 45, 0.95); padding: 30px; border-radius: 20px; text-align: center; min-width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        #my-rack { flex: 3; background: #151515; border-top: 1px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; z-index: 700; background: #151515; padding-bottom: 10px; }
        
        .tile { width: 44px; height: 64px; background: var(--tile-bg); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.2rem; position: absolute; cursor: grab; border: 1px solid #d1d1d1; box-shadow: 0 4px 8px rgba(0,0,0,0.4); z-index: 10; }
        .tile.rack-tile { position: relative !important; left: auto !important; top: auto !important; flex-shrink: 0; }
        .tile.locked { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
        
        .red { color: #d63031; } .blue { color: #0984e3; } .yellow { color: #f9ca24; } .black { color: #2d3434; } .joker { color: #6c5ce7; }
        
        button { padding: 6px 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 6px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; transition: 0.2s; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .active-sort { border: 1px solid #fff; background: rgba(255,255,255,0.2); color: var(--accent-gold); }
        .player-badge { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.7rem; display: flex; align-items: center; gap: 5px; }
        .is-reg-badge { border-color: var(--accent-green); color: var(--accent-green); }
    </style>
</head>
<body onclick="initAudio()">

<div id="main-container">
    <div id="ui-layer">
        <div style="flex: 2.5; display: flex; align-items: center; gap: 15px;">
            <span style="font-weight: 900; font-size: 1.1rem;">루미</span>
            <div class="audio-ctrl">
                <button id="btn-bgm" onclick="toggleBGM()">🎵 OFF</button>
                <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.2" oninput="changeVolume(this.value)">
            </div>
            <div id="player-list-container" style="display: flex; gap: 6px;"></div>
        </div>
        <div style="flex: 1.2; text-align: center;">
            <div id="turn-info" style="font-size: 0.75rem; font-weight: bold; margin-bottom: 2px;"></div>
            <button id="btn-force-next" onclick="forceNextTurn()" style="font-size: 9px; background: var(--accent-gold); color: #000; display: none;">턴 넘기기</button>
        </div>
        <div style="flex: 2; display: flex; align-items: center; gap: 8px; justify-content: flex-end;">
            <button id="btn-force-lobby" onclick="returnToLobby()" style="background:var(--accent-red); font-size:9px; display:none;">초기화</button>
            <button id="btn-start" onclick="startGame()" style="background:var(--accent-green); color:#000; display:none;">시작</button>
            <button id="btn-draw" onclick="drawTile()" disabled style="background:var(--accent-purple);">뽑기</button>
            <button id="btn-end" onclick="handleTurnEnd()" disabled style="background:#444;">종료</button>
        </div>
    </div>
    
    <div id="game-board" ondragover="event.preventDefault()" ondrop="dropOnBoard(event)">
        <div id="reg-info">등록 점수 계산 중...</div>
        <div id="overlay-layer">
            <div class="modal-card"><div id="modal-body"></div><button id="btn-reset-lobby" onclick="returnToLobby()" style="display:none; width:100%; margin-top:20px; background:var(--accent-green);">대기실로 돌아가기</button></div>
        </div>
    </div>

    <div id="my-rack" ondragover="event.preventDefault()" ondrop="dropOnRack(event)">
        <div id="rack-controls">
            <button id="sort-num" onclick="setSortMode('number')">777 숫자순</button>
            <button id="sort-col" onclick="setSortMode('color')">123 색상순</button>
            <button id="sort-man" onclick="setSortMode('manual')">🖐 수동</button>
        </div>
    </div>
</div>

<audio id="bgm-audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY",
        authDomain: "lumi-b373e.firebaseapp.com",
        databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/",
        projectId: "lumi-b373e",
        storageBucket: "lumi-b373e.firebasestorage.app",
        messagingSenderId: "171246043706",
        appId: "1:171246043706:web:3733e35f0af044974b2b03",
        measurementId: "G-Q9F1532V40"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const UI = {
        set: (id, h) => { const el = document.getElementById(id); if (el) el.innerHTML = h; },
        text: (id, t) => { const el = document.getElementById(id); if (el) el.innerText = t; },
        show: (id, d = 'inline-block') => { const el = document.getElementById(id); if (el) el.style.display = d; },
        hide: (id) => { const el = document.getElementById(id); if (el) el.style.display = 'none'; },
        disable: (id, b) => { const el = document.getElementById(id); if (el) el.disabled = b; }
    };

    let audioCtx = null, bgm = document.getElementById('bgm-audio'); bgm.volume = 0.2;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function toggleBGM() { if (bgm.paused) { bgm.play(); UI.text('btn-bgm', "🎵 ON"); } else { bgm.pause(); UI.text('btn-bgm', "🎵 OFF"); } }
    function changeVolume(v) { bgm.volume = v; }
    function playSnap() { if (!audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.setValueAtTime(600, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }

    const myName = prompt("닉네임을 입력하세요") || "게스트_" + Math.floor(Math.random()*100);
    let playerList = [], currentTurn = "", sortMode = 'color', myHandData = [], gameStatus = "waiting", boardTiles = {};
    let isRegistered = false, initialBoardState = {}, registrationPoints = 0;

    db.ref(".info/connected").on("value", snap => {
        if (snap.val()) {
            const myRef = db.ref('players/' + myName);
            myRef.once('value', s => { if (!s.exists()) myRef.set({ joined: true, timestamp: firebase.database.ServerValue.TIMESTAMP, registered: false }); });
            myRef.onDisconnect().remove();
        }
    });

    db.ref('players').on('value', snap => {
        const players = snap.val() || {};
        playerList = Object.entries(players).map(([n, d]) => ({ n, ...d })).sort((a, b) => (a.timestamp || Infinity) - (b.timestamp || Infinity)).map(p => p.n);
        const isHost = (playerList[0] === myName);
        isRegistered = players[myName]?.registered || false;

        if (isHost) { UI.show('btn-start'); UI.show('btn-force-lobby'); UI.show('btn-force-next'); } 
        else { UI.hide('btn-start'); UI.hide('btn-force-lobby'); UI.hide('btn-force-next'); }

        const listEl = document.getElementById('player-list-container');
        if (listEl) {
            listEl.innerHTML = '';
            playerList.forEach((name, idx) => {
                const reg = players[name]?.registered;
                const badge = document.createElement('span');
                badge.className = `player-badge ${idx === 0 ? 'is-host-badge' : ''} ${reg ? 'is-reg-badge' : ''}`;
                badge.innerHTML = `${idx === 0 ? '👑' : ''} ${name}${reg ? ' (등록됨)' : ''}`;
                listEl.appendChild(badge);
            });
        }
    });

    db.ref('settings/status').on('value', snap => {
        gameStatus = snap.val() || "waiting";
        if (gameStatus === "waiting") { UI.show('overlay-layer', 'flex'); UI.hide('btn-reset-lobby'); UI.set('modal-body', `<h2>대기실</h2><p>방장이 시작하기를 기다리고 있습니다.</p>`); }
        else if (gameStatus === "finished") { UI.show('overlay-layer', 'flex'); UI.show('btn-reset-lobby', 'block'); showRanking(); }
        else { UI.hide('overlay-layer'); }
    });

    db.ref('currentTurn').on('value', snap => {
        currentTurn = snap.val(); const isMy = (currentTurn === myName);
        if (isMy) { 
            document.body.classList.add('is-my-turn-frame'); 
            // 턴 시작 시 보드 상태 저장 (등록 체크용)
            db.ref('board').once('value', s => { initialBoardState = s.val() || {}; updateRegPoints(); });
        } else { 
            document.body.classList.remove('is-my-turn-frame'); 
            UI.hide('reg-info');
        }
        document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
        UI.disable('btn-draw', !isMy); UI.disable('btn-end', !isMy);
        UI.set('turn-info', isMy ? `<span style='color:var(--turn-blue)'>내 차례입니다!</span>` : `차례: ${currentTurn || '-'}`);
    });

    function renderTile(parent, id, data, isRack) {
        const div = document.createElement('div');
        const onBoard = !isRack;
        const isMineInTurn = onBoard && !initialBoardState[id]; // 이번 턴에 내가 내놓은 것
        
        // 🔒 등록 전 타일 잠금: 보드에 원래 있던 타일이고 내가 아직 등록 안 했다면 드래그 불가
        const isLocked = onBoard && !isMineInTurn && !isRegistered;
        
        div.className = `tile ${data.color} ${isRack ? 'rack-tile' : ''} ${isLocked ? 'locked' : ''}`;
        div.innerText = data.num; div.id = id; div.draggable = !isLocked;
        
        if (onBoard) { div.style.left = data.x + 'px'; div.style.top = data.y + 'px'; }
        div.ondragstart = (e) => { 
            if (isLocked || (onBoard && currentTurn !== myName)) return e.preventDefault();
            e.dataTransfer.setData("text/plain", id);
        };
        parent.appendChild(div);
    }

    function updateRegPoints() {
        if (isRegistered) return UI.hide('reg-info');
        
        const newTiles = Object.entries(boardTiles).filter(([id]) => !initialBoardState[id]);
        let points = 0;
        newTiles.forEach(([id, t]) => {
            if (t.num === 'J') points += 10; // 조커 기본 10점 (임시)
            else points += Number(t.num);
        });
        registrationPoints = points;
        UI.show('reg-info', 'block');
        UI.text('reg-info', `현재 등록 점수: ${points} / 30`);
    }

    function dropOnBoard(e) {
        e.preventDefault(); if (currentTurn !== myName) return;
        const id = e.dataTransfer.getData("text/plain");
        const rect = document.getElementById('game-board').getBoundingClientRect();
        const x = e.clientX - rect.left - 22; const y = e.clientY - rect.top - 32;
        let snapX = Math.round(x / 50) * 50 + 2, snapY = Math.round(y / 75) * 75 + 2;
        
        const tileInHand = myHandData.find(t => t.id === id);
        const tileOnBoard = boardTiles[id];
        
        if (tileInHand) {
            db.ref(`board/${id}`).set({ num: tileInHand.num, color: tileInHand.color, x: snapX, y: snapY });
            db.ref(`hands/${myName}/${id}`).remove(); playSnap();
        } else if (tileOnBoard) {
            db.ref(`board/${id}`).update({ x: snapX, y: snapY }); playSnap();
        }
    }

    function dropOnRack(e) {
        e.preventDefault(); const id = e.dataTransfer.getData("text/plain");
        // 등록 전에는 내가 방금 내놓은 타일만 다시 회수 가능
        if (!isRegistered && initialBoardState[id]) return; 
        
        db.ref(`board/${id}`).once('value', s => {
            if (s.exists() && currentTurn === myName) {
                db.ref(`hands/${myName}/${id}`).set({ num: s.val().num, color: s.val().color });
                db.ref(`board/${id}`).remove(); playSnap();
            }
        });
    }

    function validateBoard() {
        const groups = []; const rows = {};
        Object.values(boardTiles).forEach(t => { const y = Math.round(t.y / 75); if (!rows[y]) rows[y] = []; rows[y].push(t); });
        for (let y in rows) {
            const row = rows[y].sort((a, b) => a.x - b.x); let cur = [row[0]];
            for (let i = 1; i < row.length; i++) { if (row[i].x - row[i-1].x <= 60) cur.push(row[i]); else { groups.push(cur); cur = [row[i]]; } }
            groups.push(cur);
        }

        // 등록 전이라면: 내가 이번 턴에 만든 세트들이 완벽한지, 그리고 그것들만 있는지 확인
        if (!isRegistered) {
            const myNewTilesCount = Object.keys(boardTiles).length - Object.keys(initialBoardState).length;
            if (myNewTilesCount === 0) return true; // 아무것도 안 내면 패스 (하지만 드로우해야함)

            // 등록 시에는 기존 타일을 건드리면 안 됨
            for (let id in initialBoardState) {
                const now = boardTiles[id];
                if (!now || now.x !== initialBoardState[id].x || now.y !== initialBoardState[id].y) {
                    alert("등록 전에는 기존 타일을 건드릴 수 없습니다!");
                    return false;
                }
            }
        }

        for (let g of groups) {
            if (g.length < 3) return false;
            const nz = g.filter(t => t.num !== 'J'); if (nz.length === 0) continue;
            const isG = nz.every(t => t.num === nz[0].num), isR = nz.every(t => t.color === nz[0].color);
            if (isG) { const cls = nz.map(t => t.color); if (new Set(cls).size !== cls.length || g.length > 4) return false; }
            else if (isR) {
                const s = g.map(t => t.num === 'J' ? -1 : Number(t.num)).sort((a, b) => a - b);
                let jk = s.filter(v => v === -1).length, nums = s.filter(v => v !== -1);
                for (let i=0; i<nums.length-1; i++) { const d = nums[i+1]-nums[i]; if (d===0) return false; jk -= (d-1); }
                if (jk < 0) return false;
            } else return false;
        }
        return true;
    }

    function handleTurnEnd() {
        if (!validateBoard()) return alert("조합이 규칙에 맞지 않습니다!");
        
        const newTilesCount = Object.keys(boardTiles).length - Object.keys(initialBoardState).length;
        
        if (!isRegistered && newTilesCount > 0) {
            if (registrationPoints < 30) return alert("등록 점수가 부족합니다! (최소 30점)");
            db.ref(`players/${myName}`).update({ registered: true });
            alert("축하합니다! 등록되었습니다.");
        }

        if (myHandData.length === 0 && (isRegistered || registrationPoints >= 30)) {
            db.ref('settings/status').set("finished");
        } else {
            nextTurn();
        }
    }

    function nextTurn() { const idx = (playerList.indexOf(currentTurn) + 1) % playerList.length; db.ref('currentTurn').set(playerList[idx]); }
    function forceNextTurn() { if(confirm("강제로 턴을 넘길까요?")) nextTurn(); }
    function startGame() {
        if (!confirm("게임을 시작할까요?")) return;
        db.ref('settings/status').set("preparing"); myHandData = []; db.ref('board').remove(); db.ref('hands').remove(); 
        playerList.forEach(p => db.ref(`players/${p}`).update({ registered: false }));
        let pool = []; const co = ['red', 'blue', 'yellow', 'black'];
        co.forEach(c => { for(let i=1; i<=13; i++) { for(let j=0; j<2; j++) pool.push({ num: i, color: c }); } });
        pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
        pool.sort(() => Math.random() - 0.5); db.ref('currentTurn').set(playerList[0]);
        const ups = {}; playerList.forEach(p => { for(let i=0; i<14; i++) { const t = pool.pop(), id = 'tile_' + Math.random().toString(36).substr(2,9); ups[`hands/${p}/${id}`] = t; } });
        db.ref('/').update({ ...ups, pool: Object.assign({}, pool), "settings/status": "playing" });
    }
    function drawTile() {
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("판에 낸 타일이 있으면 뽑을 수 없습니다. 타일을 회수하세요.");
        db.ref('pool').limitToFirst(1).once('value', s => {
            if (!s.exists()) return alert("타일 없음"); const key = Object.keys(s.val())[0];
            db.ref(`hands/${myName}/tile_${Date.now()}`).set(s.val()[key]); db.ref(`pool/${key}`).remove(); nextTurn();
        });
    }
    function returnToLobby() { if (confirm("리셋할까요?")) db.ref('/').update({ "settings/status": "waiting", "board": null, "hands": null, "pool": null }); }
    function showRanking() {
        db.ref('hands').once('value', s => {
            const h = s.val() || {}; let res = playerList.map(n => {
                let sum = 0; Object.values(h[n]||{}).forEach(t => sum += (t.num === 'J' ? 30 : Number(t.num)));
                return { n, sum };
            }).sort((a,b) => a.sum - b.sum);
            let html = `<h2>🎮 결과</h2><table style="width:100%">`;
            res.forEach((p, i) => html += `<tr style="${i===0?'color:var(--accent-gold)':''}"><td>${i+1}위</td><td>${p.n}</td><td>${p.sum}점</td></tr>`);
            UI.set('modal-body', html + `</table>`);
        });
    }

    db.ref('board').on('value', snap => { 
        const bEl = document.getElementById('game-board'); if(!bEl) return; 
        bEl.querySelectorAll('.tile').forEach(t => t.remove()); 
        boardTiles = snap.val() || {}; 
        for (let id in boardTiles) renderTile(bEl, id, boardTiles[id], false); 
        if (currentTurn === myName) updateRegPoints();
    });
    db.ref(`hands/${myName}`).on('value', snap => { myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val })); if(sortMode!=='manual') applyAutoSort(); renderRack(); });
    function setSortMode(m) { sortMode = m; applyAutoSort(); renderRack(); }
    function applyAutoSort() { const co = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 }; myHandData.sort((a, b) => { const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); return sortMode === 'color' ? (co[a.color] - co[b.color] || vA - vB) : (vA - vB || co[a.color] - co[b.color]); }); }
    function renderRack() { const rEl = document.getElementById('my-rack'); if(!rEl) return; rEl.querySelectorAll('.tile').forEach(el => el.remove()); const btnId = sortMode === 'number' ? 'sort-num' : sortMode === 'color' ? 'sort-col' : 'sort-man'; document.querySelectorAll('#rack-controls button').forEach(b => b.classList.toggle('active-sort', b.id === btnId)); myHandData.forEach(t => renderTile(rEl, t.id, t, true)); }
</script>
</body>
</html>
