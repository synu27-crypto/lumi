<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루미큐브 : Ver 26.3 (Validation Fix)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212; --panel-bg: rgba(30, 30, 30, 0.98); --tile-bg: #f8f5f0;
            --accent-purple: #9d50bb; --accent-green: #2ecc71; --accent-gold: #f1c40f; --accent-red: #e74c3c;
            --turn-blue: #3498db; --chat-bg: rgba(25, 25, 25, 0.98);
        }
        body { background-color: var(--bg-color); color: #e0e0e0; margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; height: 100vh; width: 100vw; overflow: hidden; user-select: none; }
        #main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        #ui-layer { height: 60px; padding: 0 20px; background: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #game-board { flex: 1; background: #1e1e1e; position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 75px; }
        #game-board.not-my-turn { pointer-events: none; opacity: 0.7; filter: brightness(0.6); }
        .tile { width: 44px; height: 64px; background: var(--tile-bg); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.3rem; border: 1px solid #d1d1d1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; cursor: grab; }
        #game-board .tile { position: absolute; }
        #my-rack .tile { position: relative; flex-shrink: 0; }
        .red { color: #d63031 !important; border-bottom: 4px solid #d63031 !important; }
        .blue { color: #0984e3 !important; border-bottom: 4px solid #0984e3 !important; }
        .yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }
        .black { color: #2d3436 !important; border-bottom: 4px solid #2d3436 !important; }
        .joker { color: #8e44ad !important; font-size: 1.7rem !important; }
        #my-rack { height: 210px; background: #151515; border-top: 2px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; background: #151515; padding-bottom: 10px; }
        button { padding: 8px 16px; font-weight: 700; cursor: pointer; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; }
        .player-badge { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52, 152, 219, 0.2) !important; }
        .tile-count { background: #fff; color: #000; padding: 1px 6px; border-radius: 5px; font-weight: 900; }
        #overlay-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: #2a2a2a; padding: 40px; border-radius: 24px; text-align: center; min-width: 400px; border: 1px solid #444; }
        .lobby-player-tag { display: inline-block; padding: 6px 12px; background: #333; border-radius: 20px; margin: 4px; font-size: 0.85rem; border: 1px solid #555; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="ui-layer">
        <div style="display: flex; align-items: center; gap: 15px; flex: 1.5;">
            <span style="font-weight: 900; font-size: 1.2rem; color: #fff;">루미큐브</span>
            <div id="player-list-container" style="display: flex; gap: 8px;"></div>
        </div>
        <div id="turn-info" style="font-weight: bold; color: var(--turn-blue); flex: 1; text-align: center;">연결 중...</div>
        <div style="display: flex; gap: 8px; flex: 1.5; justify-content: flex-end;">
            <span id="pool-badge" style="color:var(--accent-purple); font-weight:900; align-self:center; margin-right:10px;">POOL: --</span>
            <button id="btn-rollback" onclick="window.rollbackTurn()" disabled>무르기</button>
            <button id="btn-draw" onclick="window.drawTile()" disabled style="background:var(--accent-purple);">뽑기</button>
            <button id="btn-end" onclick="window.handleTurnEnd()" disabled style="background:var(--accent-green); color:#000;">종료</button>
        </div>
    </div>
    <div id="game-board" ondragover="event.preventDefault()" ondrop="window.dropOnBoard(event)">
        <div id="reg-info" style="position: absolute; top: 10px; width: 100%; text-align: center; color: var(--accent-gold); font-weight: bold; z-index: 100;"></div>
    </div>
    <div id="my-rack" ondragover="event.preventDefault()" ondrop="window.dropOnRack(event)">
        <div id="rack-controls">
            <button onclick="window.setSortMode('number')">777 숫자</button>
            <button onclick="window.setSortMode('color')">123 색상</button>
        </div>
    </div>
</div>

<div id="overlay-layer">
    <div class="modal-card" id="modal-body">
        <h2>서버 연결 중...</h2>
    </div>
</div>

<script>
    let db, myName;
    let playerList = [], currentTurn = "", sortMode = 'color', myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let isRegistered = false, initialBoardState = {};

    // --- 검증 로직 추가 ---
    function isValidSet(tiles) {
        if (tiles.length < 3) return false;

        const hasJoker = tiles.some(t => t.num === 'J');
        const nonJokers = tiles.filter(t => t.num !== 'J');

        // 1. 같은 숫자 세트 (Group: 숫자 동일, 색상 모두 다름)
        const isGroup = () => {
            const num = nonJokers[0].num;
            const colors = nonJokers.map(t => t.color);
            const uniqueColors = new Set(colors);
            return nonJokers.every(t => t.num === num) && uniqueColors.size === colors.length && tiles.length <= 4;
        };

        // 2. 연속된 숫자 세트 (Run: 색상 동일, 숫자 연속)
        const isRun = () => {
            const color = nonJokers[0].color;
            if (!nonJokers.every(t => t.color === color)) return false;
            
            // 좌표 순서대로 정렬되었으므로 조커를 포함한 숫자 흐름 파악
            // (실제 정교한 조커 로직은 복잡하지만, 여기서는 기본적인 흐름만 체크)
            let lastNum = -1;
            for(let i=0; i<tiles.length; i++) {
                if(tiles[i].num !== 'J') {
                    const currentNum = Number(tiles[i].num);
                    if(lastNum !== -1 && currentNum <= lastNum) return false; // 역전 불가
                    lastNum = currentNum;
                }
            }
            // 전체 범위 체크 (예: 1~13 범위 내)
            const first = tiles.findIndex(t => t.num !== 'J');
            const last = [...tiles].reverse().findIndex(t => t.num !== 'J');
            const startNum = Number(tiles[first].num) - first;
            const endNum = Number(nonJokers[nonJokers.length-1].num) + last;
            return startNum >= 1 && endNum <= 13;
        };

        return isGroup() || isRun();
    }

    function validateBoard() {
        const rows = {};
        Object.values(boardTiles).forEach(t => {
            if (!rows[t.y]) rows[t.y] = [];
            rows[t.y].push(t);
        });

        for (let y in rows) {
            const rowTiles = rows[y].sort((a, b) => a.x - b.x);
            let currentSet = [];
            for (let i = 0; i < rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                const nextTile = rowTiles[i + 1];
                // 타일 간격이 50px(가로 너비)보다 크면 세트가 끊긴 것으로 간주
                if (!nextTile || nextTile.x - rowTiles[i].x > 55) {
                    if (!isValidSet(currentSet)) return false;
                    currentSet = [];
                }
            }
        }
        return true;
    }
    // --- 검증 로직 끝 ---

    window.handleTurnEnd = function() {
        // 1. 보드 전체 규칙 위반 여부 확인
        if (!validateBoard()) {
            return alert("⚠️ 유효하지 않은 세트가 있습니다!\n모든 뭉치는 3개 이상이며 규칙을 따라야 합니다.");
        }

        // 2. 등록(30점) 확인
        if (!isRegistered) {
            let pts = 0;
            // 이번 턴에 내가 새로 낸 타일들만 계산 (간이 방식)
            Object.entries(boardTiles).filter(([id]) => !initialBoardState[id]).forEach(([id, t]) => {
                pts += (t.num === 'J' ? 30 : Number(t.num));
            });
            if (pts < 30) return alert(`⚠️ 등록 실패! (${pts}점)\n첫 등록은 30점 이상이어야 합니다.`);
            db.ref('players/' + myName).update({ registered: true });
        }

        // 3. 승리 조건 및 턴 넘기기
        if (myHandData.length === 0) {
            alert("축하합니다! 승리하셨습니다!");
            db.ref('settings/status').set("finished");
        } else {
            window.nextTurnAction();
        }
    };

    window.startGame = function() {
        if (playerList.length < 2) return alert("최소 2명이 필요합니다.");
        db.ref('/').once('value', snap => {
            const pool = []; const colors = ['red', 'blue', 'yellow', 'black'];
            colors.forEach(c => { for(let i=1; i<=13; i++) for(let j=0; j<2; j++) pool.push({ num: i, color: c }); });
            for(let k=0; k<2; k++) pool.push({ num: 'J', color: 'joker' });
            pool.sort(() => Math.random() - 0.5);

            const updates = {};
            updates['board'] = {}; 
            updates['currentTurn'] = playerList[0];
            updates['settings/activePlayers'] = playerList;
            updates['settings/status'] = "playing";
            
            playerList.forEach(p => {
                const initialHand = {};
                for(let i=0; i<14; i++) {
                    const t = pool.pop(); 
                    const id = 'tile_' + Math.random().toString(36).substr(2, 9);
                    initialHand[id] = t;
                }
                updates[`hands/${p}`] = initialHand;
                updates[`players/${p}/registered`] = false;
                updates[`players/${p}/tileCount`] = 14;
            });
            updates['pool'] = Object.assign({}, pool);
            db.ref('/').update(updates);
        });
    };

    window.onload = function() {
        const config = { apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY", authDomain: "lumi-b373e.firebaseapp.com", databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/", projectId: "lumi-b373e" };
        firebase.initializeApp(config); db = firebase.database();
        
        myName = window.sessionStorage.getItem('lumi-nick') || prompt("닉네임") || "유저"+Math.floor(Math.random()*100);
        window.sessionStorage.setItem('lumi-nick', myName);

        db.ref('players/' + myName).update({ joined: true, timestamp: firebase.database.ServerValue.TIMESTAMP });
        db.ref('players/' + myName).onDisconnect().remove();

        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            document.getElementById('overlay-layer').style.display = (gameStatus === "playing") ? 'none' : 'flex';
            window.renderLobbyUI();
        });

        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            playerList = Object.entries(players).filter(p => p[1].joined).sort((a,b) => (a[1].timestamp||0) - (b[1].timestamp||0)).map(p => p[0]);
            
            const listEl = document.getElementById('player-list-container');
            listEl.innerHTML = '';
            playerList.forEach(name => {
                const badge = document.createElement('span');
                badge.className = `player-badge ${name === currentTurn ? 'active-turn-badge' : ''}`;
                badge.innerHTML = `${name === (playerList[0]||'') ? '👑 ' : ''}${name} <span class="tile-count">${players[name]?.tileCount || 0}</span>`;
                listEl.appendChild(badge);
            });
            isRegistered = players[myName]?.registered || false;
            document.getElementById('reg-info').innerText = isRegistered ? "" : "첫 등록 필요 (30점 이상)";
            if (gameStatus === "waiting") window.renderLobbyUI();
        });

        db.ref('currentTurn').on('value', snap => {
            currentTurn = snap.val(); const isMy = (currentTurn === myName);
            document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
            ['btn-draw', 'btn-end', 'btn-rollback'].forEach(id => document.getElementById(id).disabled = !isMy);
            document.getElementById('turn-info').innerText = isMy ? "내 차례!" : `차례: ${currentTurn}`;
            if(isMy) initialBoardState = JSON.parse(JSON.stringify(boardTiles));
        });

        db.ref('board').on('value', snap => {
            boardTiles = snap.val() || {};
            const bEl = document.getElementById('game-board');
            bEl.querySelectorAll('.tile').forEach(t => t.remove());
            Object.entries(boardTiles).forEach(([id, data]) => {
                const div = document.createElement('div');
                div.className = `tile ${data.color}`;
                div.id = id; div.innerText = data.num; div.style.left = data.x + 'px'; div.style.top = data.y + 'px';
                div.draggable = true;
                div.ondragstart = (e) => { if (currentTurn !== myName) return e.preventDefault(); e.dataTransfer.setData("text", id); };
                bEl.appendChild(div);
            });
        });

        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            window.applyAutoSort();
        });

        db.ref('pool').on('value', snap => {
            document.getElementById('pool-badge').innerText = `POOL: ${snap.exists() ? Object.keys(snap.val()).length : 0}`;
        });
    };

    window.renderLobbyUI = function() {
        const modalBody = document.getElementById('modal-body');
        const isHost = (myName === playerList[0]);
        let playerTags = playerList.map(name => `<span class="lobby-player-tag">${name === playerList[0] ? '👑 ' : ''}${name}</span>`).join('');
        let html = `<h2 style="color:white;">🎮 루미큐브 대기실</h2>`;
        html += `<div style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">${playerTags}</div>`;
        if (isHost) html += `<button onclick="window.startGame()" style="background:var(--accent-green); color:#000; width:100%; margin-top:20px; padding:15px; font-weight:900;">게임 시작</button>`;
        else html += `<p style="color:var(--accent-gold); margin-top:20px;">방장이 게임을 시작하기를 기다리고 있습니다...</p>`;
        modalBody.innerHTML = html;
    };

    window.nextTurnAction = function() {
        db.ref('settings/activePlayers').once('value', snap => {
            const list = snap.val() || [];
            db.ref('currentTurn').set(list[(list.indexOf(currentTurn) + 1) % list.length]);
        });
    };

    window.drawTile = function() {
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("낸 패를 무르거나 종료해야 합니다.");
        db.ref('pool').limitToFirst(1).once('value', s => {
            if (!s.exists()) return window.nextTurnAction();
            const key = Object.keys(s.val())[0];
            const updates = {};
            updates[`hands/${myName}/tile_${Date.now()}`] = s.val()[key];
            updates[`pool/${key}`] = null;
            db.ref('/').update(updates).then(() => window.nextTurnAction());
        });
    };

    window.dropOnBoard = function(e) {
        e.preventDefault(); if (currentTurn !== myName) return;
        const id = e.dataTransfer.getData("text");
        const rect = document.getElementById('game-board').getBoundingClientRect();
        let snapX = Math.round((e.clientX - rect.left - 22) / 50) * 50 + 2, snapY = Math.round((e.clientY - rect.top - 32) / 75) * 75 + 2;
        const inHand = myHandData.find(t => t.id === id);
        if (inHand) {
            const updates = {};
            updates[`board/${id}`] = { num: inHand.num, color: inHand.color, x: snapX, y: snapY };
            updates[`hands/${myName}/${id}`] = null;
            db.ref('/').update(updates);
        } else if (boardTiles[id]) db.ref(`board/${id}`).update({ x: snapX, y: snapY });
    };

    window.dropOnRack = function(e) {
        e.preventDefault(); const id = e.dataTransfer.getData("text");
        db.ref(`board/${id}`).once('value', s => {
            if (s.exists()) {
                const updates = {}; updates[`hands/${myName}/${id}`] = s.val(); updates[`board/${id}`] = null;
                db.ref('/').update(updates);
            }
        });
    };

    window.setSortMode = function(m) { sortMode = m; window.applyAutoSort(); };
    window.applyAutoSort = function() {
        const coMap = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 };
        myHandData.sort((a, b) => {
            const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num);
            return sortMode === 'color' ? (coMap[a.color] - coMap[b.color] || vA - vB) : (vA - vB || coMap[a.color] - coMap[b.color]);
        });
        const rEl = document.getElementById('my-rack'); rEl.querySelectorAll('.tile').forEach(t => t.remove());
        myHandData.forEach(t => {
            const div = document.createElement('div'); div.className = `tile ${t.color}`; div.id = t.id; div.innerText = t.num;
            div.draggable = true; div.ondragstart = (e) => e.dataTransfer.setData("text", t.id); rEl.appendChild(div);
        });
    };

    window.rollbackTurn = function() { if(confirm("무를까요?")) db.ref('board').set(initialBoardState); };
</script>
</body>
</html>
