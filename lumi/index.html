<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루미큐브 : Ver 26.7 (Sound & Audio Update)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">
    <style>
        /* [Style System] 전반적인 디자인 테마 */
        :root {
            --bg-color: #121212; --panel-bg: rgba(30, 30, 30, 0.98); --tile-bg: #f8f5f0;
            --accent-purple: #9d50bb; --accent-green: #2ecc71; --accent-gold: #f1c40f; --accent-red: #e74c3c;
            --turn-blue: #3498db; --chat-bg: rgba(25, 25, 25, 0.98);
        }
        body { background-color: var(--bg-color); color: #e0e0e0; margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; height: 100vh; width: 100vw; overflow: hidden; user-select: none; }
        #main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        #ui-layer { height: 60px; padding: 0 20px; background: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #game-board { flex: 1; background: #1e1e1e; position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 75px; }
        #game-board.not-my-turn { pointer-events: none; opacity: 0.7; filter: brightness(0.6); }
        .tile { width: 44px; height: 64px; background: var(--tile-bg); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.3rem; border: 1px solid #d1d1d1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; cursor: grab; }
        #game-board .tile { position: absolute; }
        #my-rack .tile { position: relative; flex-shrink: 0; }
        .red { color: #d63031 !important; border-bottom: 4px solid #d63031 !important; }
        .blue { color: #0984e3 !important; border-bottom: 4px solid #0984e3 !important; }
        .yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }
        .black { color: #2d3436 !important; border-bottom: 4px solid #2d3436 !important; }
        .joker { color: #8e44ad !important; font-size: 1.7rem !important; }
        
        /* [Chat & Audio UI] 채팅 및 오디오 컨트롤 */
        #chat-wrapper { position: fixed; bottom: 230px; right: 20px; width: 280px; z-index: 20000; display: flex; flex-direction: column; pointer-events: none; }
        #chat-box { height: 180px; background: var(--chat-bg); backdrop-filter: blur(10px); border-radius: 12px 12px 0 0; border: 1px solid rgba(255,255,255,0.15); overflow-y: auto; padding: 10px; pointer-events: auto; display: none; font-size: 0.85rem; }
        #chat-input-container { display: none; background: #1a1a1a; border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; align-items: center; padding: 5px; gap: 5px; }
        #chat-input { flex: 1; background: transparent; border: none; padding: 8px; color: #fff; outline: none; }
        #audio-controls { display: flex; gap: 5px; align-self: flex-end; margin-top: 5px; pointer-events: auto; }
        #chat-toggle, #bgm-toggle { background: var(--accent-purple); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #bgm-toggle { background: #444; }
        #bgm-toggle.playing { background: var(--accent-green); color: #000; }

        #my-rack { height: 210px; background: #151515; border-top: 2px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; background: #151515; padding-bottom: 10px; }
        button { padding: 8px 16px; font-weight: 700; cursor: pointer; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; }
        .mode-btn { border: 1px solid #555; background: #333; margin: 0 5px; font-size: 0.8rem; }
        .mode-btn.selected { background: var(--accent-purple); border-color: #fff; }
        .player-badge { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52, 152, 219, 0.2) !important; }
        .tile-count { background: #fff; color: #000; padding: 1px 6px; border-radius: 5px; font-weight: 900; }
        #overlay-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: #2a2a2a; padding: 40px; border-radius: 24px; text-align: center; min-width: 400px; border: 1px solid #444; }
        .lobby-player-tag { display: inline-block; padding: 6px 12px; background: #333; border-radius: 20px; margin: 4px; font-size: 0.85rem; border: 1px solid #555; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="ui-layer">
        <div style="display: flex; align-items: center; gap: 15px; flex: 1.5;">
            <span style="font-weight: 900; font-size: 1.2rem; color: #fff;">루미큐브</span>
            <div id="player-list-container" style="display: flex; gap: 8px;"></div>
        </div>
        <div id="turn-info" style="font-weight: bold; color: var(--turn-blue); flex: 1; text-align: center;">연결 중...</div>
        <div style="display: flex; gap: 8px; flex: 1.5; justify-content: flex-end;">
            <button id="btn-force-lobby" onclick="window.returnToLobby()" style="background:var(--accent-red); display:none;">리셋</button>
            <button id="btn-force-next" onclick="window.forceNextTurn()" style="background:var(--accent-gold); color:#000; display:none;">강제 턴</button>
            <span id="pool-badge" style="color:var(--accent-purple); font-weight:900; align-self:center; margin-right:10px;">POOL: --</span>
            <button id="btn-rollback" onclick="window.rollbackTurn()" disabled>무르기</button>
            <button id="btn-draw" onclick="window.drawTile()" disabled style="background:var(--accent-purple);">뽑기</button>
            <button id="btn-end" onclick="window.handleTurnEnd()" disabled style="background:var(--accent-green); color:#000;">종료</button>
        </div>
    </div>
    <div id="game-board" ondragover="event.preventDefault()" ondrop="window.dropOnBoard(event)">
        <div id="reg-info" style="position: absolute; top: 10px; width: 100%; text-align: center; color: var(--accent-gold); font-weight: bold; z-index: 100;"></div>
    </div>
    <div id="chat-wrapper">
        <div id="chat-box"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="메시지..." onkeypress="if(event.keyCode==13) window.sendChat()">
        </div>
        <div id="audio-controls">
            <button id="bgm-toggle" onclick="window.toggleBGM()">🎵 BGM OFF</button>
            <button id="chat-toggle" onclick="window.toggleChat()">💬 채팅</button>
        </div>
    </div>
    <div id="my-rack" ondragover="event.preventDefault()" ondrop="window.dropOnRack(event)">
        <div id="rack-controls">
            <button onclick="window.setSortMode('number')">777 숫자</button>
            <button onclick="window.setSortMode('color')">123 색상</button>
        </div>
    </div>
</div>

<div id="overlay-layer">
    <div class="modal-card" id="modal-body"><h2>서버 연결 중...</h2></div>
</div>

<script>
    // --- [Core Variables] 핵심 변수 ---
    let db, myName, currentHost = "";
    let playerList = [], currentTurn = "", sortMode = 'color', myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let isRegistered = false, initialBoardState = {};

    // --- [Audio System] 사운드 관리 시스템 ---
    const SOUND_ASSETS = {
        bgm: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // 배경음 예시
        tilePick: "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3", // 타일 집을 때
        tileDrop: "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3", // 타일 놓을 때
        turnAlarm: "https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3", // 내 차례 알람
        error: "https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3", // 오류/등록 실패
        success: "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" // 등록 성공/승리
    };

    const audioCtx = {
        bgm: new Audio(SOUND_ASSETS.bgm),
        isBGMPlaying: false
    };
    audioCtx.bgm.loop = true;

    function playSFX(key) {
        const sfx = new Audio(SOUND_ASSETS[key]);
        sfx.volume = 0.5;
        sfx.play().catch(() => {});
    }

    window.toggleBGM = function() {
        const btn = document.getElementById('bgm-toggle');
        if (audioCtx.isBGMPlaying) {
            audioCtx.bgm.pause();
            btn.innerText = "🎵 BGM OFF";
            btn.classList.remove('playing');
        } else {
            audioCtx.bgm.play().catch(() => alert("브라우저 정책으로 인해 상호작용 후 재생 가능합니다."));
            btn.innerText = "🎶 BGM ON";
            btn.classList.add('playing');
        }
        audioCtx.isBGMPlaying = !audioCtx.isBGMPlaying;
    };

    // --- [Validation Logic] 게임 검증 로직 ---
    function isValidSet(tiles) {
        if (tiles.length < 3) return false;
        const nonJokers = tiles.filter(t => t.num !== 'J');
        if (nonJokers.length === 0) return true;
        const isGroup = () => {
            const num = nonJokers[0].num;
            const colors = nonJokers.map(t => t.color);
            return nonJokers.every(t => t.num === num) && (new Set(colors)).size === colors.length && tiles.length <= 4;
        };
        const isRun = () => {
            const color = nonJokers[0].color;
            if (!nonJokers.every(t => t.color === color)) return false;
            let lastNum = -1;
            for(let t of tiles) {
                if(t.num !== 'J') {
                    if(lastNum !== -1 && Number(t.num) <= lastNum) return false;
                    lastNum = Number(t.num);
                }
            }
            return true;
        };
        return isGroup() || isRun();
    }

    function validateBoard() {
        const rows = {};
        Object.values(boardTiles).forEach(t => { if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
        for (let y in rows) {
            const rowTiles = rows[y].sort((a,b) => a.x - b.x);
            let currentSet = [];
            for (let i=0; i<rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                    if (!isValidSet(currentSet)) return false;
                    currentSet = [];
                }
            }
        }
        return true;
    }

    // --- [Connection & Host Management] 연결 및 방장 관리 ---
    function initConnection() {
        let myTimestamp = window.sessionStorage.getItem('lumi-timestamp');
        if (!myTimestamp) {
            myTimestamp = Date.now();
            window.sessionStorage.setItem('lumi-timestamp', myTimestamp);
        }
        const playerRef = db.ref('players/' + myName);
        playerRef.update({ joined: true, timestamp: Number(myTimestamp) });
        playerRef.onDisconnect().remove();

        db.ref('settings/host').once('value', snap => {
            if (!snap.exists()) db.ref('settings/host').set(myName);
        });
        
        db.ref('settings/host').on('value', snap => {
            currentHost = snap.val();
            if (currentHost && !playerList.includes(currentHost) && playerList.length > 0) {
                db.ref('settings/host').set(playerList[0]);
            }
        });
    }

    // --- [App Lifecycle] 앱 로드 및 이벤트 바인딩 ---
    window.onload = function() {
        const config = { apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY", authDomain: "lumi-b373e.firebaseapp.com", databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/", projectId: "lumi-b373e" };
        firebase.initializeApp(config); db = firebase.database();
        
        myName = window.sessionStorage.getItem('lumi-nick') || prompt("닉네임") || "유저"+Math.floor(Math.random()*100);
        window.sessionStorage.setItem('lumi-nick', myName);

        initConnection();

        // 플레이어 리스트 갱신
        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            playerList = Object.entries(players).filter(p => p[1].joined).sort((a,b) => (a[1].timestamp||0) - (b[1].timestamp||0)).map(p => p[0]);
            
            const isHost = (myName === currentHost);
            document.getElementById('btn-force-lobby').style.display = isHost ? 'inline-block' : 'none';
            document.getElementById('btn-force-next').style.display = isHost ? 'inline-block' : 'none';
            
            const listEl = document.getElementById('player-list-container');
            listEl.innerHTML = '';
            playerList.forEach(name => {
                const badge = document.createElement('span');
                badge.className = `player-badge ${name === currentTurn ? 'active-turn-badge' : ''}`;
                badge.innerHTML = `${name === currentHost ? '👑 ' : ''}${name} <span class="tile-count">${players[name]?.tileCount || 0}</span>`;
                listEl.appendChild(badge);
            });
            isRegistered = players[myName]?.registered || false;
            document.getElementById('reg-info').innerText = isRegistered ? "" : "첫 등록 필요 (30점 이상)";
            if (gameStatus === "waiting") window.renderLobbyUI();
        });

        // 채팅 감시
        db.ref('chats').limitToLast(20).on('child_added', snap => {
            const c = snap.val();
            const div = document.createElement('div');
            div.innerHTML = `<b>${c.name}:</b> ${c.msg}`;
            const box = document.getElementById('chat-box');
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        });

        // 게임 상태 및 턴 감시
        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            document.getElementById('overlay-layer').style.display = (gameStatus === "playing") ? 'none' : 'flex';
            if (gameStatus === "waiting") window.renderLobbyUI();
            if (gameStatus === "finished") playSFX('success');
        });

        db.ref('currentTurn').on('value', snap => {
            const prevTurn = currentTurn;
            currentTurn = snap.val(); 
            const isMy = (currentTurn === myName);
            document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
            ['btn-draw', 'btn-end', 'btn-rollback'].forEach(id => document.getElementById(id).disabled = !isMy);
            document.getElementById('turn-info').innerText = isMy ? "내 차례!" : `차례: ${currentTurn}`;
            
            if(isMy) {
                initialBoardState = JSON.parse(JSON.stringify(boardTiles));
                if(prevTurn !== myName) playSFX('turnAlarm'); // 내 턴이 되면 알람
            }
        });

        // 보드판 갱신
        db.ref('board').on('value', snap => {
            boardTiles = snap.val() || {};
            const bEl = document.getElementById('game-board');
            bEl.querySelectorAll('.tile').forEach(t => t.remove());
            Object.entries(boardTiles).forEach(([id, data]) => {
                const div = document.createElement('div');
                div.className = `tile ${data.color}`; div.id = id; div.innerText = data.num; div.style.left = data.x + 'px'; div.style.top = data.y + 'px';
                div.draggable = true; 
                div.ondragstart = (e) => { 
                    if (currentTurn !== myName) return e.preventDefault(); 
                    e.dataTransfer.setData("text", id); 
                    playSFX('tilePick');
                };
                bEl.appendChild(div);
            });
        });

        // 내 패 갱신
        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            window.applyAutoSort();
        });

        db.ref('pool').on('value', snap => { document.getElementById('pool-badge').innerText = `POOL: ${snap.exists() ? Object.keys(snap.val()).length : 0}`; });
    };

    // --- [Lobby & Game Control] 로비 및 게임 제어 ---
    window.renderLobbyUI = function() {
        const modalBody = document.getElementById('modal-body');
        const isHost = (myName === currentHost);
        let playerTags = playerList.map(name => `<span class="lobby-player-tag">${name === currentHost ? '👑 ' : ''}${name}</span>`).join('');
        let html = `<h2 style="color:white;">🎮 루미큐브 대기실</h2>`;
        html += `<div style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px;">${playerTags}</div>`;
        html += `<div style="margin-bottom:20px;"><p style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">게임 모드 설정</p>
            <button class="mode-btn ${gameMode==='normal'?'selected':''}" onclick="window.setGameMode('normal')">보통 (4인)</button>
            <button class="mode-btn ${gameMode==='expert'?'selected':''}" onclick="window.setGameMode('expert')">전문가 (6인)</button></div>`;
        if (isHost) html += `<button onclick="window.startGame()" style="background:var(--accent-green); color:#000; width:100%; padding:15px; font-weight:900;">게임 시작</button>`;
        else html += `<p style="color:var(--accent-gold);">방장(${currentHost||'...'})이 모드를 설정 중입니다...</p>`;
        modalBody.innerHTML = html;
    };

    window.setGameMode = function(mode) { if (myName === currentHost) db.ref('settings/gameMode').set(mode); };
    
    window.startGame = function() {
        if (playerList.length < 2) return alert("최소 2명이 필요합니다.");
        db.ref('/').once('value', snap => {
            const pool = []; const colors = ['red', 'blue', 'yellow', 'black'];
            const sets = (gameMode === 'expert') ? 3 : 2;
            colors.forEach(c => { for(let i=1; i<=13; i++) for(let j=0; j<sets; j++) pool.push({ num: i, color: c }); });
            for(let k=0; k<(sets === 3 ? 4 : 2); k++) pool.push({ num: 'J', color: 'joker' });
            pool.sort(() => Math.random() - 0.5);
            const updates = { 'board': {}, 'currentTurn': playerList[0], 'settings/status': "playing", 'settings/activePlayers': playerList, 'chats': null };
            playerList.forEach(p => {
                const hand = {};
                for(let i=0; i<14; i++) { const t = pool.pop(); hand['tile_'+Math.random().toString(36).substr(2,9)] = t; }
                updates[`hands/${p}`] = hand; updates[`players/${p}/registered`] = false; updates[`players/${p}/tileCount`] = 14;
            });
            updates['pool'] = Object.assign({}, pool); db.ref('/').update(updates);
        });
    };

    // --- [Interaction] 상호작용 기능 ---
    window.toggleChat = function() { const box = document.getElementById('chat-box'); const input = document.getElementById('chat-input-container'); const isVisible = box.style.display === 'block'; box.style.display = isVisible ? 'none' : 'block'; input.style.display = isVisible ? 'none' : 'flex'; };
    window.sendChat = function() { const input = document.getElementById('chat-input'); if (!input.value.trim()) return; db.ref('chats').push({ name: myName, msg: input.value, time: Date.now() }); input.value = ''; };
    
    window.handleTurnEnd = function() {
        if (!validateBoard()) {
            playSFX('error');
            return alert("⚠️ 유효하지 않은 세트가 있습니다!");
        }
        if (!isRegistered) {
            let pts = 0; Object.entries(boardTiles).filter(([id]) => !initialBoardState[id]).forEach(([id, t]) => { pts += (t.num === 'J' ? 30 : Number(t.num)); });
            if (pts < 30) {
                playSFX('error');
                return alert(`등록 실패 (${pts}점)! 30점 이상 내세요.`);
            }
            playSFX('success');
            db.ref('players/' + myName).update({ registered: true });
        }
        if (myHandData.length === 0) db.ref('settings/status').set("finished"); else window.nextTurnAction();
    };

    window.returnToLobby = function() { if(confirm("초기화?")) db.ref('/').update({ "settings/status": "waiting", "board": {}, "hands": {}, "pool": {} }); };
    window.forceNextTurn = function() { if(confirm("턴 넘기기?")) window.nextTurnAction(); };
    window.nextTurnAction = function() { db.ref('settings/activePlayers').once('value', snap => { const list = snap.val() || []; db.ref('currentTurn').set(list[(list.indexOf(currentTurn) + 1) % list.length]); }); };
    
    window.drawTile = function() {
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("낸 패를 무르거나 종료해야 합니다.");
        db.ref('pool').limitToFirst(1).once('value', s => { 
            if (!s.exists()) return window.nextTurnAction(); 
            const key = Object.keys(s.val())[0]; 
            const updates = {}; 
            updates[`hands/${myName}/tile_${Date.now()}`] = s.val()[key]; 
            updates[`pool/${key}`] = null; 
            db.ref('/').update(updates).then(() => {
                playSFX('tilePick');
                window.nextTurnAction();
            }); 
        });
    };

    window.dropOnBoard = function(e) { 
        e.preventDefault(); 
        if (currentTurn !== myName) return; 
        const id = e.dataTransfer.getData("text"); 
        const rect = document.getElementById('game-board').getBoundingClientRect(); 
        let snapX = Math.round((e.clientX - rect.left - 22) / 50) * 50 + 2, snapY = Math.round((e.clientY - rect.top - 32) / 75) * 75 + 2; 
        const inHand = myHandData.find(t => t.id === id); 
        if (inHand) { 
            const updates = {}; 
            updates[`board/${id}`] = { num: inHand.num, color: inHand.color, x: snapX, y: snapY }; 
            updates[`hands/${myName}/${id}`] = null; 
            db.ref('/').update(updates); 
            playSFX('tileDrop');
        } else if (boardTiles[id]) {
            db.ref(`board/${id}`).update({ x: snapX, y: snapY }); 
            playSFX('tileDrop');
        }
    };

    window.dropOnRack = function(e) { 
        e.preventDefault(); 
        const id = e.dataTransfer.getData("text"); 
        db.ref(`board/${id}`).once('value', s => { 
            if (s.exists()) { 
                const updates = {}; 
                updates[`hands/${myName}/${id}`] = s.val(); 
                updates[`board/${id}`] = null; 
                db.ref('/').update(updates); 
                playSFX('tilePick');
            } 
        }); 
    };

    window.setSortMode = function(m) { sortMode = m; window.applyAutoSort(); };
    window.applyAutoSort = function() {
        const coMap = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 };
        myHandData.sort((a, b) => { const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); return sortMode === 'color' ? (coMap[a.color] - coMap[b.color] || vA - vB) : (vA - vB || coMap[a.color] - coMap[b.color]); });
        const rEl = document.getElementById('my-rack'); rEl.querySelectorAll('.tile').forEach(t => t.remove());
        myHandData.forEach(t => { 
            const div = document.createElement('div'); 
            div.className = `tile ${t.color}`; div.id = t.id; div.innerText = t.num; div.draggable = true; 
            div.ondragstart = (e) => {
                e.dataTransfer.setData("text", t.id);
                playSFX('tilePick');
            };
            rEl.appendChild(div); 
        });
    };
    window.rollbackTurn = function() { if(confirm("무를까요?")) db.ref('board').set(initialBoardState); };
</script>
</body>
</html>
