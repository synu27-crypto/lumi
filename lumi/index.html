        /* === 통합 테마 변수 설정 === */
:root {

    --accent-green: #2ecc71; 
    --accent-gold: #f1c40f; 
    --accent-red: #e74c3c;

body[data-theme='classic'] {

body[data-theme='dark'] {

    --chat-bg: rgba(30, 33, 36, 0.98);

}

body[data-theme='pink'] { 
    --bg-color: #fff0f5;    /* 연한 라벤더 핑크 */
    --panel-bg: #ffdae9;    /* 중간 핑크 */

}

        /* === 레이아웃 및 뼈대 === */
        body { background-color: var(--bg-color); color: var(--main-text); margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; height: 100vh; width: 100vw; overflow: hidden; user-select: none; transition: background 0.3s, color 0.3s; }
        
        #main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        #ui-layer { height: 60px; padding: 0 20px; background: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 0, 0, 0.1); transition: background 0.3s; }
        
        #game-board { flex: 1; background: var(--board-bg); position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(128,128,128,0.15) 1px, transparent 1px); background-size: 50px 75px; transition: background 0.3s; }

    border: 1px solid rgba(0,0,0,0.1);
    z-index: 10; cursor: grab; transition: transform 0.1s; 
}

/* 숫자 색상 강조 (다크모드 대응) */
.red { color: #e44d26 !important; border-bottom: 4px solid #e44d26 !important; }
.blue { color: #2980b9 !important; border-bottom: 4px solid #2980b9 !important; }
.yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }

/* ⭐ 검은색 타일: 배경이 어두워도 보이게 보정 */
.black { 
    color: var(--tile-text-black) !important; 
    border-bottom: 4px solid #333 !important; 
    /* 다크모드에서 검은 숫자가 잘 보이도록 타일 배경을 아주 살짝 밝게 유지 */
}

.joker { color: #8e44ad !important; font-size: 1.8rem !important; }

/* 선택 시 하이라이트 */
.selected-tile {

}

        /* === 채팅 및 로그 === */
        #chat-wrapper { position: fixed; bottom: 230px; right: 20px; width: 500px; z-index: 20000; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
        #chat-log-container { display: flex; gap: 5px; height: 280px; min-height: 100px; min-width: 250px; background: var(--chat-bg); color: var(--main-text); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); pointer-events: auto; display: none; resize: both; overflow: hidden; transition: background 0.3s; }
        #game-log { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.8rem; border-right: 1px solid rgba(0,0,0,0.1); }

        #log-entry { margin-bottom: 3px; font-family: monospace; }
        #log-time { color: var(--accent-gold); margin-right: 5px; }

        #chat-input-container { display: none; background: var(--rack-bg); border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); pointer-events: auto; align-items: center; padding: 5px; gap: 5px; position: relative; transition: background 0.3s; }
        #chat-input { flex: 1; background: transparent; border: none; padding: 8px; color: var(--main-text); outline: none; }

        #audio-controls { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; margin-top: 5px; pointer-events: auto; }
        #audio-buttons { display: flex; gap: 5px; }
        #chat-toggle, #bgm-toggle { background: var(--accent-purple); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
/* 버튼을 허공에 띄우고 위치를 고정하는 코드 */
#chat-toggle {
    position: fixed;

    right: 20px;   /* 오른쪽 벽에서 띄움 */

}

/* 채팅창이 버튼이랑 겹치지 않게 위로 올림 */
#chat-wrapper {
    bottom: 270px !important; 
}
        #bgm-toggle { background: #888; }
        #bgm-toggle.playing { background: var(--accent-green); color: #000; }

        .volume-container, .color-picker-container { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1); }
        .volume-container span, .color-picker-container span { font-size: 0.7rem; color: var(--main-text); font-weight: bold; }
        #bgm-volume { cursor: pointer; accent-color: var(--accent-green); width: 80px; height: 4px; }
        #chat-color-input { cursor: pointer; border: none; width: 20px; height: 20px; background: none; padding: 0; }

       /* === 하단 랙 컨트롤 === */

    height: 150px;

.tile { 
    width: 44px; height: 64px;

    border-radius: 6px; 
    display: flex; justify-content: center; align-items: center; 
    font-weight: 800; font-size: 1.4rem;

/* 보드판 설정 */
#game-board {
    position: relative; /* 좌표의 기준점 */
    flex: 1;
    overflow: hidden;
}
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; background: var(--rack-bg); padding-bottom: 10px; transition: background 0.3s; }
        
        /* 일반 버튼들 */
button { 
    padding: 8px 16px; 
    font-weight: 700; 
    cursor: pointer; 
    border-radius: 8px; 
    border: 1px solid rgba(128,128,128,0.2);

}

button:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
}

/* 상단 정보 영역 */
#ui-layer {
    background: var(--panel-bg);
    color: var(--main-text);
    border-bottom: 1px solid rgba(128,128,128,0.1);
}

/* 채팅/로그 박스 */
#chat-log-container {
    background: var(--chat-bg);
    color: var(--main-text);
    border: 1px solid rgba(128,128,128,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
        
        /* === 플레이어 뱃지 및 로비 === */
        .player-badge { background: rgba(128,128,128,0.1); color: var(--main-text); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(0, 0, 0, 0.1); font-size: 0.75rem; display: flex; align-items: center; gap: 8px; position: relative; transition: background 0.3s; }
        .active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52, 152, 219, 0.2) !important; }
        .tile-count { background: var(--main-text); color: var(--bg-color); padding: 1px 6px; border-radius: 5px; font-weight: 900; }
        
        #entry-layer { 
    position: fixed; 
    top: 0; 
    left: 0;

}
        .modal-card { background: var(--modal-bg); color: var(--main-text); padding: 40px; border-radius: 24px; text-align: center; min-width: 400px; border: 1px solid rgba(0,0,0,0.1); transition: background 0.3s, color 0.3s; }

        @keyframes hint-glow {
            0% { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
            50% { box-shadow: 0 0 20px var(--accent-gold); transform: scale(1.05); }
            100% { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
        }
        .hint-target { animation: hint-glow 1s infinite; border: 2px solid var(--accent-gold) !important; z-index: 1000 !important; }
        
        .lobby-player-tag { display: inline-flex; align-items: center; background: var(--turn-blue); color: #fff; padding: 8px 16px; border-radius: 20px; margin: 4px; font-weight: 800; font-size: 0.95rem; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .lobby-player-tag.spec-tag { background: rgba(128,128,128,0.2); color: var(--main-text); border: 1px dashed rgba(128,128,128,0.5); box-shadow: none; }
        
        #reg-score-badge { background: rgba(241, 196, 15, 0.2); border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 5px 12px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; margin-right: 10px; display: none; }
        
        .rank-table { width: 100%; margin-top: 15px; border-collapse: collapse; color: var(--main-text); font-size: 0.9rem; }
        .rank-table th { border-bottom: 1px solid rgba(128,128,128,0.2); padding: 8px; color: var(--accent-gold); }
        .rank-table td { padding: 8px; border-bottom: 1px solid rgba(128,128,128,0.1); }

        #selection-box { position: absolute; border: 1px solid rgba(52, 152, 219, 0.8); background: rgba(52, 152, 219, 0.2); pointer-events: none; display: none; z-index: 9999; }
        .selected-tile { box-shadow: 0 0 10px 3px var(--turn-blue) !important; transform: scale(1.05); z-index: 50 !important; }

        /* === 테마 선택 버튼 === */
        .theme-btn { padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; border: 1px solid rgba(128,128,128,0.3); cursor: pointer; }

        .theme-btn.dark { background: #2d2d2d; color: #fff; }
        .theme-btn.pink { background: #ffeaf2; color: #ff4d94; }
/* 기존 style 태그 내부에 추가 또는 수정 */
.theme-selector {
    display: flex;

}

.theme-btn {
    width: 30px;

}

}

        /* === 말풍선 애니메이션 & 스타일 === */
        .emoji-bubble {
            position: absolute;
            top: calc(100% + 10px); 
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 99999;
            pointer-events: none;
            white-space: nowrap;
            animation: bubble-pop 2.5s ease-in-out forwards;
        }
        .emoji-bubble::after { 
            content: '';
            position: absolute;
            top: -6px; left: 50%; transform: translateX(-50%);
            border-width: 0 6px 6px;
            border-style: solid;
            border-color: transparent transparent white;
        }
        @keyframes bubble-pop {
            0% { opacity: 0; transform: translate(-50%, -10px) scale(0.5); }
            10% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
            20% { transform: translate(-50%, 0) scale(1); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 15px); }
        }

                   style="padding:12px; width:80%; margin-bottom:15px; border-radius:10px; border:1px solid #ccc;">

        </div>
    </div>

</div> 

<script>
    let db; 
    let myName = "", myRole = "player", currentHost = "";
    let turnTimer = null, timeLeft = 60;
    let playerList = [], currentTurn = "", sortMode = 'color', manualOrder = [];
    let myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let initialBoardState = {};
    window.latestPlayersData = {}; 

    const SOUND_ASSETS = {
        bgm: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        tilePick: "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3",
        tileDrop: "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3",
        turnAlarm: "https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3",
        error: "https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3",
        success: "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    };

    const audioCtx = { bgm: new Audio(SOUND_ASSETS.bgm), isBGMPlaying: false, currentVolume: 0.5 };
    audioCtx.bgm.loop = true;

    function playSFX(key) {
        const sfx = new Audio(SOUND_ASSETS[key]);
        sfx.volume = audioCtx.currentVolume;
        sfx.play().catch(() => {});
    }

    window.updateVolume = (val) => { audioCtx.currentVolume = val; audioCtx.bgm.volume = val; };
    window.updateChatColor = (color) => { 
        document.documentElement.style.setProperty('--chat-text-color', color);
        localStorage.setItem('lumi-chat-color', color);
    };

    window.setTheme = function(themeName) {
        document.body.setAttribute('data-theme', themeName);
        localStorage.setItem('lumi-theme', themeName);

        // 버튼이 아직 생성되지 않았을 경우를 대비해 체크
        const buttons = document.querySelectorAll('.theme-btn');
        if (buttons && buttons.length > 0) {
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.classList.contains(themeName)) {
                    btn.classList.add('active');
                }
            });
        }
    };

    window.timeOutPenalty = function() {
        if (window.isPenalizing) return; 
        window.isPenalizing = true;
        alert("시간 초과! 바닥 초기화 및 벌칙 타일 3개.");
        window.addGameLog(`⏰ ${myName}님이 시간 초과로 벌칙 타일 3개를 받았습니다.`);
        const up = {};
        Object.keys(boardTiles).forEach(k => { if(!initialBoardState[k]) up[`hands/${myName}/${k}`] = boardTiles[k]; });
        up['board'] = initialBoardState;
        db.ref('pool').limitToFirst(3).once('value', s => {
            if (s.exists()) {
                const poolObj = s.val();
                Object.keys(poolObj).forEach(key => {
                    up[`hands/${myName}/tile_${Date.now()}_${Math.random().toString(36).substr(2,5)}`] = poolObj[key];
                    up[`pool/${key}`] = null;
                });
            }
            db.ref('/').update(up).then(() => { playSFX('error'); window.nextTurnAction(); window.isPenalizing = false; });
        });
    };

    window.showHint = function() {
        if (myRole !== 'player' || currentTurn !== myName) return alert("내 차례에만 사용할 수 있습니다.");
        document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target'));
        const sets = [];
        const hand = [...myHandData];
        const isReg = window.latestPlayersData[myName]?.registered;

        const numMap = {};
        hand.forEach(t => {
            if (t.num === 'J') return;
            if (!numMap[t.num]) numMap[t.num] = [];
            if (!numMap[t.num].find(it => it.color === t.color)) numMap[t.num].push(t);
        });
        Object.values(numMap).forEach(group => { 
            if (group.length >= 3) sets.push(group.map(t => ({ type: 'rack', id: t.id }))); 
        });

        const colorMap = { 'red': [], 'blue': [], 'yellow': [], 'black': [] };
        hand.forEach(t => { if (t.num !== 'J') colorMap[t.color].push(t); });
        Object.values(colorMap).forEach(tiles => {
            tiles.sort((a, b) => Number(a.num) - Number(b.num));
            let currentRun = [];
            for (let i = 0; i < tiles.length; i++) {
                if (currentRun.length === 0 || Number(tiles[i].num) === Number(currentRun[currentRun.length - 1].num) + 1) {
                    currentRun.push(tiles[i]);
                } else if (Number(tiles[i].num) !== Number(currentRun[currentRun.length - 1].num)) {
                    if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
                    currentRun = [tiles[i]];
                }
            }
            if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
        });

        if (isReg) {
            const rows = {};
            Object.entries(boardTiles).forEach(([id, t]) => { t.id = id; if(!rows[t.y]) rows[t.y] = []; rows[t.y].push(t); });
            for (let y in rows) {
                const rowTiles = rows[y].sort((a,b) => a.x - b.x);
                let currentBoardSet = [];
                for (let i = 0; i < rowTiles.length; i++) {
                    currentBoardSet.push(rowTiles[i]);
                    if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                        if (currentBoardSet.length >= 3) {
                            const nonJokers = currentBoardSet.filter(t => t.num !== 'J');
                            if (nonJokers.length > 0) {
                                const isGroup = nonJokers.every(t => t.num === nonJokers[0].num);
                                hand.forEach(handTile => {
                                    if (handTile.num === 'J') return; 
                                    if (isGroup && currentBoardSet.length < 4) {
                                        const boardColors = currentBoardSet.map(t => t.color);
                                        if (handTile.num === nonJokers[0].num && !boardColors.includes(handTile.color)) {
                                            sets.push([{ type: 'rack', id: handTile.id }, ...currentBoardSet.map(t => ({ type: 'board', id: t.id }))]);
                                        }
                                    } else if (!isGroup) {
                                        const color = nonJokers[0].color;
                                        const firstRealIdx = currentBoardSet.findIndex(t => t.num !== 'J');
                                        const firstRealNum = Number(currentBoardSet[firstRealIdx].num);
                                        const firstNum = firstRealNum - firstRealIdx; 
                                        const lastNum = firstNum + currentBoardSet.length - 1; 

                                        const hn = Number(handTile.num);
                                        if (handTile.color === color && ((hn === firstNum - 1 && hn >= 1) || (hn === lastNum + 1 && hn <= 13))) {
                                            sets.push([{ type: 'rack', id: handTile.id }, ...currentBoardSet.map(t => ({ type: 'board', id: t.id }))]);
                                        }
                                    }
                                });
                            }
                        }
                        currentBoardSet = [];
                    }
                }
            }
        }

        if (sets.length === 0) return alert("현재 낼 수 있는 타일이 없습니다.");

        const allTargetIds = new Set();
        sets.forEach(setInfo => {
            setInfo.forEach(item => { allTargetIds.add(item.type === 'board' ? item.id : "rack-" + item.id); });
        });

        allTargetIds.forEach(domId => { let el = document.getElementById(domId); if (el) el.classList.add('hint-target'); });
        setTimeout(() => document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target')), 5000);
    };

    window.handleEntry = function(role, isAuto = false) {
        if (!isAuto) {
            const nickInput = document.getElementById('nick-input');
            if (!nickInput.value.trim()) return alert("닉네임을 입력하세요!");
            myName = nickInput.value.trim(); myRole = role; 
        } else {
            myName = window.sessionStorage.getItem('lumi-nick');
            myRole = window.sessionStorage.getItem('lumi-role') || "player";
        }
        window.sessionStorage.setItem('lumi-nick', myName);
        window.sessionStorage.setItem('lumi-role', myRole);
        db.ref('players/' + myName).update({ joined: true, timestamp: Date.now(), role: myRole });
        db.ref('players/' + myName).onDisconnect().remove();
        document.getElementById('entry-layer').style.display = 'none';
        if(!isAuto) playSFX('success');

        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            window.applyAutoSort();
        });
    };

    window.updatePlayerListUI = function() {
        const listEl = document.getElementById('player-list-container');
        if (!listEl) return;
        listEl.innerHTML = '';
        playerList.forEach(name => {
            const badge = document.createElement('span');
            badge.id = `badge-${name}`; 
            badge.className = `player-badge ${name === currentTurn ? 'active-turn-badge' : ''}`;
            if (myRole === 'spectator') badge.style.cursor = 'pointer'; 
            
            const pData = window.latestPlayersData[name] || {};
            badge.innerHTML = `${name === currentHost ? '👑 ' : ''}${name} <span class="tile-count">${pData.tileCount || 0}</span>`;
            
            badge.onclick = () => { if (myRole === 'spectator') window.viewPlayerHand(name); };
            listEl.appendChild(badge);
        });
        const isHost = (myName === currentHost);
        document.getElementById('btn-force-lobby').style.display = isHost ? 'inline-block' : 'none';
        document.getElementById('btn-force-next').style.display = isHost ? 'inline-block' : 'none';
        const regInfoEl = document.getElementById('reg-info');
        if (myRole === 'spectator') { regInfoEl.innerText = "👀 관전 모드 (플레이어 클릭 시 패 확인)"; regInfoEl.style.color = "#aaa"; }
        else {
            const isReg = window.latestPlayersData[myName]?.registered;
            regInfoEl.innerText = isReg ? "" : "첫 등록 필요 (30점 이상)";
            regInfoEl.style.color = "var(--accent-gold)";
        }
    };

    window.onload = function() {
        const config = { apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY", authDomain: "lumi-b373e.firebaseapp.com", databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/", projectId: "lumi-b373e" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        db = firebase.database();
        
        // 1. 테마 적용
    const savedTheme = localStorage.getItem('lumi-theme') || 'classic';
    window.setTheme(savedTheme);

    // 2. 안전하게 UI 요소 초기화 (요소가 없어도 에러 안 나게 처리)
    const chatInput = document.getElementById('chat-color-input');
    if(chatInput) chatInput.value = localStorage.getItem('lumi-chat-color') || "#ffffff";
    
    const bgmVol = document.getElementById('bgm-volume');
    if(bgmVol) bgmVol.value = audioCtx.currentVolume;

    // 3. 서버 데이터 연결 및 입장창 제어 (핵심!)
    setTimeout(() => {
        const entryLayer = document.getElementById('entry-layer');
        if (window.sessionStorage.getItem('lumi-nick')) {
            window.handleEntry(null, true);
        } else if (entryLayer) {
            entryLayer.style.display = 'flex';
        }
    }, 200);

    // 4. 대기실 리스너 (여기가 돌아가야 대기실이 보입니다)
    db.ref('settings/status').on('value', snap => {
    gameStatus = snap.val() || "waiting";
    const overlay = document.getElementById('overlay-layer');
    
    if (overlay) {
        // 게임 중일 때만 레이어를 숨기고, 대기/종료 시에는 다시 화면 가득 띄움
        overlay.style.display = (gameStatus === "playing") ? 'none' : 'flex';
    }
    
    if (gameStatus === "waiting") window.renderLobbyUI();
    else if (gameStatus === "finished") window.renderResultUI();
});

        db.ref('settings/host').on('value', snap => { currentHost = snap.val(); window.updatePlayerListUI(); if (gameStatus === "waiting") window.renderLobbyUI(); });
        db.ref('settings/gameMode').on('value', snap => { gameMode = snap.val() || 'normal'; if (gameStatus === "waiting") window.renderLobbyUI(); });
        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            window.latestPlayersData = players;
            playerList = Object.entries(players).filter(p => p[1].joined && p[1].role === 'player').sort((a,b) => (a[1].timestamp||0) - (b[1].timestamp||0)).map(p => p[0]);
            if (playerList.length > 0) {
                let targetHost = playerList.includes("계헌") ? "계헌" : playerList[0];
                if (currentHost !== targetHost) db.ref('settings/host').set(targetHost);
            } else if (Object.keys(players).length === 0) { db.ref('settings/host').set(""); }
            window.updatePlayerListUI();
            if (gameStatus === "waiting") window.renderLobbyUI();
        });
        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            document.getElementById('overlay-layer').style.display = (gameStatus === "playing") ? 'none' : 'flex';
            if (gameStatus === "waiting") window.renderLobbyUI();
            else if (gameStatus === "finished") window.renderResultUI();
            if (gameStatus !== "playing" && turnTimer) { clearInterval(turnTimer); document.getElementById('timer-display').innerText = ""; }
        });

        db.ref('currentTurn').on('value', snap => {
            currentTurn = snap.val();
            const isMy = (currentTurn === myName && myRole === 'player');
            document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
            ['btn-draw', 'btn-end', 'btn-rollback'].forEach(id => document.getElementById(id).disabled = !isMy);
            document.getElementById('turn-info').innerText = isMy ? "내 차례!" : `차례: ${currentTurn}`;
            if(isMy) { playSFX('turnAlarm'); initialBoardState = JSON.parse(JSON.stringify(boardTiles)); }
            window.updatePlayerListUI();
            window.updateRegScoreUI();
        });

        db.ref('settings/turnStartTime').on('value', snap => {
            const startTime = snap.val();
            const timerEl = document.getElementById('timer-display');
            if (!startTime || gameStatus !== "playing") { if (timerEl) timerEl.innerText = ""; return; }
            if (turnTimer) clearInterval(turnTimer);
            turnTimer = setInterval(() => {
                const now = Date.now();
                const elapsed = Math.floor((now - startTime) / 1000);
                timeLeft = 60 - elapsed;
                if (timerEl) { timerEl.innerText = (timeLeft > 0 ? timeLeft : 0) + "s"; }
                if (timeLeft <= 0 && currentTurn === myName && myRole === 'player') {
                    clearInterval(turnTimer); window.timeOutPenalty();
                }
            }, 1000);
        });

        db.ref('board').on('value', snap => {
            boardTiles = snap.val() || {};
            window.updateRegScoreUI();
            const bEl = document.getElementById('game-board');
            if(!bEl) return;
            bEl.querySelectorAll('.tile').forEach(t => t.remove());
            Object.entries(boardTiles).forEach(([id, data]) => {
                if (!data || data.num === undefined) return; 
                const div = document.createElement('div');
                div.className = `tile ${data.color}`; div.id = id; div.innerText = data.num;
                div.style.left = data.x + 'px'; div.style.top = data.y + 'px';
                div.draggable = (myRole === 'player');
                div.ondragstart = (e) => {
                    if (currentTurn !== myName || myRole !== 'player') return e.preventDefault();
                    e.dataTransfer.setData("text", id); playSFX('tilePick');
                };
                bEl.appendChild(div);
            });
        });
        
        db.ref('pool').on('value', snap => { document.getElementById('pool-badge').innerText = `POOL: ${snap.exists() ? Object.keys(snap.val()).length : 0}`; });
        
        db.ref('chats').limitToLast(20).on('child_added', snap => {
            const c = snap.val();
            const div = document.createElement('div');
            div.style.color = c.color || "#ffffff";
            div.innerHTML = `<b>${c.name}:</b> ${c.msg}`;
            const box = document.getElementById('chat-box');
            if(box) { box.appendChild(div); box.scrollTop = box.scrollHeight; }
        });
        
        db.ref('logs').limitToLast(30).on('child_added', snap => {
            const logMsg = snap.val(); // 로그는 보통 문자열 데이터입니다.
            const div = document.createElement('div');
            div.style.padding = "2px 0";
            div.style.fontSize = "0.8rem";
            div.style.color = "var(--main-text)";
            div.innerText = logMsg; // 로그 메시지를 화면에 표시

            const logContainer = document.getElementById('game-log');
            if(logContainer) { 
                logContainer.appendChild(div); 
                logContainer.scrollTop = logContainer.scrollHeight; 
            }
        });

        db.ref('emotes').limitToLast(10).on('child_added', snap => {
            const data = snap.val();
            if (Date.now() - data.time > 10000) return;
            window.showBubble(data.name, data.emote);
        });
    }; 

    function isValidSet(tiles) {
        if (tiles.length < 3) return false;
        const nonJokers = tiles.filter(t => t.num !== 'J');
        if (nonJokers.length === 0) return true;
        const isGroup = () => {
            const num = nonJokers[0].num;
            const colors = nonJokers.map(t => t.color);
            return nonJokers.every(t => t.num === num) && (new Set(colors)).size === colors.length && tiles.length <= 4;
        };
        const isRun = () => {
            const color = nonJokers[0].color;
            if (!nonJokers.every(t => t.color === color)) return false;
            let lastNum = -1;
            for(let t of tiles) {
                if(t.num !== 'J') {
                    if(lastNum !== -1 && Number(t.num) <= lastNum) return false;
                    lastNum = Number(t.num);
                }
            }
            return true;
        };
        return isGroup() || isRun();
    }

    function validateBoard() {
        const rows = {};
        Object.values(boardTiles).forEach(t => { if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
        for (let y in rows) {
            const rowTiles = rows[y].sort((a,b) => a.x - b.x);
            let currentSet = [];
            for (let i=0; i<rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                    if (!isValidSet(currentSet)) return false;
                    currentSet = [];
                }
            }
        }
        return true;
    }

    window.handleTurnEnd = function() {
        if (myRole !== 'player') return;
        if (Object.keys(boardTiles).length === Object.keys(initialBoardState).length) return alert("패를 내거나 뽑으세요.");
        if (!validateBoard()) { playSFX('error'); return alert("보드 배치가 유효하지 않습니다!"); }
        
        db.ref(`players/${myName}/registered`).once('value', snap => {
            const isReg = snap.val();
            if (!isReg) {
                let isPiggy = false;
                const rows = {};
                Object.entries(boardTiles).forEach(([id, t]) => { t.id = id; if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
                for (let y in rows) {
                    const rowTiles = rows[y].sort((a,b) => a.x - b.x);
                    let curr = [];
                    for (let i=0; i<rowTiles.length; i++) {
                        curr.push(rowTiles[i]);
                        if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                            if (curr.some(t => initialBoardState[t.id]) && curr.some(t => !initialBoardState[t.id])) isPiggy = true;
                            curr = [];
                        }
                    }
                }
                if (isPiggy) { playSFX('error'); return alert("🚨 첫 등록 시에는 바닥 패에 붙일 수 없습니다."); }
                let pts = 0;
                Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) pts += (t.num === 'J' ? 30 : Number(t.num)); });
                if (pts < 30) { playSFX('error'); return alert(`등록 실패 (${pts}점)! 30점 이상 내야 합니다.`); }
                db.ref(`players/${myName}`).update({ registered: true });
            }
            
            if (myHandData.length === 0) {
                db.ref('hands').once('value', hSnap => {
                    const allHands = hSnap.val(), scores = {};
                    playerList.forEach(p => { let s = 0; Object.values(allHands[p] || {}).forEach(t => s += (t.num === 'J' ? 50 : Number(t.num))); scores[p] = s; });
                    window.recordWin(myName);
                    db.ref('/').update({ "settings/status": "finished", "settings/gameResult": { winner: myName, scores: scores } });
                });
            } else { 
                if (!isReg) window.addGameLog(`⭐ ${myName}님이 첫 등록에 성공했습니다!`);
                else window.addGameLog(`🔄 ${myName}님이 턴을 마쳤습니다.`);
                window.nextTurnAction(); 
            }
        });
    };

    window.rollbackTurn = function() {
        if (myRole !== 'player') return;
        if(confirm("모든 동작을 취소할까요?")) {
            const up = {};
            Object.keys(boardTiles).forEach(k => { if(!initialBoardState[k]) up[`hands/${myName}/${k}`] = boardTiles[k]; });
            up['board'] = initialBoardState;
            db.ref('/').update(up);
            playSFX('tilePick');
        }
    };

    window.drawTile = function() {
        if (myRole !== 'player') return;
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("패를 냈다면 무르거나 종료해야 합니다.");
        db.ref('pool').limitToFirst(1).once('value', s => {
            if (!s.exists()) return window.nextTurnAction();
            const poolObj = s.val(), key = Object.keys(poolObj)[0], up = {};
            up[`hands/${myName}/tile_${Date.now()}`] = poolObj[key];
            up[`pool/${key}`] = null;
            window.addGameLog(`🎴 ${myName}님이 타일을 1개 뽑았습니다.`);
            db.ref('/').update(up).then(() => { playSFX('tilePick'); window.nextTurnAction(); });
        });
    };

    window.startGame = function() {
        if (playerList.length < 2) return alert("최소 2명이 필요합니다.");
        const colors = ['red', 'blue', 'yellow', 'black'], sets = (gameMode === 'expert') ? 3 : 2;
        let pool = [];
        colors.forEach(c => { for(let i=1; i<=13; i++) { for(let j=0; j<sets; j++) { pool.push({ num: i, color: c }); } } });
        pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
        if(sets === 3) pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
        pool.sort(() => Math.random() - 0.5);
        
        const updates = { 'board': null, 'currentTurn': playerList[0], 'settings/status': "playing", 'chats': null }, allHands = {};
        
        playerList.forEach(p => {
            const hand = {};
            for(let i=0; i<14; i++) { const t = pool.pop(); if(t) hand['tile_' + Math.random().toString(36).substr(2,9)] = t; }
            allHands[p] = hand; updates[`players/${p}/registered`] = false;
        });
        updates['hands'] = allHands;
        const poolObj = {}; pool.forEach((t, idx) => { poolObj[`p_${idx}`] = t; });
        updates['pool'] = poolObj;
        updates['logs'] = null; 
        window.addGameLog(`📢 게임이 시작되었습니다!`);
        
        db.ref('/').update(updates).then(() => {
            db.ref('settings/turnStartTime').set(firebase.database.ServerValue.TIMESTAMP);
        });
    };

    // 보드판에 타일을 내려놓을 때
window.dropOnBoard = function(e) {
    e.preventDefault();
    const id = e.dataTransfer.getData("text");
    const boardRect = document.getElementById('game-board').getBoundingClientRect();
    
    // 마우스 위치에서 보드판의 시작 위치를 빼서 정확한 좌표 계산
    const dropX = e.clientX - boardRect.left - 22; // 타일 너비 절반 보정
    const dropY = e.clientY - boardRect.top - 32;  // 타일 높이 절반 보정

    const updates = {};
    db.ref(`hands/${myName}/${id}`).once('value', s => {
        if (s.exists()) {
            // 내 패에서 보드로 낼 때
            updates[`board/${id}`] = { ...s.val(), x: dropX, y: dropY };
            updates[`hands/${myName}/${id}`] = null;
        } else {
            // 보드 위에서 위치만 옮길 때
            updates[`board/${id}/x`] = dropX;
            updates[`board/${id}/y`] = dropY;
        }
        db.ref('/').update(updates);
    });
};

window.dropOnRack = function(e) {
    e.preventDefault();
    const id = e.dataTransfer.getData("text");
    const rack = document.getElementById('my-rack');
    const rect = rack.getBoundingClientRect();

    // 랙의 좌측 상단 기준 실제 마우스 위치 계산 (스크롤 포함)
    let rawX = e.clientX - rect.left + rack.scrollLeft;
    
    // 가로 50px 간격으로 딱딱 맞게 배치 (10px은 첫 타일 여백)
    const snapX = Math.floor(rawX / 50) * 50 + 10;

    // ⭐ 세로 위치(y)를 25px 정도로 고정하여 패가 잘리지 않고 한가운데 오게 함
    const finalY = 25; 

    const updates = {};
    db.ref(`board/${id}`).once('value', s => {
        const tileData = s.exists() ? s.val() : myHandData.find(t => t.id === id);
        if (!tileData) return;

        updates[`hands/${myName}/${id}`] = { ...tileData, x: snapX, y: finalY };
        if (s.exists()) updates[`board/${id}`] = null;
        
        db.ref('/').update(updates);
        playSFX('tilePick');
    });
};

    window.applyAutoSort = function() {
    const rEl = document.getElementById('my-rack');
    if(!rEl) return;

    // 1. 데이터 정렬 로직 (기본 유지)
    if (sortMode === 'manual' && manualOrder.length > 0) { 
        myHandData.sort((a, b) => manualOrder.indexOf(a.id) - manualOrder.indexOf(b.id)); 
    } else {
        const coMap = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 };
        myHandData.sort((a, b) => { 
            const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); 
            return sortMode === 'color' ? (coMap[a.color] - coMap[b.color] || vA - vB) : (vA - vB || coMap[a.color] - coMap[b.color]); 
        });
    }

    rEl.querySelectorAll('.tile').forEach(t => t.remove());

    // 2. 타일 생성 및 배치
    myHandData.forEach((t, index) => {
        if (!t || t.num === undefined) return;
        const div = document.createElement('div');
        div.id = "rack-" + t.id;
        div.className = `tile ${t.color}`;
        div.innerText = t.num;
        div.draggable = (myRole === 'player');

        if (sortMode === 'manual') {
            div.style.position = 'absolute';
            const posX = (t.x !== undefined) ? t.x : (index * 50) + 10;
            const posY = 25; 
            div.style.left = posX + 'px';
            div.style.top = posY + 'px';
            div.style.margin = '0';
        } else {
    div.style.position = 'relative';
    div.style.display = 'inline-flex';
    div.style.left = 'auto';
    div.style.top = 'auto';
    div.style.margin = '0px';
    div.style.flexShrink = '0';
    
    // 부모 컨테이너의 정렬을 왼쪽으로 다시 한번 확인
    rEl.style.justifyContent = 'flex-start'; 
}

        div.ondragstart = (e) => { 
            if (myRole !== 'player') return e.preventDefault(); 
            e.dataTransfer.setData("text", t.id); 
            e.dataTransfer.setData("source", "rack"); 
            playSFX('tilePick'); 
        };
        div.ondragover = (e) => e.preventDefault();
        div.ondrop = (e) => { 
            e.preventDefault(); e.stopPropagation(); 
            const dId = e.dataTransfer.getData("text"), src = e.dataTransfer.getData("source"); 
            if (src === "rack") window.moveTileInRack(dId, t.id); 
            else window.dropOnRack(e); 
        };
        rEl.appendChild(div);
    });
};

    window.renderLobbyUI = function() { 
        const modalBody = document.getElementById('modal-body');
        const isHost = (myName === currentHost);
        const allUsers = Object.entries(window.latestPlayersData);
        
        let tags = allUsers.map(([name, data]) => { 
            if(!data.joined) return ''; 
            const isSpec = data.role === 'spectator'; 
            return `<span class="lobby-player-tag ${isSpec ? 'spec-tag' : ''}">${name === currentHost ? '👑 ' : ''}${name}${isSpec ? ' (관전)' : ''}</span>`; 
        }).join('');

        const resetRankBtn = isHost ? `<button onclick="window.resetRank()" style="background:rgba(128,128,128,0.2); color:var(--main-text); padding:5px 10px; font-size:0.8rem; margin-top:10px; border:1px solid rgba(0,0,0,0.1);">전적 초기화</button>` : '';

        modalBody.innerHTML = `
            <h2 style="color:var(--main-text);">🎮 루미큐브 대기실</h2>
            <div style="text-align:left; background:rgba(128,128,128,0.1); padding:15px; border-radius:10px; margin-bottom:15px;">
                ${tags}
            </div>
            <h3 style="color:var(--accent-gold); margin-bottom:5px;">🏆 명예의 전당</h3>
            <div id="rank-container" style="color:var(--main-text); font-size:0.9rem;">전적 로딩 중...</div>
            ${resetRankBtn}
            <div style="margin-top:20px; margin-bottom:20px;">
                <button class="mode-btn ${gameMode==='normal'?'selected':''}" onclick="db.ref('settings/gameMode').set('normal')">보통 (4인)</button>
                <button class="mode-btn ${gameMode==='expert'?'selected':''}" onclick="db.ref('settings/gameMode').set('expert')">전문가 (6인)</button>
            </div>
            ${isHost ? '<button onclick="window.startGame()" style="background:var(--accent-green); color:#000; width:100%; padding:15px; font-weight:900;">게임 시작</button>' : '<p style="color:var(--accent-gold);">방장이 게임을 시작하기를 기다리는 중...</p>'}
        `;

        window.getRankHtml().then(html => {
            const rankBox = document.getElementById('rank-container');
            if(rankBox) rankBox.innerHTML = html;
        });
    };

    window.renderResultUI = function() {
        db.ref('settings/gameResult').once('value', snap => {
            const data = snap.val(); if (!data) return;
            const modalBody = document.getElementById('modal-body');
            let html = `<h1 style="color:var(--accent-gold);">🏆 WINNER: ${data.winner}!</h1>`;
            Object.entries(data.scores).sort((a,b)=>a[1]-b[1]).forEach(([name, score]) => { html += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(0,0,0,0.1);"><span>${name}</span><span>${name === data.winner ? 'WINNER' : score + '점'}</span></div>`; });
            if (myName === currentHost) html += `<button onclick="window.returnToLobby()" style="margin-top:20px; width:100%; padding:10px;">대기실로 돌아가기</button>`;
            modalBody.innerHTML = html;
        });
    };

    window.setSortMode = (m) => { sortMode = m; if (m === 'manual') manualOrder = myHandData.map(t => t.id); window.applyAutoSort(); };
    window.nextTurnAction = () => {
        const nextPlayer = playerList[(playerList.indexOf(currentTurn) + 1) % playerList.length];
        db.ref('/').update({ 'currentTurn': nextPlayer, 'settings/turnStartTime': firebase.database.ServerValue.TIMESTAMP });
    };
    window.returnToLobby = () => { if(confirm("방 전체 데이터를 완전히 초기화할까요?")) db.ref('/').update({ "settings/status": "waiting", "board": null, "hands": null, "pool": null, "settings/gameResult": null }); };
    window.moveTileInRack = function(dId, tId) { if (dId === tId) return; if (sortMode !== 'manual') { sortMode = 'manual'; manualOrder = myHandData.map(t => t.id); } const fIdx = manualOrder.indexOf(dId), tIdx = manualOrder.indexOf(tId); if (fIdx > -1 && tIdx > -1) { manualOrder.splice(fIdx, 1); manualOrder.splice(tIdx, 0, dId); playSFX('tileDrop'); window.applyAutoSort(); } };
    window.forceNextTurn = () => { if(confirm("다음 차례로 넘길까요?")) window.nextTurnAction(); };
    window.sendChat = () => { const i = document.getElementById('chat-input'), color = document.getElementById('chat-color-input').value; if (i.value.trim()) { db.ref('chats').push({ name: myName, msg: i.value, color: color }); i.value = ''; } };
    window.toggleBGM = () => { if (audioCtx.isBGMPlaying) { audioCtx.bgm.pause(); } else { audioCtx.bgm.play().catch(()=>{}); } audioCtx.isBGMPlaying = !audioCtx.isBGMPlaying; };
    
    window.viewPlayerHand = function(targetName) {
        if (myRole !== 'spectator') return;
        const regInfoEl = document.getElementById('reg-info');
        regInfoEl.innerText = `👀 ${targetName} 님의 패 관전 중...`;
        regInfoEl.style.color = "var(--turn-blue)";

        db.ref('hands/' + targetName).once('value', snap => {
            const handData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            const coMap = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 };
            handData.sort((a, b) => { 
                const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); 
                return coMap[a.color] - coMap[b.color] || vA - vB;
            });
            const rEl = document.getElementById('my-rack');
            rEl.querySelectorAll('.tile').forEach(t => t.remove());
            handData.forEach(t => {
                const div = document.createElement('div');
                div.className = `tile ${t.color}`;
                div.innerText = t.num;
                div.draggable = false;
                rEl.appendChild(div);
            });
        });
    };

    window.addGameLog = function(message) {
        if (!myName) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        db.ref('logs').push({ time: timeStr, msg: message });
    };

    window.toggleChat = () => { 
        const c = document.getElementById('chat-log-container');
        const i = document.getElementById('chat-input-container');
        const v = c.style.display === 'flex'; 
        c.style.display = v ? 'none' : 'flex'; 
        i.style.display = v ? 'none' : 'flex'; 
    };

    window.updateRegScoreUI = function() {
        const scoreBadge = document.getElementById('reg-score-badge');
        const isReg = window.latestPlayersData[myName]?.registered;
        if (isReg || currentTurn !== myName || myRole !== 'player') { scoreBadge.style.display = 'none'; return; }

        let currentPts = 0;
        Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) currentPts += (t.num === 'J' ? 30 : Number(t.num)); });

        scoreBadge.innerText = `등록 점수: ${currentPts} / 30`;
        scoreBadge.style.display = 'inline-block';
        scoreBadge.style.borderColor = currentPts >= 30 ? 'var(--accent-green)' : 'var(--accent-gold)';
        scoreBadge.style.color = currentPts >= 30 ? 'var(--accent-green)' : 'var(--accent-gold)';
    };

    window.recordWin = function(winnerName) { db.ref(`stats/${winnerName}/wins`).transaction(curr => (curr || 0) + 1); };

    window.getRankHtml = function() {
        return new Promise(resolve => {
            db.ref('stats').once('value', snap => {
                const stats = snap.val() || {};
                let html = `<table class="rank-table"><tr><th>이름</th><th>누적 승리</th></tr>`;
                const sorted = Object.entries(stats).sort((a, b) => b[1].wins - a[1].wins);
                if (sorted.length === 0) html += `<tr><td colspan="2">전적이 없습니다.</td></tr>`;
                sorted.forEach(([name, data]) => { html += `<tr><td>${name}</td><td>${data.wins}회</td></tr>`; });
                html += `</table>`;
                resolve(html);
            });
        });
    };

    let isSelecting = false;
    let startX, startY;
    let selectedTiles = []; 

    window.startSelection = function(e) {
        if (myRole !== 'player' || currentTurn !== myName) return;
        if (e.target.classList.contains('tile')) return;

        isSelecting = true;
        const board = document.getElementById('game-board');
        const rect = board.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;

        const selBox = document.getElementById('selection-box');
        selBox.style.left = startX + 'px';
        selBox.style.top = startY + 'px';
        selBox.style.width = '0px';
        selBox.style.height = '0px';
        selBox.style.display = 'block';

        selectedTiles = [];
        document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
    };

    document.addEventListener('mousemove', function(e) {
        if (!isSelecting) return;
        const board = document.getElementById('game-board');
        const rect = board.getBoundingClientRect();
        let currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        let currentY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

        const selBox = document.getElementById('selection-box');
        const left = Math.min(startX, currentX), top = Math.min(startY, currentY);
        const width = Math.abs(currentX - startX), height = Math.abs(currentY - startY);

        selBox.style.left = left + 'px'; selBox.style.top = top + 'px';
        selBox.style.width = width + 'px'; selBox.style.height = height + 'px';

        selectedTiles = [];
        document.querySelectorAll('#game-board .tile').forEach(tile => {
            const tX = parseInt(tile.style.left), tY = parseInt(tile.style.top);
            const tRight = tX + 44, tBottom = tY + 64; 
            if (!(tRight < left || tX > left + width || tBottom < top || tY > top + height)) {
                tile.classList.add('selected-tile');
                selectedTiles.push(tile.id);
            } else tile.classList.remove('selected-tile');
        });
    });

    document.addEventListener('mouseup', function() {
        if (isSelecting) { isSelecting = false; document.getElementById('selection-box').style.display = 'none'; }
    });

    window.resetRank = function() {
        if (confirm("🏆 모든 명예의 전당 기록을 영구적으로 초기화할까요?")) {
            db.ref('stats').remove().then(() => { window.renderLobbyUI(); });
        }
    };

    const EMOTES = ['😀', '😂', '😍', '😎', '🤔', '😭', '😡', '👍', '👎', '🎉', '🔥', '👀'];

    window.toggleEmotePicker = function() {
        const picker = document.getElementById('emote-picker');
        if (picker.style.display === 'flex') picker.style.display = 'none';
        else {
            picker.style.display = 'flex';
            if (picker.innerHTML === '') {
                EMOTES.forEach(e => {
                    const btn = document.createElement('button');
                    btn.className = 'emote-btn';
                    btn.innerText = e;
                    btn.onclick = () => window.sendEmote(e);
                    picker.appendChild(btn);
                });
            }
        }
    };

    window.sendEmote = function(emote) {
        if (!myName) return;
        db.ref('emotes').push({ name: myName, emote: emote, time: Date.now() });
        document.getElementById('emote-picker').style.display = 'none';
    };

    window.showBubble = function(playerName, emote) {
        const badge = document.getElementById(`badge-${playerName}`);
        if (!badge) return; 

        const existingBubble = badge.querySelector('.emoji-bubble');
        if (existingBubble) existingBubble.remove();

        const bubble = document.createElement('div');
        bubble.className = 'emoji-bubble';
        bubble.innerText = emote;
        
        badge.appendChild(bubble);

        setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 2500);
    };

</script>
</body>
</html>
