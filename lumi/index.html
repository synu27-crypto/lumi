<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루미큐브 : Ver. 61.2</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">

    <style>
:root {
    --bg-color: #121212; 
    --panel-bg: #1e1e1e; 
    --board-bg: #181818;
    --rack-bg: #121212;
    --modal-bg: #252525;
    --main-text: #e0e0e0;
    --tile-bg: #ffffff;
    --tile-text-black: #2d3436;
    --accent-purple: #9d50bb; 
    --accent-green: #2ecc71; 
    --accent-gold: #f1c40f; 
    --accent-red: #e74c3c;
    --turn-blue: #3498db; 
    --chat-bg: rgba(20, 20, 20, 0.95);
    --btn-bg: rgba(255, 255, 255, 0.1);
}

body[data-theme='classic'] { 
    --bg-color: #f0f2f5; 
    --panel-bg: #ffffff; 
    --board-bg: #e4e6eb; 
    --rack-bg: #d8dadf; 
    --modal-bg: #ffffff; 
    --main-text: #1c1e21; 
    --tile-bg: #ffffff;
    --tile-text-black: #000000;
    --chat-bg: rgba(255, 255, 255, 0.95);
    --btn-bg: rgba(0, 0, 0, 0.05);
cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>👆</text></svg>") 5 5, auto !important;
}

body {
    background-color: var(--bg-color);
    color: var(--main-text);
    margin: 0;
    font-family: 'Inter', 'Pretendard', sans-serif;
    height: 100vh; width: 100vw;
    overflow: hidden;
    user-select: none;
    transition: background 0.3s, color 0.3s;
}

#main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }

#ui-layer {
    height: 60px; padding: 0 20px;
    background: var(--panel-bg);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    transition: background 0.3s;
    color: var(--main-text);
    flex-shrink: 0;
}

#game-board {
    flex: 1;
    background: var(--board-bg);
    position: relative;
    overflow: hidden;
    cursor: grab;
    transition: background 0.3s;
}
#game-board.not-my-turn { opacity: 0.7; filter: brightness(0.8); }
#game-board.panning { cursor: grabbing !important; }
#game-board.ctrl-mode { cursor: crosshair !important; }

#board-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 4000px;
    height: 4000px;
    transform-origin: 0 0;
    background-image: radial-gradient(circle, rgba(128,128,128,0.15) 1px, transparent 1px);
    background-size: 50px 75px;
}

#zoom-badge {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.45);
    color: #fff;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 700;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.3s;
}
#zoom-badge.visible { opacity: 1; }

#ctrl-hint {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(52,152,219,0.9);
    color: #fff;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
}
#ctrl-hint.visible { opacity: 1; }

body[data-theme='pink'] #board-canvas {
    background-color: #ffe8f3 !important;
    background-image: radial-gradient(circle, rgba(255, 102, 163, 0.2) 1px, transparent 1px) !important;
}

.tile { 
    width: 44px; height: 64px; 
    background: var(--tile-bg) !important; 
    border-radius: 6px; 
    display: flex; justify-content: center; align-items: center; 
    font-weight: 800; font-size: 1.4rem; 
    box-shadow: 0 3px 0 #bbb, 0 4px 10px rgba(0,0,0,0.2); 
    border: 1px solid rgba(0,0,0,0.1);
    z-index: 10; cursor: grab; transition: transform 0.1s; 
}

.red    { color: #e44d26 !important; border-bottom: 4px solid #e44d26 !important; }
.blue   { color: #2980b9 !important; border-bottom: 4px solid #2980b9 !important; }
.yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }
.black  { color: var(--tile-text-black) !important; border-bottom: 4px solid #333 !important; }
.joker  { color: #8e44ad !important; font-size: 1.8rem !important; }

.selected-tile { 
    box-shadow: 0 0 10px 3px var(--turn-blue) !important; 
    transform: scale(1.05); 
    z-index: 50 !important;
}

#chat-wrapper {
    position: fixed;
    bottom: 270px;
    right: 20px;
    width: 500px;
    z-index: 20000;
    display: flex;
    flex-direction: column;
    gap: 5px;
    pointer-events: none;
    cursor: move;
}

#chat-log-container {
    display: none;
    gap: 5px;
    height: 280px; min-height: 100px; min-width: 250px;
    background: var(--chat-bg);
    color: var(--main-text);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(128,128,128,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    pointer-events: auto;
    resize: both; overflow: hidden;
    transition: background 0.3s;
}

#game-log { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.8rem; border-right: 1px solid rgba(0,0,0,0.1); }
#chat-box { flex: 1.2; padding: 10px; overflow-y: auto; font-size: 0.85rem; }
#chat-box div { margin-bottom: 4px; word-break: break-all; overflow-wrap: break-word; }

#chat-input-container {
    display: none;
    background: var(--rack-bg);
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    pointer-events: auto;
    align-items: center;
    padding: 5px; gap: 5px;
    position: relative;
    transition: background 0.3s;
}
#chat-input { flex: 1; background: transparent; border: none; padding: 8px; color: var(--main-text); outline: none; }

#my-rack { 
    height: 150px; 
    background: var(--rack-bg); 
    border-top: 2px solid rgba(0,0,0,0.1); 
    position: relative; 
    padding: 0 !important; 
    display: block !important;
    z-index: 600; 
    flex-shrink: 0;
    overflow-x: auto; 
    overflow-y: hidden; 
    transition: background 0.3s; 
}

#rack-controls { 
    position: absolute; 
    top: 5px; 
    right: 10px; 
    display: flex; 
    gap: 8px; 
    z-index: 700; 
    background: transparent !important;
}

button { 
    padding: 8px 16px; font-weight: 700; cursor: pointer; 
    border-radius: 8px; border: 1px solid rgba(128,128,128,0.2); 
    background: var(--btn-bg); color: var(--main-text); 
    transition: all 0.2s; 
}
button:hover { filter: brightness(1.1); transform: translateY(-1px); }

.player-badge {
    background: rgba(128,128,128,0.1); color: var(--main-text);
    padding: 5px 12px; border-radius: 15px;
    border: 1px solid rgba(0,0,0,0.1);
    font-size: 0.75rem; display: flex; align-items: center; gap: 8px;
    position: relative; transition: background 0.3s;
}
.active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52,152,219,0.2) !important; }
.tile-count { background: var(--main-text); color: var(--bg-color); padding: 1px 6px; border-radius: 5px; font-weight: 900; }

#overlay-layer, #entry-layer { 
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
    background: rgba(0,0,0,0.85); 
    backdrop-filter: blur(10px); 
    display: flex; justify-content: center; align-items: center; 
    z-index: 10000;
}
#entry-layer { z-index: 30000; }

.modal-card { 
    background: var(--modal-bg); color: var(--main-text); 
    padding: 40px; border-radius: 24px; text-align: center; min-width: 400px; 
    border: 1px solid rgba(255,255,255,0.1); 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: background 0.3s, color 0.3s;
}

#reg-score-badge {
    background: rgba(241,196,15,0.2); border: 1px solid var(--accent-gold);
    color: var(--accent-gold); padding: 5px 12px; border-radius: 15px;
    font-weight: 800; font-size: 0.8rem; margin-right: 10px; display: none;
}

.theme-selector { display: flex; gap: 5px; }
.theme-btn {
    width: 28px; height: 28px; padding: 0;
    display: flex; justify-content: center; align-items: center;
    font-size: 0.9rem;
    border-radius: 50% !important;
    border: 2px solid rgba(128,128,128,0.2) !important;
    cursor: pointer; background: white;
    transition: all 0.2s;
}
.theme-btn:hover { transform: scale(1.1); }
.theme-btn.active { border-color: var(--accent-purple) !important; box-shadow: 0 0 8px var(--accent-purple); }

@keyframes hint-glow {
    0%   { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
    50%  { box-shadow: 0 0 20px var(--accent-gold); transform: scale(1.05); }
    100% { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
}
.hint-target { animation: hint-glow 1s infinite; border: 2px solid var(--accent-gold) !important; z-index: 1000 !important; }

.lobby-player-tag { display: inline-flex; align-items: center; background: var(--turn-blue); color: #fff; padding: 8px 16px; border-radius: 20px; margin: 4px; font-weight: 800; font-size: 0.95rem; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
.lobby-player-tag.spec-tag { background: rgba(128,128,128,0.2); color: var(--main-text); border: 1px dashed rgba(128,128,128,0.5); box-shadow: none; }

.rank-table { width: 100%; margin-top: 15px; border-collapse: collapse; color: var(--main-text); font-size: 0.9rem; }
.rank-table th { border-bottom: 1px solid rgba(128,128,128,0.2); padding: 8px; color: var(--accent-gold); }
.rank-table td { padding: 8px; border-bottom: 1px solid rgba(128,128,128,0.1); }

#selection-box { position: absolute; border: 2px dashed rgba(52,152,219,0.9); background: rgba(52,152,219,0.12); pointer-events: none; display: none; z-index: 9999; border-radius: 4px; }

.emoji-bubble {
    position: absolute; 
    top: calc(100% + 5px);
    left: 50%;
    transform: translateX(-50%);
    background: white; 
    color: black;
    padding: 4px 10px;
    border-radius: 10px; 
    font-size: 0.85rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 99999; 
    pointer-events: none; 
    white-space: nowrap; 
    animation: bubble-pop 2.5s ease-in-out forwards;
    font-weight: 600;
}

.emote-btn { 
    font-size: 0.9rem;
    cursor: pointer; 
    background: rgba(255,255,255,0.05);
    border: none; 
    border-radius: 6px; 
    transition: all 0.2s; 
    padding: 6px 10px;
    color: var(--main-text); 
    width: calc(50% - 6px); 
    display: flex;
    align-items: center;
    gap: 6px;
}
.emoji-bubble::after { 
    content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    border-width: 0 6px 6px; border-style: solid; border-color: transparent transparent white;
}
@keyframes bubble-pop {
    0%   { opacity: 0; transform: translate(-50%, -10px) scale(0.5); }
    10%  { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
    20%  { transform: translate(-50%, 0) scale(1); }
    80%  { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, 15px); }
}

#emote-picker {
    display: none; 
    position: absolute; 
    bottom: 45px; 
    left: 0; 
    background: var(--panel-bg); 
    border-radius: 12px; 
    padding: 10px; 
    border: 1px solid rgba(0,0,0,0.1); 
    gap: 8px;
    flex-wrap: wrap; 
    width: 320px;
    z-index: 30000; 
    box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
    max-height: 250px;
    overflow-y: auto;
}

.emote-btn { 
    font-size: 1.1rem;
    cursor: pointer; 
    background: rgba(255,255,255,0.05);
    border: none; 
    border-radius: 8px;
    transition: all 0.2s; 
    padding: 8px 12px; 
    color: var(--main-text); 
    width: calc(50% - 8px);
    display: flex;
    align-items: center;
    gap: 10px;
}

.emote-btn:hover { 
    transform: translateY(-2px);
    background: rgba(255,255,255,0.15); 
}

body[data-theme='pink'] {
    --bg-color:    #fff0f7 !important;
    --panel-bg:    #ffd6e8 !important;
    --board-bg:    #ffe8f3 !important;
    --rack-bg:     #ffb6d4 !important;
    --modal-bg:    #fff0f7 !important;

    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🎀</text></svg>") 12 12, auto !important;
}

}

@keyframes kitty-glow { 0%, 100% { box-shadow: 0 0 8px rgba(255,105,180,0.5); } 50% { box-shadow: 0 0 20px rgba(255,105,180,0.9); } }
body[data-theme='pink'] .tile-count { background: #ff3385 !important; color: white !important; border-radius: 8px !important; }
body[data-theme='pink'] #chat-log-container { background: rgba(255,240,247,0.97) !important; border: 1.5px solid #ff85a1 !important; }
body[data-theme='pink'] #chat-input-container { background: linear-gradient(135deg, #ffd6e8, #ffb6d4) !important; border: 1.5px solid #ff85a1 !important; }
body[data-theme='pink'] #chat-input { color: #b5005b !important; }
body[data-theme='pink'] #pool-badge { background: linear-gradient(135deg, #ff69b4, #ff3385) !important; border: none !important; border-radius: 20px !important; box-shadow: 0 3px 10px rgba(255,51,133,0.4) !important; }
@keyframes hint-glow-pink { 0%, 100% { box-shadow: 0 0 5px #00e5ff; transform: scale(1); } 50% { box-shadow: 0 0 25px 8px #00e5ff; transform: scale(1.1); } }

body[data-theme='pink'] .danger-player { background: rgba(255,51,133,0.3) !important; border: 2px solid #ff3385 !important; animation: danger-pulse-pink 0.8s infinite !important; }
@keyframes danger-pulse-pink { 0%, 100% { box-shadow: 0 0 5px #ff3385; transform: scale(1); } 50% { box-shadow: 0 0 20px #ff3385; transform: scale(1.05); } }
body[data-theme='pink'] .modal-card { background: linear-gradient(145deg, #fff0f7, #ffd6e8) !important; border: 2px solid #ff85a1 !important; }
body[data-theme='pink'] .lobby-player-tag { background: linear-gradient(135deg, #ff69b4, #ff3385) !important; }

body[data-theme='pink'] #emote-picker { background: linear-gradient(145deg, #fff0f7, #ffd6e8) !important; border: 1.5px solid #ff85a1 !important; }

body[data-theme='vintage'] .tile-count { background:#8b5a3a!important; color:#fdf6ec!important; }

body[data-theme='cyber'] button:hover { background:#00ffcc!important; color:#000!important; }
body[data-theme='cyber'] .active-turn-badge { background:rgba(188,19,254,0.2)!important; border-color:#bc13fe!important; box-shadow:0 0 15px #bc13fe!important; animation:cyber-pulse 1.5s infinite!important; }
@keyframes cyber-pulse { 0%,100%{opacity:0.8;}50%{opacity:1;filter:brightness(1.2);} }

@keyframes screen-shake {
    0%   { transform: translate(0, 0) rotate(0deg); }
    10%  { transform: translate(-4px, -3px) rotate(-0.5deg); }
    20%  { transform: translate(4px, 3px) rotate(0.5deg); }
    30%  { transform: translate(-4px, 2px) rotate(0deg); }
    40%  { transform: translate(4px, -2px) rotate(0.3deg); }
    50%  { transform: translate(-3px, 3px) rotate(-0.3deg); }
    60%  { transform: translate(3px, -3px) rotate(0deg); }
    70%  { transform: translate(-2px, 2px) rotate(0.2deg); }
    80%  { transform: translate(2px, -1px) rotate(0deg); }
    90%  { transform: translate(-1px, 1px) rotate(0deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
}
.screen-shaking { animation: screen-shake 0.6s ease-in-out; }

.bgm-btn { font-size:1rem; padding:6px 10px; border-radius:12px; background:var(--btn-bg); border:1px solid rgba(128,128,128,0.3); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:5px; }
.bgm-btn.playing { border-color:var(--accent-purple); color:var(--accent-purple); box-shadow:0 0 10px rgba(157,80,187,0.3); }
    </style>
</head>

<body data-theme="classic">
<div id="main-container">

    <div id="ui-layer">
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="player-list-container" style="display:flex; gap:8px;"></div>
        </div>
        <div style="flex:1;"></div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="turn-info" style="font-weight:800; color:var(--turn-blue); min-width:80px; text-align:right;"></div>
            <div id="timer-display" style="font-weight:800; color:var(--accent-red); width:45px; text-align:center; font-size:1.1rem;"></div>
            <span id="reg-info" style="font-size:0.75rem; font-weight:700; background:rgba(0,0,0,0.05); padding:4px 8px; border-radius:8px;"></span>

            <div class="theme-selector" style="background:rgba(0,0,0,0.1); padding:4px; border-radius:20px; margin:0 10px;">
                <button class="theme-btn classic" onclick="window.setTheme('classic')" title="클래식">⚪</button>
                <button class="theme-btn dark"    onclick="window.setTheme('dark')"    title="다크">⚫</button>
                <button class="theme-btn pink"    onclick="window.setTheme('pink')"    title="키티">🎀</button>
                <button class="theme-btn vintage" onclick="window.setTheme('vintage')" title="빈티지 키티">🪞</button>
                <button class="theme-btn kitty"   onclick="window.setTheme('kitty')"   title="고전 키티">❤</button>
                <button class="theme-btn cinnamoroll" onclick="window.setTheme('cinnamoroll')" title="시나모롤">☁️</button>
                <button class="theme-btn pochacco" onclick="window.setTheme('pochacco')" title="포챠코">🐾</button>
                <button class="theme-btn navy"    onclick="window.setTheme('navy')"    title="딥 네이비">🌊</button>
                <button class="theme-btn cyber"   onclick="window.setTheme('cyber')"   title="네온">⚡</button>
                <button id="bgm-toggle-btn" class="bgm-btn" onclick="window.toggleBGM()" title="배경음악 ON/OFF">
                    <span id="bgm-icon">🔇</span> <span style="font-size:0.75rem;">BGM</span>
                </button>
            </div>

            <span id="reg-score-badge"></span>
            <span id="pool-badge" class="player-badge" style="background:var(--accent-purple); color:white; border:none;">POOL: 0</span>
            
            <button id="btn-force-next"  onclick="window.forceNextTurn()"  style="display:none; background:var(--accent-red); color:white;">턴 넘기기</button>
            <button id="btn-force-lobby" onclick="window.returnToLobby()"  style="display:none; background:#444; color:white;">리셋</button>
            
            <button onclick="window.fitBoard()" style="background:rgba(100,100,200,0.3);">🔍 화면 맞추기</button>
            <button onclick="window.showHint()" style="background:var(--accent-gold); color:#000;">힌트</button>
            <button id="btn-rollback" onclick="window.rollbackTurn()">무르기</button>
            <button id="btn-draw"     onclick="window.drawTile()">타일 뽑기</button>
            <button id="btn-end"      onclick="window.handleTurnEnd()" style="background:var(--accent-green); color:#000;">완료</button>
        </div>
    </div>

    <div id="game-board"
         ondragover="window.boardDragOver(event)"
         ondrop="window.dropOnBoard(event)"
         onmousedown="window.boardMouseDown(event)">
        <div id="board-canvas">
            <div id="selection-box"></div>
        </div>
        <div id="zoom-badge">100%</div>
        <div id="ctrl-hint">🖱️ Ctrl+드래그로 영역 선택 · Ctrl+클릭으로 타일 추가 선택</div>
    </div>

    <div id="chat-wrapper">
        <div id="chat-log-container">
            <div id="game-log"></div>
            <div id="chat-box"></div>
        </div>
        <div id="chat-input-container">
            <button onclick="window.toggleEmotePicker()" style="background:none; border:none; font-size:1.3rem; cursor:pointer; padding:0 5px;">😀</button>
            <input type="text" id="chat-input" placeholder="메시지..." onkeypress="if(event.keyCode==13) window.sendChat()">
            <div id="emote-picker"></div>
        </div>
    </div>

    <button onclick="window.toggleChat()" style="position:fixed; bottom:220px; right:20px; z-index:20001; background:var(--accent-purple); color:white; border-radius:20px; padding:10px 20px; font-weight:bold; border:none; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3);">📜 로그/채팅</button>

    <div id="my-rack" ondragover="event.preventDefault()" ondrop="window.dropOnRack(event)">
        <div id="rack-controls">
            <button onclick="window.setSortMode('number')">777 숫자</button>
            <button onclick="window.setSortMode('color')">123 색상</button>
            <button onclick="window.setSortMode('manual')" style="background:var(--accent-purple); color:white;">수동 정렬</button>
        </div>
    </div>

    <div id="overlay-layer">
        <div class="modal-card" id="modal-body"><h2>서버 연결 중...</h2></div>
    </div>

    <div id="entry-layer" style="display:none;">
        <div class="modal-card">
            <h2 style="color:var(--main-text);">🎮 루미큐브 입장</h2>
            <input type="text" id="nick-input" placeholder="닉네임 입력..." maxlength="10" 
                   style="padding:12px; width:80%; margin-bottom:15px; border-radius:10px; border:1px solid #ccc;">
            <br>
            <button onclick="window.handleEntry('player')"    style="background:var(--accent-purple); color:white; width:45%; padding:12px;">플레이어 입장</button>
            <button onclick="window.handleEntry('spectator')" style="background:#555; color:white; width:45%; padding:12px;">관전자 입장</button>
        </div>
    </div>

</div>

<script>
    let db; 
    let myName = "", myRole = "player", currentHost = "";
    let turnTimer = null, timeLeft = 60;
    let playerList = [], currentTurn = "", sortMode = 'color', manualOrder = [];
    let myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let initialBoardState = {};
    window.latestPlayersData = {};
    window.lastTileCounts = {};

    let panX = 0, panY = 0, scale = 1;
    let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;
    let zoomBadgeTimeout = null;
    const MIN_SCALE = 0.3, MAX_SCALE = 2.0, CANVAS_SIZE = 4000;

    let isCtrlDown = false;
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Control' || e.key === 'Meta') {
            isCtrlDown = true;
            const board = document.getElementById('game-board');
            if (board) board.classList.add('ctrl-mode');
            const hint = document.getElementById('ctrl-hint');
            if (hint) hint.classList.add('visible');
        }
        if (e.key === 'Escape') {
            document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
            selectedTiles = [];
        }
    });
    document.addEventListener('keyup', function(e) {
        if (e.key === 'Control' || e.key === 'Meta') {
            isCtrlDown = false;
            const board = document.getElementById('game-board');
            if (board) board.classList.remove('ctrl-mode');
            const hint = document.getElementById('ctrl-hint');
            if (hint) hint.classList.remove('visible');
        }
    });

    function applyTransform() {
        const c = document.getElementById('board-canvas');
        if (c) c.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    function clampPan() {
        const b = document.getElementById('game-board');
        if (!b) return;
        const bw = b.clientWidth, bh = b.clientHeight;
        panX = Math.min(0, Math.max(bw - CANVAS_SIZE * scale, panX));
        panY = Math.min(0, Math.max(bh - CANVAS_SIZE * scale, panY));
    }

    function showZoomBadge() {
        const badge = document.getElementById('zoom-badge');
        if (!badge) return;
        badge.innerText = Math.round(scale * 100) + '%';
        badge.classList.add('visible');
        clearTimeout(zoomBadgeTimeout);
        zoomBadgeTimeout = setTimeout(() => badge.classList.remove('visible'), 1500);
    }

    window.fitBoard = function() {
        const board = document.getElementById('game-board');
        if (!board) return;
        const tiles = Object.values(boardTiles);
        if (tiles.length === 0) {
            panX = 0; panY = 0; scale = 1;
            applyTransform(); showZoomBadge(); return;
        }
        let minTx = Infinity, minTy = Infinity, maxTx = -Infinity, maxTy = -Infinity;
        tiles.forEach(t => {
            minTx = Math.min(minTx, t.x); minTy = Math.min(minTy, t.y);
            maxTx = Math.max(maxTx, t.x + 44); maxTy = Math.max(maxTy, t.y + 64);
        });
        const pad = 100, bw = board.clientWidth, bh = board.clientHeight;
        const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE,
            Math.min(bw / (maxTx - minTx + pad * 2), bh / (maxTy - minTy + pad * 2))));
        scale = newScale;
        panX = (bw / 2) - ((minTx + maxTx) / 2) * scale;
        panY = (bh / 2) - ((minTy + maxTy) / 2) * scale;
        clampPan();
        applyTransform(); showZoomBadge();
    };

    function screenToCanvas(sx, sy) {
        const board = document.getElementById('game-board');
        const rect = board.getBoundingClientRect();
        return { x: (sx - rect.left - panX) / scale, y: (sy - rect.top - panY) / scale };
    }

    window.boardMouseDown = function(e) {
        const isTile = e.target.classList.contains('tile');
        const ctrlHeld = e.ctrlKey || e.metaKey;

        if (ctrlHeld && isTile) {
            if (myRole !== 'player' || currentTurn !== myName) return;
            const tileId = e.target.id;
            if (selectedTiles.includes(tileId)) {
                selectedTiles = selectedTiles.filter(id => id !== tileId);
                e.target.classList.remove('selected-tile');
            } else {
                selectedTiles.push(tileId);
                e.target.classList.add('selected-tile');
            }
            e.preventDefault();
            return;
        }

        if (ctrlHeld && !isTile) {
            window.startSelection(e);
            return;
        }

        if (!isTile) {
            if (selectedTiles.length > 0) {
                document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
                selectedTiles = [];
            }
            isPanning = true;
            panStartX = e.clientX; panStartY = e.clientY;
            panStartPX = panX; panStartPY = panY;
            document.getElementById('game-board').classList.add('panning');
            e.preventDefault();
        }
    };

    window.boardDragOver = function(e) { e.preventDefault(); };

    document.addEventListener('mousemove', function(e) {
        if (isPanning) {
            panX = panStartPX + (e.clientX - panStartX);
            panY = panStartPY + (e.clientY - panStartY);
            clampPan();
            applyTransform();
            return;
        }
        if (!isSelecting) return;
        const canvas = document.getElementById('board-canvas');
        if (!canvas) return;
        const cRect = canvas.getBoundingClientRect();
        const curX = (e.clientX - cRect.left) / scale;
        const curY = (e.clientY - cRect.top)  / scale;
        const left = Math.min(startX, curX), top = Math.min(startY, curY);
        const width = Math.abs(curX - startX), height = Math.abs(curY - startY);
        const selBox = document.getElementById('selection-box');
        selBox.style.left = left+'px'; selBox.style.top = top+'px';
        selBox.style.width = width+'px'; selBox.style.height = height+'px';
        selectedTiles = [];
        document.querySelectorAll('#board-canvas .tile').forEach(tile => {
            const tX = parseInt(tile.style.left), tY = parseInt(tile.style.top);
            const inBox = !(tX+44 < left || tX > left+width || tY+64 < top || tY > top+height);
            tile.classList.toggle('selected-tile', inBox);
            if (inBox) selectedTiles.push(tile.id);
        });
    });

    document.addEventListener('mouseup', function() {
        if (isPanning) {
            isPanning = false;
            document.getElementById('game-board').classList.remove('panning');
        }
        if (isSelecting) {
            isSelecting = false;
            const s = document.getElementById('selection-box');
            if (s) s.style.display = 'none';
        }
    });

    const SOUND_ASSETS = {
        bgm:         "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        tilePick:    "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3",
        tileDrop:    "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3",
        turnAlarm:   "https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3",
        error:       "https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3",
        success:     "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3",
        dangerAlarm: "https://assets.mixkit.co/active_storage/sfx/997/997-preview.mp3"
    };

    const audioCtx = { bgm: new Audio(SOUND_ASSETS.bgm), isBGMPlaying: false, currentVolume: 0.5 };
    audioCtx.bgm.loop = true;

    function playSFX(key) {
        const sfx = new Audio(SOUND_ASSETS[key]);
        sfx.volume = audioCtx.currentVolume;
        sfx.play().catch(() => {});
    }

    window.updateVolume = (val) => { audioCtx.currentVolume = val; audioCtx.bgm.volume = val; };

    window.setTheme = function(themeName) {
        document.body.setAttribute('data-theme', themeName);
        localStorage.setItem('lumi-theme', themeName);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active', btn.classList.contains(themeName));
        });
        if (window.applyAutoSort) window.applyAutoSort();
    };

    window.addGameLog = function(message) {
        if (!myName) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        db.ref('logs').push(`[${timeStr}] ${message}`);
    };

    window.timeOutPenalty = function() {
        if (window.isPenalizing) return; 
        window.isPenalizing = true;
        alert("시간 초과! 바닥 초기화 및 벌칙 타일 3개.");
        window.addGameLog(`⏰ ${myName}님이 시간 초과로 벌칙 타일 3개를 받았습니다.`);
        const up = {};
        Object.keys(boardTiles).forEach(k => { if(!initialBoardState[k]) up[`hands/${myName}/${k}`] = boardTiles[k]; });
        up['board'] = initialBoardState;
        db.ref('pool').limitToFirst(3).once('value', s => {
            if (s.exists()) {
                const poolObj = s.val();
                Object.keys(poolObj).forEach(key => {
                    up[`hands/${myName}/tile_${Date.now()}_${Math.random().toString(36).substr(2,5)}`] = poolObj[key];
                    up[`pool/${key}`] = null;
                });
            }
            db.ref('/').update(up).then(() => { playSFX('error'); window.nextTurnAction(); window.isPenalizing = false; });
        });
    };

    window.showHint = function() {
        if (myRole !== 'player' || currentTurn !== myName) return alert("내 차례에만 사용할 수 있습니다.");
        document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target'));
        const sets = [];
        const hand = [...myHandData];
        const isReg = window.latestPlayersData[myName]?.registered;

        const numMap = {};
        hand.forEach(t => {
            if (t.num === 'J') return;
            if (!numMap[t.num]) numMap[t.num] = [];
            if (!numMap[t.num].find(it => it.color === t.color)) numMap[t.num].push(t);
        });
        Object.values(numMap).forEach(group => { 
            if (group.length >= 3) sets.push(group.map(t => ({ type: 'rack', id: t.id }))); 
        });

        const colorMap = { 'red': [], 'blue': [], 'yellow': [], 'black': [] };
        hand.forEach(t => { if (t.num !== 'J') colorMap[t.color].push(t); });
        Object.values(colorMap).forEach(tiles => {
            tiles.sort((a, b) => Number(a.num) - Number(b.num));
            let currentRun = [];
            for (let i = 0; i < tiles.length; i++) {
                if (currentRun.length === 0 || Number(tiles[i].num) === Number(currentRun[currentRun.length-1].num) + 1) {
                    currentRun.push(tiles[i]);
                } else if (Number(tiles[i].num) !== Number(currentRun[currentRun.length-1].num)) {
                    if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
                    currentRun = [tiles[i]];
                }
            }
            if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
        });

        if (isReg) {
            const rows = {};
            Object.entries(boardTiles).forEach(([id, t]) => { t.id = id; if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
            for (let y in rows) {
                const rowTiles = rows[y].sort((a, b) => a.x - b.x);
                let currentBoardSet = [];
                for (let i = 0; i < rowTiles.length; i++) {
                    currentBoardSet.push(rowTiles[i]);
                    if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                        if (currentBoardSet.length >= 3) {
                            const nonJokers = currentBoardSet.filter(t => t.num !== 'J');
                            if (nonJokers.length > 0) {
                                const isGroup = nonJokers.every(t => t.num === nonJokers[0].num);
                                hand.forEach(handTile => {
                                    if (handTile.num === 'J') return;
                                    if (isGroup && currentBoardSet.length < 4) {
                                        const boardColors = currentBoardSet.map(t => t.color);
                                        if (handTile.num === nonJokers[0].num && !boardColors.includes(handTile.color)) {
                                            sets.push([{ type:'rack', id:handTile.id }, ...currentBoardSet.map(t => ({ type:'board', id:t.id }))]);
                                        }
                                    } else if (!isGroup) {
                                        const color = nonJokers[0].color;
                                        const firstRealIdx = currentBoardSet.findIndex(t => t.num !== 'J');
                                        const firstRealNum = Number(currentBoardSet[firstRealIdx].num);
                                        const firstNum = firstRealNum - firstRealIdx;
                                        const lastNum = firstNum + currentBoardSet.length - 1;
                                        const hn = Number(handTile.num);
                                        if (handTile.color === color && ((hn === firstNum-1 && hn >= 1) || (hn === lastNum+1 && hn <= 13))) {
                                            sets.push([{ type:'rack', id:handTile.id }, ...currentBoardSet.map(t => ({ type:'board', id:t.id }))]);
                                        }
                                    }
                                });
                            }
                        }
                        currentBoardSet = [];
                    }
                }
            }
        }

        if (sets.length === 0) return alert("현재 낼 수 있는 타일이 없습니다.");
        const allTargetIds = new Set();
        sets.forEach(setInfo => setInfo.forEach(item => allTargetIds.add(item.type === 'board' ? item.id : "rack-" + item.id)));
        allTargetIds.forEach(domId => { const el = document.getElementById(domId); if (el) el.classList.add('hint-target'); });
        setTimeout(() => document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target')), 5000);
    };

    window.handleEntry = function(role, isAuto = false) {
        if (!db) return setTimeout(() => window.handleEntry(role, isAuto), 100);
        if (!isAuto) {
            const nickInput = document.getElementById('nick-input');
            if (!nickInput.value.trim()) return alert("닉네임을 입력하세요!");
            myName = nickInput.value.trim(); myRole = role;
        } else {
            myName = window.sessionStorage.getItem('lumi-nick');
            myRole = window.sessionStorage.getItem('lumi-role') || "player";
        }
        window.sessionStorage.setItem('lumi-nick', myName);
        window.sessionStorage.setItem('lumi-role', myRole);
        db.ref('players/' + myName).update({ joined: true, timestamp: Date.now(), role: myRole });
        db.ref('players/' + myName + '/joined').onDisconnect().set(false);
        document.getElementById('entry-layer').style.display = 'none';
        if (!isAuto) playSFX('success');

        db.ref('board').once('value', snap => { initialBoardState = snap.val() || {}; });

        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            window.applyAutoSort();
        });
    };

    window.updatePlayerListUI = function() {
        const listEl = document.getElementById('player-list-container');
        if (!listEl) return;
        listEl.innerHTML = '';
        playerList.forEach(name => {
            const badge = document.createElement('span');
            badge.id = `badge-${name}`;
            const pData = window.latestPlayersData[name] || {};
            const isDanger = (pData.tileCount <= 3 && pData.tileCount > 0) ? 'danger-player' : '';
            badge.className = `player-badge ${name === currentTurn ? 'active-turn-badge' : ''} ${isDanger}`;
            if (myRole === 'spectator') badge.style.cursor = 'pointer';
            badge.innerHTML = `${name === currentHost ? '👑 ' : ''}${name} <span class="tile-count">${pData.tileCount || 0}</span>`;
            badge.onclick = () => { if (myRole === 'spectator') window.viewPlayerHand(name); };
            listEl.appendChild(badge);
        });
        Object.entries(window.latestPlayersData).forEach(([name, data]) => {
            if (!data.joined || data.role !== 'spectator') return;
            const badge = document.createElement('span');
            badge.id = `badge-${name}`;

    function isValidSet(tiles) {
        if (tiles.length < 3) return false;
        const jokers = tiles.filter(t => t.num === 'J');
        const nonJokers = tiles.filter(t => t.num !== 'J');
        if (nonJokers.length === 0) return true;
        const isGroup = () => {
            const targetNum = nonJokers[0].num;
            const colors = nonJokers.map(t => t.color);
            return nonJokers.every(t => t.num === targetNum) && (new Set(colors)).size === colors.length && tiles.length <= 4;
        };
        const isRun = () => {
            const targetColor = nonJokers[0].color;
            if (!nonJokers.every(t => t.color === targetColor)) return false;
            const nums = nonJokers.map(t => Number(t.num)).sort((a, b) => a - b);
            if (new Set(nums).size !== nums.length) return false;
            let gapSum = 0;
            for (let i = 0; i < nums.length - 1; i++) gapSum += (nums[i+1] - nums[i] - 1);
            if (gapSum > jokers.length) return false;
            const remainingJokers = jokers.length - gapSum;
            const totalLength = (nums[nums.length-1] - nums[0] + 1) + remainingJokers;
            return totalLength === tiles.length;
        };
        return isGroup() || isRun();
    }

    function validateBoard() {
        const rows = {};
        Object.values(boardTiles).forEach(t => { if (!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
        for (let y in rows) {
            const rowTiles = rows[y].sort((a,b) => a.x - b.x);
            let currentSet = [];
            for (let i = 0; i < rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                    if (!isValidSet(currentSet)) return false;
                    currentSet = [];
                }
            }
        }
        return true;
    }

    // =============================================
    // [버그수정 1] dropOnBoard: 자기 차례가 아니면 드롭 무시
    // ondragstart에서 막더라도 dataTransfer 타이밍 등으로
    // 우회될 수 있으므로 DB 쓰기 직전에 반드시 재검증
    // =============================================
    window.dropOnBoard = function(e) {
        e.preventDefault();
        if (myRole !== 'player' || currentTurn !== myName) return;
        const rawData = e.dataTransfer.getData("text/plain");
        if (!rawData) return;
        let dragInfo;
        try { dragInfo = JSON.parse(rawData); } catch(err) { dragInfo = { primary: rawData, group: [rawData] }; }

        const primaryId = dragInfo.primary;
        const groupIds = dragInfo.group;

        const pos = screenToCanvas(e.clientX, e.clientY);
        let dropX = pos.x - 22, dropY = pos.y - 32;

        const SNAP_DIST = 40, TILE_W = 48, TILE_H = 68;
        let snapped = false;
        Object.entries(boardTiles).forEach(([tid, t]) => {
            if (groupIds.includes(tid) || snapped) return;
            const dx = dropX - t.x, dy = dropY - t.y;
            if (Math.abs(dy) < SNAP_DIST) {
                if (dx > 0 && dx < SNAP_DIST*2)        { dropX = t.x + TILE_W; dropY = t.y; snapped = true; }
                else if (dx < 0 && dx > -SNAP_DIST*2)  { dropX = t.x - TILE_W; dropY = t.y; snapped = true; }
            }
            if (!snapped && Math.abs(dx) < SNAP_DIST) {
                if (dy > 0 && dy < SNAP_DIST*2)        { dropY = t.y + TILE_H; dropX = t.x; snapped = true; }
                else if (dy < 0 && dy > -SNAP_DIST*2)  { dropY = t.y - TILE_H; dropX = t.x; snapped = true; }
            }
        });

        dropX = Math.max(0, Math.min(CANVAS_SIZE - 44, dropX));
        dropY = Math.max(0, Math.min(CANVAS_SIZE - 64, dropY));

        const updates = {};
        let primaryTileData = boardTiles[primaryId];
        let deltaX = primaryTileData ? (dropX - primaryTileData.x) : 0;
        let deltaY = primaryTileData ? (dropY - primaryTileData.y) : 0;

        let isOverlapping = false;
        Object.entries(boardTiles).forEach(([tid, t]) => {
            if (groupIds.includes(tid)) return;
            if (Math.abs(t.y - dropY) < 10 && Math.abs(t.x - dropX) < 10) isOverlapping = true;
        });
        if (isOverlapping) {
            const pushDist = TILE_W * groupIds.length;
            Object.entries(boardTiles).forEach(([tid, t]) => {
                if (groupIds.includes(tid)) return;
                if (Math.abs(t.y - dropY) < 10 && t.x >= dropX - 5) updates[`board/${tid}/x`] = t.x + pushDist;
            });
        }

        db.ref(`hands/${myName}`).once('value', s => {
            const handData = s.val() || {};
            const isFromRack = (id) => !!handData[id];
            groupIds.forEach((id, idx) => {
                const fromRack = isFromRack(id);
                let targetX = fromRack ? dropX + (idx * 48) : boardTiles[id] ? boardTiles[id].x + deltaX : dropX;
                let targetY = fromRack ? dropY : boardTiles[id] ? boardTiles[id].y + deltaY : dropY;
                if (fromRack) {
                    updates[`board/${id}`] = { ...handData[id], x: targetX, y: targetY };
                    updates[`hands/${myName}/${id}`] = null;
                } else if (boardTiles[id]) {
                    updates[`board/${id}/x`] = targetX;
                    updates[`board/${id}/y`] = targetY;
                }
            });
            db.ref('/').update(updates).then(() => playSFX('tileDrop')).catch(err => console.error("타일 이동 에러:", err));
            document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
            selectedTiles = [];
        });
    };

    window.applyAutoSort = function() {
        const rEl = document.getElementById('my-rack');
        if (!rEl) return;
        if (sortMode === 'manual' && manualOrder.length > 0) {
            myHandData.sort((a, b) => {
                const ai = manualOrder.indexOf(a.id), bi = manualOrder.indexOf(b.id);
                if (ai === -1) return 1; if (bi === -1) return -1; return ai - bi;
            });
        } else {
            const coMap = { 'red':1, 'blue':2, 'yellow':3, 'black':4, 'joker':5 };
            myHandData.sort((a, b) => {
                const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num);
                return sortMode === 'color' ? (coMap[a.color]-coMap[b.color] || vA-vB) : (vA-vB || coMap[a.color]-coMap[b.color]);
            });
        }
        rEl.querySelectorAll('.tile').forEach(t => t.remove());
        myHandData.forEach((t, index) => {
            if (!t || t.num === undefined) return;
            const div = document.createElement('div');
            div.id = "rack-" + t.id;
            div.className = `tile ${t.color}`;
            div.innerText = t.num;
            div.draggable = (myRole === 'player');
            div.style.position = 'absolute';
            div.style.left = (index * 48 + 10) + 'px';
            div.style.top  = '45px';
            div.style.margin = '0';
            div.ondragstart = (e) => {
                if (myRole !== 'player') return e.preventDefault();
                let dragData = { primary: t.id, group: [t.id] };
                if (selectedTiles.includes(t.id)) { dragData.group = selectedTiles; }
                else { document.querySelectorAll('.selected-tile').forEach(el => el.classList.remove('selected-tile')); selectedTiles = []; }
                e.dataTransfer.setData("text/plain", JSON.stringify(dragData));
                e.dataTransfer.setData("source", "rack");
                playSFX('tilePick');
            };
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                e.preventDefault(); e.stopPropagation();
                const rawData = e.dataTransfer.getData("text/plain");
                const src = e.dataTransfer.getData("source");
                let dId = rawData;
                try { const parsed = JSON.parse(rawData); dId = parsed.primary; } catch(err) {}
                if (src === "rack") window.moveTileInRack(dId, t.id);
                else window.dropOnRack(e);
            };
            rEl.appendChild(div);
        });
    };

    window.renderLobbyUI = function() {
        const modalBody = document.getElementById('modal-body');
        const isHost = (myName === currentHost);
        const allUsers = Object.entries(window.latestPlayersData);
        let tags = allUsers.map(([name, data]) => {
            if (!data.joined) return '';
            const isSpec = data.role === 'spectator';
            return `<span class="lobby-player-tag ${isSpec ? 'spec-tag' : ''}">${name === currentHost ? '👑 ' : ''}${name}${isSpec ? ' (관전)' : ''}</span>`;
        }).join('');
        const resetRankBtn = isHost ? `<button onclick="window.resetRank()" style="background:rgba(128,128,128,0.2); color:var(--main-text); padding:5px 10px; font-size:0.8rem; margin-top:10px;">전적 초기화</button>` : '';
        modalBody.innerHTML = `
            <h2 style="color:var(--main-text);">🎮 루미큐브 대기실</h2>
            <div style="text-align:left; background:rgba(128,128,128,0.1); padding:15px; border-radius:10px; margin-bottom:15px;">${tags}</div>
            <h3 style="color:var(--accent-gold); margin-bottom:5px;">🏆 명예의 전당</h3>
            <div id="rank-container" style="color:var(--main-text); font-size:0.9rem;">전적 로딩 중...</div>
            ${resetRankBtn}
            <div style="margin-top:20px; margin-bottom:20px;">
                <button class="mode-btn ${gameMode==='normal'?'selected':''}" onclick="db.ref('settings/gameMode').set('normal')">보통 (4인)</button>
                <button class="mode-btn ${gameMode==='expert'?'selected':''}" onclick="db.ref('settings/gameMode').set('expert')">전문가 (6인)</button>
            </div>
            ${isHost ? '<button onclick="window.startGame()" style="background:var(--accent-green); color:#000; width:100%; padding:15px; font-weight:900;">게임 시작</button>' : '<p style="color:var(--accent-gold);">방장이 게임을 시작하기를 기다리는 중...</p>'}
        `;
        window.getRankHtml().then(html => { const rankBox = document.getElementById('rank-container'); if (rankBox) rankBox.innerHTML = html; });
    };

    window.renderResultUI = function() {
        db.ref('settings/gameResult').once('value', snap => {
            const data = snap.val(); if (!data) return;
            const modalBody = document.getElementById('modal-body');
            let html = `<h1 style="color:var(--accent-gold);">🏆 WINNER: ${data.winner}!</h1>`;
            Object.entries(data.scores).sort((a,b) => a[1]-b[1]).forEach(([name, score]) => {
                html += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(0,0,0,0.1);"><span>${name}</span><span>${name === data.winner ? 'WINNER' : score + '점'}</span></div>`;
            });
            if (myName === currentHost) html += `<button onclick="window.returnToLobby()" style="margin-top:20px; width:100%; padding:10px;">대기실로 돌아가기</button>`;
            modalBody.innerHTML = html;
        });
    };

    window.setSortMode = (m) => { sortMode = m; if (m === 'manual') manualOrder = myHandData.map(t => t.id); window.applyAutoSort(); };

    window.nextTurnAction = () => {
        const nextPlayer = playerList[(playerList.indexOf(currentTurn) + 1) % playerList.length];
        db.ref('/').update({ 'currentTurn': nextPlayer, 'settings/turnStartTime': firebase.database.ServerValue.TIMESTAMP });
    };

    window.returnToLobby = () => {
        if (confirm("방 전체 데이터를 완전히 초기화할까요?")) {
            const updates = { "settings/status":"waiting", "board":null, "hands":null, "pool":null, "settings/gameResult":null };
            const shuffled = [...playerList].sort(() => Math.random() - 0.5);
            shuffled.forEach((name, idx) => { updates[`players/${name}/timestamp`] = idx * 1000 + Math.floor(Math.random() * 999); });
            db.ref('/').update(updates).then(() => { window.addGameLog("🔀 다음 판 플레이어 순서가 랜덤으로 섞였습니다."); });
        }
    };

    window.moveTileInRack = function(dId, tId) {
        if (dId === tId) return;
        if (sortMode !== 'manual') { sortMode = 'manual'; manualOrder = myHandData.map(t => t.id); }
        const fIdx = manualOrder.indexOf(dId), tIdx = manualOrder.indexOf(tId);
        if (fIdx > -1 && tIdx > -1) { manualOrder.splice(fIdx, 1); manualOrder.splice(tIdx, 0, dId); playSFX('tileDrop'); window.applyAutoSort(); }
    };

    window.forceNextTurn = () => { if (confirm("다음 차례로 넘길까요?")) window.nextTurnAction(); };

    window.sendChat = () => {
        const input = document.getElementById('chat-input');
        if (!input || !input.value.trim()) return;
        const colorEl = document.getElementById('chat-color-input');
        const color = colorEl ? colorEl.value : "var(--main-text)";
        db.ref('chats').push({ name: myName, msg: input.value.trim(), color });
        input.value = '';
    };

    window.toggleBGM = () => {
        const btn = document.getElementById('bgm-toggle-btn');
        const icon = document.getElementById('bgm-icon');
        if (audioCtx.isBGMPlaying) {
            audioCtx.bgm.pause(); audioCtx.isBGMPlaying = false;
            btn.classList.remove('playing'); icon.innerText = '🔇';
        } else {
            audioCtx.bgm.play().then(() => {
                audioCtx.isBGMPlaying = true; btn.classList.add('playing'); icon.innerText = '🔊';
            }).catch(err => { console.error("BGM 재생 실패:", err); alert("브라우저 설정에 의해 차단되었습니다. 화면을 한 번 클릭 후 다시 눌러주세요!"); });
        }
    };

    window.viewPlayerHand = function(targetName) {
        if (myRole !== 'spectator') return;
        const regInfoEl = document.getElementById('reg-info');
        regInfoEl.innerText = `👀 ${targetName} 님의 패 관전 중...`;
        regInfoEl.style.color = "var(--turn-blue)";
        db.ref('hands/' + targetName).once('value', snap => {
            const handData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            const coMap = { 'red':1, 'blue':2, 'yellow':3, 'black':4, 'joker':5 };
            handData.sort((a,b) => { const vA = a.num==='J'?99:Number(a.num), vB = b.num==='J'?99:Number(b.num); return coMap[a.color]-coMap[b.color]||vA-vB; });
            const rEl = document.getElementById('my-rack');
            rEl.querySelectorAll('.tile').forEach(t => t.remove());
            handData.forEach((t, index) => {
                const div = document.createElement('div');
                div.className = `tile ${t.color}`; div.innerText = t.num; div.draggable = false;
                div.style.position = 'absolute'; div.style.left = (index * 48 + 10) + 'px'; div.style.top = '45px';
                rEl.appendChild(div);
            });
        });
    };

    window.toggleChat = () => {
        const c = document.getElementById('chat-log-container');
        const i = document.getElementById('chat-input-container');
        const isVisible = c.style.display === 'flex';
        c.style.display = isVisible ? 'none' : 'flex';
        i.style.display = isVisible ? 'none' : 'flex';
    };

    window.updateRegScoreUI = function() {
        const scoreBadge = document.getElementById('reg-score-badge');
        const isReg = window.latestPlayersData[myName]?.registered;
        if (isReg || currentTurn !== myName || myRole !== 'player') { scoreBadge.style.display = 'none'; return; }
        let currentPts = 0;
        Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) currentPts += (t.num==='J' ? 30 : Number(t.num)); });
        scoreBadge.innerText = `등록 점수: ${currentPts} / 30`;
        scoreBadge.style.display = 'inline-block';
        scoreBadge.style.borderColor = currentPts >= 30 ? 'var(--accent-green)' : 'var(--accent-gold)';
        scoreBadge.style.color       = currentPts >= 30 ? 'var(--accent-green)' : 'var(--accent-gold)';
    };

    window.recordWin = function(winnerName) {
        if (!winnerName) return;
        const now = Date.now();
        if (window.lastWinRecordedTime && (now - window.lastWinRecordedTime < 3000)) { console.log("중복 승리 기록 차단"); return; }
        window.lastWinRecordedTime = now;
        db.ref(`stats/${winnerName}/wins`).transaction(curr => (curr || 0) + 1);
    };

    window.getRankHtml = function() {
        return new Promise(resolve => {
            db.ref('stats').once('value', snap => {
                const stats = snap.val() || {};
                let html = `<table class="rank-table"><tr><th>이름</th><th>누적 승리</th></tr>`;
                const sorted = Object.entries(stats).sort((a,b) => b[1].wins - a[1].wins);
                if (sorted.length === 0) html += `<tr><td colspan="2">전적이 없습니다.</td></tr>`;
                sorted.forEach(([name, data]) => { html += `<tr><td>${name}</td><td>${data.wins}회</td></tr>`; });
                html += `</table>`;
                resolve(html);
            });
        });
    };

    window.resetRank = function() {
        if (confirm("🏆 모든 명예의 전당 기록을 영구적으로 초기화할까요?"))
            db.ref('stats').remove().then(() => window.renderLobbyUI());
    };

    let isSelecting = false, startX, startY, selectedTiles = [];

    window.startSelection = function(e) {
        if (myRole !== 'player' || currentTurn !== myName) return;
        isSelecting = true;
        const canvas = document.getElementById('board-canvas');
        const cRect = canvas.getBoundingClientRect();
        startX = (e.clientX - cRect.left) / scale;
        startY = (e.clientY - cRect.top)  / scale;
        const selBox = document.getElementById('selection-box');
        selBox.style.cssText = `left:${startX}px; top:${startY}px; width:0; height:0; display:block;`;
        document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
        selectedTiles = [];
        e.preventDefault();
    };

    const EMOTE_SETS = [
    { e: '😋', t: '이게 되네?' },
    { e: '🔥', t: '가능한.' },
    { e: '👀', t: '빤히...빤히...' },
    { e: '😭', t: '아 진짜 왜 이래' },
    { e: '😘', t: '고마워~' },
    { e: '😨', t: '안 돼 안 돼 안 돼' },
    { e: '💀', t: '실화임?' },
    { e: '😱', t: '등록하지마' },
    { e: '🐱', t: '냐냐냥!!!' },
    { e: '🐶', t: '앙!' },
    { e: '👑', t: '퀸의 등장.' },
    { e: '😏', t: '워씽씌' },
    { e: '🔊', t: '하이얏!!!' },
    { e: '🍡', t: '쫀득쫀득' },
    { e: '🌙', t: '밤이 늦엇네.' },
    { e: '💤', t: '깊이 잠들렴.' }
];

    window.toggleEmotePicker = function() {
        const picker = document.getElementById('emote-picker');
        if (!picker) return;
        const isVisible = picker.style.display === 'flex';
        picker.style.display = isVisible ? 'none' : 'flex';
        if (!isVisible) {
            picker.innerHTML = '';
            EMOTE_SETS.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'emote-btn';
                btn.innerHTML = `<span>${item.e}</span> <span style="font-size:0.8rem; font-weight:normal;">${item.t}</span>`;
                btn.onclick = () => window.sendEmote(`${item.e} ${item.t}`);
                picker.appendChild(btn);
            });
        }
    };

    window.sendEmote = function(emote) {
        if (!myName || !db) return;
        db.ref('emotes').push({ name: myName, emote, time: Date.now() });
    };

    async function speakText(text, customPitch = 2.0, customRate = 1.3) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    
    const waitForVoices = () => new Promise(resolve => {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length) return resolve(voices);
        window.speechSynthesis.onvoiceschanged = () => resolve(window.speechSynthesis.getVoices());
    });
    
    const voices = await waitForVoices();
    const koreanVoice = voices.find(v => v.lang === 'ko-KR' && v.name.includes('female')) || 
                       voices.find(v => v.lang === 'ko-KR') || 
                       voices.find(v => v.lang.startsWith('ko'));
    
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR'; 
    utter.pitch = customPitch; 
    utter.rate = customRate;   
    utter.volume = 1.0;
    
    if (koreanVoice) utter.voice = koreanVoice;
    window.speechSynthesis.speak(utter);
}

    window.showBubble = function(playerName, emote) {
    if (emote.includes('냐냐냥')) {
        speakText('냐냐냥!!!', 2.0, 1.3);
    } 
    else if (emote.includes('앙!')) {
        speakText('ANG!', 1.8, 1.5);
    } 
    else if (emote.includes('퀸의 등장')) {
        speakText('퀸의 등장.', 0.8, 0.9);
    }
    else if (emote.includes('워씽씌')) {
        speakText('워씽씌?', 2.0, 0.7);
    }
    else if (emote.includes('하이얏!!!')) {
        speakText('하야앗!', 2.0, 0.8);
    }
    else if (emote.includes('쫀득쫀득')) {
        speakText('쫜.득.쫜.득.', 1.0, 0.6);
    }
    else if (emote.includes('밤이 늦엇네.')) {
        speakText('밤이 늦엇네.', 0.7, 0.8);
    }
    else if (emote.includes('깊이 잠들렴.')) {
        speakText('깊이 잠 들렴.', 0.6, 0.7);
    }

    let badge = document.getElementById(`badge-${playerName}`);
    if (!badge) {
        const listEl = document.getElementById('player-list-container');
        if (!listEl) return;
        badge = document.createElement('span');
        badge.id = `badge-${playerName}`; badge.className = 'player-badge';
        badge.style.opacity = '0.6'; badge.innerHTML = `👀 ${playerName}`;
        listEl.appendChild(badge);
    }
    const existing = badge.querySelector('.emoji-bubble');
    if (existing) existing.remove();
    const bubble = document.createElement('div');
    bubble.className = 'emoji-bubble'; bubble.innerText = emote;
    badge.appendChild(bubble);
    setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 2500);
};

    (function() {
        const wrapper = document.getElementById('chat-wrapper');
        let isDragging = false, offsetX, offsetY;
        wrapper.addEventListener('mousedown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            isDragging = true;
            offsetX = e.clientX - wrapper.getBoundingClientRect().left;
            offsetY = e.clientY - wrapper.getBoundingClientRect().top;
            wrapper.style.right = 'auto'; wrapper.style.bottom = 'auto';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            wrapper.style.left = (e.clientX - offsetX) + 'px';
            wrapper.style.top  = (e.clientY - offsetY) + 'px';
        });
        document.addEventListener('mouseup', function() { isDragging = false; });
    })();
</script>
</body>
</html>
