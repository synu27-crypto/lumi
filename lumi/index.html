<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>루미 : 어반 에디션 Pro+</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212; --panel-bg: rgba(30, 30, 30, 0.95); --tile-bg: #f8f5f0;
            --accent-purple: #9d50bb; --accent-green: #27ae60; --accent-gold: #f1c40f; --accent-red: #e74c3c;
            --chat-bg: rgba(25, 25, 25, 0.95); --turn-blue: #3498db;
        }
        body { background-color: var(--bg-color); color: #e0e0e0; margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; height: 100vh; overflow: hidden; user-select: none; }
        
        @keyframes pulse-border {
            0%, 100% { box-shadow: inset 0 0 20px rgba(52, 152, 219, 0.2); }
            50% { box-shadow: inset 0 0 60px rgba(52, 152, 219, 0.5); }
        }
        body.is-my-turn-frame { animation: pulse-border 1.5s infinite; }

        #main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        #ui-layer { height: 60px; padding: 0 20px; background: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 500; }
        
        #game-board { flex: 1; background: #1e1e1e; position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 75px; }
        #game-board.not-my-turn { pointer-events: none; filter: grayscale(0.6) brightness(0.7); }

        #reg-info { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px 25px; border-radius: 30px; border: 1.5px solid var(--accent-gold); color: var(--accent-gold); font-weight: bold; font-size: 0.85rem; z-index: 800; display: none; }

        .tile { width: 44px; height: 64px; background: var(--tile-bg); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.2rem; position: absolute; cursor: grab; border: 1px solid #d1d1d1; box-shadow: 0 4px 8px rgba(0,0,0,0.4); z-index: 10; }
        .tile.rack-tile { position: relative !important; left: auto !important; top: auto !important; flex-shrink: 0; }
        .tile.locked { filter: grayscale(1) opacity(0.4); cursor: not-allowed; }
        
        .red { color: #d63031 !important; border-bottom: 3px solid #d63031 !important; }
        .blue { color: #0984e3 !important; border-bottom: 3px solid #0984e3 !important; }
        .yellow { color: #f9ca24 !important; border-bottom: 3px solid #f9ca24 !important; }
        .black { color: #2d3434 !important; border-bottom: 3px solid #2d3434 !important; }
        .joker { color: #6c5ce7 !important; font-size: 1.6rem !important; }

        #chat-wrapper { position: fixed; bottom: 230px; right: 20px; width: 280px; z-index: 9999; display: flex; flex-direction: column; pointer-events: none; }
        #chat-box { height: 180px; background: var(--chat-bg); backdrop-filter: blur(10px); border-radius: 12px 12px 0 0; border: 1px solid rgba(255,255,255,0.15); overflow-y: auto; padding: 10px; pointer-events: auto; display: none; }
        #chat-input-container { display: none; background: #1a1a1a; border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; }
        #chat-toggle { align-self: flex-end; background: var(--accent-purple); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; pointer-events: auto; font-weight: bold; margin-top: 5px; }

        #my-rack { height: 210px; background: #151515; border-top: 1px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; z-index: 700; background: #151515; padding-bottom: 10px; }
        
        button { padding: 6px 14px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 6px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .active-sort { border: 1px solid #fff; background: rgba(255,255,255,0.2); color: var(--accent-gold); }
        .player-badge { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.7rem; display: flex; align-items: center; gap: 5px; }
        .is-reg-badge { border-color: var(--accent-green) !important; color: var(--accent-green) !important; }
        .tile-count { background: #fff; color: #000; padding: 1px 5px; border-radius: 4px; font-weight: 900; margin-left: 5px; font-size: 0.65rem; }

        #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: rgba(45, 45, 45, 0.95); padding: 30px; border-radius: 20px; text-align: center; min-width: 350px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="ui-layer">
        <div style="flex: 2.5; display: flex; align-items: center; gap: 12px;">
            <span style="font-weight: 900; font-size: 1.1rem;">루미</span>
            <div style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px;">
                <button id="btn-bgm" onclick="toggleBGM()" style="background:transparent; padding:0; font-size:0.6rem;">🎵 OFF</button>
                <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.2" oninput="changeVolume(this.value)" style="width:50px;">
            </div>
            <div id="player-list-container" style="display: flex; gap: 6px;"></div>
        </div>
        <div style="flex: 1.2; text-align: center;">
            <div id="turn-info" style="font-size: 0.75rem; font-weight: bold;">대기 중...</div>
            <button id="btn-force-next" onclick="forceNextTurn()" style="font-size: 8px; background: var(--accent-gold); color: #000; display: none;">턴 넘기기</button>
        </div>
        <div style="flex: 2; display: flex; align-items: center; gap: 8px; justify-content: flex-end;">
            <button id="btn-force-lobby" onclick="returnToLobby()" style="background:var(--accent-red); font-size:9px; display:none;">리셋</button>
            <button id="btn-start" onclick="startGame()" style="background:var(--accent-green); color:#000; display:none;">시작</button>
            <button id="btn-rollback" onclick="rollbackTurn()" disabled style="background:#555;">무르기</button>
            <button id="btn-draw" onclick="drawTile()" disabled style="background:var(--accent-purple);">뽑기</button>
            <button id="btn-end" onclick="handleTurnEnd()" disabled style="background:#444;">종료</button>
        </div>
    </div>
    
    <div id="game-board" ondragover="event.preventDefault()" ondrop="dropOnBoard(event)">
        <div id="reg-info">등록 점수 계산 중...</div>
        <div id="chat-wrapper">
            <div id="chat-box"></div>
            <div id="chat-input-container"><input type="text" id="chat-input" placeholder="메시지..." style="flex:1; background:transparent; border:none; padding:8px; color:#fff;" onkeypress="if(event.keyCode==13) sendChat()"></div>
            <button id="chat-toggle" onclick="toggleChat()">💬 채팅</button>
        </div>
        <div id="overlay-layer">
            <div class="modal-card"><div id="modal-body"><h2>준비 중...</h2></div><button id="btn-reset-lobby" onclick="returnToLobby()" style="display:none; width:100%; margin-top:20px; background:var(--accent-green);">대기실로 돌아가기</button></div>
        </div>
    </div>

    <div id="my-rack" ondragover="event.preventDefault()" ondrop="dropOnRack(event)">
        <div id="rack-controls">
            <button id="sort-num" onclick="setSortMode('number')">777 숫자</button>
            <button id="sort-col" onclick="setSortMode('color')">123 색상</button>
            <button id="sort-man" onclick="setSortMode('manual')">🖐 수동</button>
        </div>
    </div>
</div>

<audio id="bgm-audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg"></audio>

<script>
    window.onload = function() {
        const myName = prompt("닉네임을 입력하세요") || "게스트_" + Math.floor(Math.random()*100);
        
        const firebaseConfig = {
            apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY",
            authDomain: "lumi-b373e.firebaseapp.com",
            databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/",
            projectId: "lumi-b373e",
            storageBucket: "lumi-b373e.firebasestorage.app",
            messagingSenderId: "171246043706",
            appId: "1:171246043706:web:3733e35f0af044974b2b03",
            measurementId: "G-Q9F1532V40"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const UI = {
            set: (id, h) => { const el = document.getElementById(id); if (el) el.innerHTML = h; },
            text: (id, t) => { const el = document.getElementById(id); if (el) el.innerText = t; },
            show: (id, d = 'block') => { const el = document.getElementById(id); if (el) el.style.display = d; },
            hide: (id) => { const el = document.getElementById(id); if (el) el.style.display = 'none'; },
            disable: (id, b) => { const el = document.getElementById(id); if (el) el.disabled = b; }
        };

        let audioCtx = null, bgm = document.getElementById('bgm-audio');
        window.initAudio = function() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); };
        window.toggleBGM = function() { if (bgm.paused) { bgm.play(); UI.text('btn-bgm', "🎵 ON"); } else { bgm.pause(); UI.text('btn-bgm', "🎵 OFF"); } };
        window.changeVolume = function(v) { bgm.volume = v; };
        function playSnap() { if (!audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.frequency.setValueAtTime(600, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }

        let playerList = [], currentTurn = "", sortMode = 'color', myHandData = [], gameStatus = "waiting", boardTiles = {};
        let isRegistered = false, initialBoardState = {}, initialHandState = {}, registrationPoints = 0;

        db.ref(".info/connected").on("value", snap => {
            if (snap.val()) {
                const myRef = db.ref('players/' + myName);
                myRef.onDisconnect().remove();
                myRef.set({ joined: true, timestamp: firebase.database.ServerValue.TIMESTAMP, registered: false });
            }
        });

        // 👥 플레이어 리스트 및 패 개수 실시간 표시
        db.ref('players').on('value', pSnap => {
            const players = pSnap.val() || {};
            playerList = Object.entries(players).map(([n, d]) => ({ n, ...d })).sort((a, b) => (a.timestamp || Infinity) - (b.timestamp || Infinity)).map(p => p.n);
            const isHost = (playerList[0] === myName);
            isRegistered = players[myName]?.registered || false;

            if (gameStatus === "playing" && playerList.length >= 2 && playerList.length < 2) { 
                // 1:1 상황에서 한 명 나가면 종료 (테스트를 위해 플레이어 2명 이상일 때만 작동하도록 조건 강화)
                db.ref('settings/status').set("finished"); 
            }

            if (isHost) { UI.show('btn-start', 'inline-block'); UI.show('btn-force-lobby', 'inline-block'); UI.show('btn-force-next', 'inline-block'); } 
            else { UI.hide('btn-start'); UI.hide('btn-force-lobby'); UI.hide('btn-force-next'); }

            db.ref('hands').on('value', hSnap => {
                const allHands = hSnap.val() || {};
                const listEl = document.getElementById('player-list-container');
                if (!listEl) return;
                listEl.innerHTML = '';
                playerList.forEach((name, idx) => {
                    const reg = players[name]?.registered;
                    const hData = allHands[name] || {};
                    const count = Object.keys(hData).length;
                    const badge = document.createElement('span');
                    badge.className = `player-badge ${idx === 0 ? 'is-host-badge' : ''} ${reg ? 'is-reg-badge' : ''}`;
                    badge.innerHTML = `${idx === 0 ? '👑' : ''} ${name} <span class="tile-count">${count}</span>`;
                    listEl.appendChild(badge);
                });
            });
        });

        window.toggleChat = function() {
            const box = document.getElementById('chat-box'), inp = document.getElementById('chat-input-container'), btn = document.getElementById('chat-toggle');
            const open = box.style.display === 'block';
            box.style.display = open ? 'none' : 'block'; inp.style.display = open ? 'none' : 'flex';
            btn.innerText = open ? '💬 채팅' : '❌ 닫기'; if (!open) { box.scrollTop = box.scrollHeight; document.getElementById('chat-input').focus(); }
        };
        window.sendChat = function() { const i = document.getElementById('chat-input'); if (!i.value.trim()) return; db.ref('chat').push({ name: myName, msg: i.value.trim() }); i.value = ''; };
        db.ref('chat').limitToLast(15).on('child_added', snap => {
            const d = snap.val(), box = document.getElementById('chat-box'); if (!box) return;
            const div = document.createElement('div'); div.innerHTML = `<span style="color:var(--accent-gold); font-weight:bold;">${d.name}:</span> <span>${d.msg}</span>`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        });

        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            if (gameStatus === "waiting") { UI.show('overlay-layer', 'flex'); UI.hide('btn-reset-lobby'); UI.set('modal-body', `<h2>대기실</h2><p>방장이 시작하기를 기다리고 있습니다.</p>`); }
            else if (gameStatus === "finished") { UI.show('overlay-layer', 'flex'); UI.show('btn-reset-lobby', 'inline-block'); showRanking(); }
            else { UI.hide('overlay-layer'); }
        });

        db.ref('currentTurn').on('value', snap => {
            currentTurn = snap.val(); const isMy = (currentTurn === myName);
            if (isMy) { document.body.classList.add('is-my-turn-frame'); takeTurnSnapshot(); } 
            else { document.body.classList.remove('is-my-turn-frame'); UI.hide('reg-info'); }
            document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
            UI.disable('btn-draw', !isMy); UI.disable('btn-end', !isMy); UI.disable('btn-rollback', !isMy);
            UI.set('turn-info', isMy ? `<span style='color:var(--turn-blue)'>내 차례입니다!</span>` : `차례: ${currentTurn || '-'}`);
        });

        function takeTurnSnapshot() {
            db.ref('board').once('value', s => { initialBoardState = s.val() || {}; updateRegPoints(); });
            db.ref(`hands/${myName}`).once('value', s => { initialHandState = s.val() || {}; });
        }

        window.rollbackTurn = function() {
            if (!confirm("모든 동작을 무를까요?")) return;
            db.ref('board').set(initialBoardState); db.ref(`hands/${myName}`).set(initialHandState);
            registrationPoints = 0; updateRegPoints(); playSnap();
        };

        function renderTile(parent, id, data, isRack) {
            const div = document.createElement('div');
            const onBoard = !isRack;
            const isMineInTurn = onBoard && !initialBoardState[id]; 
            const isLocked = onBoard && !isMineInTurn && !isRegistered;
            div.className = `tile ${data.color} ${isRack ? 'rack-tile' : ''} ${isLocked ? 'locked' : ''}`;
            div.innerText = data.num; div.id = id; div.draggable = !isLocked;
            if (onBoard) { div.style.left = data.x + 'px'; div.style.top = data.y + 'px'; }
            div.ondragstart = (e) => { if (isLocked || (onBoard && currentTurn !== myName)) return e.preventDefault(); e.dataTransfer.setData("text/plain", id); };
            parent.appendChild(div);
        }

        function updateRegPoints() {
            const newTiles = Object.entries(boardTiles).filter(([id]) => !initialBoardState[id]);
            let points = 0;
            newTiles.forEach(([id, t]) => { points += (t.num === 'J' ? 10 : Number(t.num)); });
            registrationPoints = points;
            UI.show('reg-info', 'block');
            const regText = isRegistered ? `<span style="color:var(--accent-green)">등록 완료</span>` : `등록 점수: ${points}/30`;
            UI.set('reg-info', regText + " | 내 패: " + myHandData.length + "장");
        }

        window.dropOnBoard = function(e) {
            e.preventDefault(); if (currentTurn !== myName) return;
            const id = e.dataTransfer.getData("text/plain");
            const rect = document.getElementById('game-board').getBoundingClientRect();
            const x = e.clientX - rect.left - 22; const y = e.clientY - rect.top - 32;
            let snapX = Math.round(x / 50) * 50 + 2, snapY = Math.round(y / 75) * 75 + 2;
            const tileInHand = myHandData.find(t => t.id === id);
            if (tileInHand) { db.ref('board/' + id).set({ num: tileInHand.num, color: tileInHand.color, x: snapX, y: snapY }); db.ref('hands/' + myName + '/' + id).remove(); playSnap(); }
            else if (boardTiles[id]) { db.ref('board/' + id).update({ x: snapX, y: snapY }); playSnap(); }
        };

        window.dropOnRack = function(e) {
            e.preventDefault(); const id = e.dataTransfer.getData("text/plain");
            if (!isRegistered && initialBoardState[id]) return; 
            db.ref('board/' + id).once('value', s => { if (s.exists() && currentTurn === myName) { db.ref('hands/' + myName + '/' + id).set({ num: s.val().num, color: s.val().color }); db.ref('board/' + id).remove(); playSnap(); } });
        };

        function validateBoard() {
            const groups = []; const rows = {};
            Object.values(boardTiles).forEach(t => { const y = Math.round(t.y / 75); if (!rows[y]) rows[y] = []; rows[y].push(t); });
            for (let y in rows) {
                const row = rows[y].sort((a, b) => a.x - b.x); let cur = [row[0]];
                for (let i = 1; i < row.length; i++) { if (row[i].x - row[i-1].x <= 60) cur.push(row[i]); else { groups.push(cur); cur = [row[i]]; } }
                groups.push(cur);
            }
            if (!isRegistered) {
                if (Object.keys(boardTiles).length === Object.keys(initialBoardState).length) return true;
                for (let id in initialBoardState) {
                    const now = boardTiles[id]; if (!now || now.x !== initialBoardState[id].x || now.y !== initialBoardState[id].y) { alert("등록 전 기존 타일 조작 금지!"); return false; }
                }
            }
            for (let g of groups) {
                if (g.length < 3) return false;
                const nz = g.filter(t => t.num !== 'J'); if (nz.length === 0) continue;
                const isG = nz.every(t => t.num === nz[0].num), isR = nz.every(t => t.color === nz[0].color);
                if (isG) { const cls = nz.map(t => t.color); if (new Set(cls).size !== cls.length || g.length > 4) return false; }
                else if (isR) {
                    const s = g.map(t => t.num === 'J' ? -1 : Number(t.num)).sort((a, b) => a - b);
                    let jk = s.filter(v => v === -1).length, nums = s.filter(v => v !== -1);
                    for (let i=0; i<nums.length-1; i++) { const d = nums[i+1]-nums[i]; if (d===0) return false; jk -= (d-1); }
                    if (jk < 0) return false;
                } else return false;
            }
            return true;
        }

        window.handleTurnEnd = function() {
            if (!validateBoard()) return alert("조합 규칙 위반!");
            const newCount = Object.keys(boardTiles).length - Object.keys(initialBoardState).length;
            
            // 🚀 등록 로직
            if (!isRegistered && newCount > 0) {
                if (registrationPoints < 30) return alert("30점 미달!");
                db.ref('players/' + myName).update({ registered: true });
                isRegistered = true;
            }
            
            // 🏆 진짜 승리 판정: 내 손패가 0개일 때만 우승!
            if (myHandData.length === 0) {
                db.ref('settings/status').set("finished");
            } else {
                window.nextTurn();
            }
        };

        window.nextTurn = function() { const idx = (playerList.indexOf(currentTurn) + 1) % playerList.length; db.ref('currentTurn').set(playerList[idx]); };
        window.forceNextTurn = function() { if(confirm("강제 턴 넘기기?")) window.nextTurn(); };
        window.startGame = function() {
            if (!confirm("게임 시작?")) return;
            db.ref('/').update({ "settings/status": "preparing", "board": null, "hands": null });
            playerList.forEach(p => db.ref('players/' + p).update({ registered: false }));
            let pool = []; const co = ['red', 'blue', 'yellow', 'black'];
            co.forEach(c => { for(let i=1; i<=13; i++) { for(let j=0; j<2; j++) pool.push({ num: i, color: c }); } });
            pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
            pool.sort(() => Math.random() - 0.5); db.ref('currentTurn').set(playerList[0]);
            const ups = {}; playerList.forEach(p => { for(let i=0; i<14; i++) { const t = pool.pop(), id = 'tile_' + Math.random().toString(36).substr(2,9); ups['hands/' + p + '/' + id] = t; } });
            db.ref('/').update({ ...ups, pool: Object.assign({}, pool), "settings/status": "playing" });
        };
        window.drawTile = function() {
            if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("낸 타일을 회수하세요.");
            db.ref('pool').limitToFirst(1).once('value', s => { if (!s.exists()) return; const key = Object.keys(s.val())[0]; db.ref('hands/' + myName + '/tile_' + Date.now()).set(s.val()[key]); db.ref('pool/' + key).remove(); window.nextTurn(); });
        };
        window.returnToLobby = function() { if (confirm("리셋?")) db.ref('/').update({ "settings/status": "waiting", "board": null, "hands": null, "pool": null, "chat": null }); };
        function showRanking() {
            db.ref('hands').once('value', s => {
                const h = s.val() || {}; let res = playerList.map(n => { let sum = 0; Object.values(h[n]||{}).forEach(t => sum += (t.num === 'J' ? 30 : Number(t.num))); return { n, sum }; }).sort((a,b) => a.sum - b.sum);
                let html = `<h2>🎮 결과</h2><table style="width:100%">`;
                res.forEach((p, i) => html += `<tr style="${i===0?'color:var(--accent-gold)':''}"><td>${i+1}위</td><td>${p.n}</td><td>${p.sum}점</td></tr>`);
                UI.set('modal-body', html + `</table>`);
            });
        }

        db.ref('board').on('value', snap => { 
            const bEl = document.getElementById('game-board'); if(!bEl) return; 
            bEl.querySelectorAll('.tile').forEach(t => t.remove()); 
            boardTiles = snap.val() || {}; 
            for (let id in boardTiles) renderTile(bEl, id, boardTiles[id], false); 
            if (currentTurn === myName) updateRegPoints();
        });
        db.ref('hands/' + myName).on('value', snap => { myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val })); if(sortMode!=='manual') applyAutoSort(); renderRack(); if(currentTurn === myName) updateRegPoints(); });
        window.setSortMode = function(m) { sortMode = m; applyAutoSort(); renderRack(); };
        function applyAutoSort() { const co = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 }; myHandData.sort((a, b) => { const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); return sortMode === 'color' ? (co[a.color] - co[b.color] || vA - vB) : (vA - vB || co[a.color] - co[b.color]); }); }
        function renderRack() {
            const rEl = document.getElementById('my-rack'); if(!rEl) return; 
            rEl.querySelectorAll('.tile').forEach(el => el.remove()); 
            const btnId = sortMode === 'number' ? 'sort-num' : sortMode === 'color' ? 'sort-col' : 'sort-man';
            document.querySelectorAll('#rack-controls button').forEach(b => b.classList.toggle('active-sort', b.id === btnId));
            myHandData.forEach(t => renderTile(rEl, t.id, t, true));
        }
    };
</script>
</body>
</html>
