<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루미큐브 : Ver. 60.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">

    <style>
:root {
    --bg-color: #121212; 
    --panel-bg: #1e1e1e; 
    --board-bg: #181818;
    --rack-bg: #121212;
    --modal-bg: #252525;
    --main-text: #e0e0e0;
    --tile-bg: #ffffff;
    --tile-text-black: #2d3436;
    --accent-purple: #9d50bb; 
    --accent-green: #2ecc71; 
    --accent-gold: #f1c40f; 
    --accent-red: #e74c3c;
    --turn-blue: #3498db; 
    --chat-bg: rgba(20, 20, 20, 0.95);
    --btn-bg: rgba(255, 255, 255, 0.1);
}

body[data-theme='classic'] { 
    --bg-color: #f0f2f5; 
    --panel-bg: #ffffff; 
    --board-bg: #e4e6eb; 
    --rack-bg: #d8dadf; 
    --modal-bg: #ffffff; 
    --main-text: #1c1e21; 
    --tile-bg: #ffffff;
    --tile-text-black: #000000;
    --chat-bg: rgba(255, 255, 255, 0.95);
    --btn-bg: rgba(0, 0, 0, 0.05);
cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>👆</text></svg>") 5 5, auto !important;
}

body {
    background-color: var(--bg-color);
    color: var(--main-text);
    margin: 0;
    font-family: 'Inter', 'Pretendard', sans-serif;
    height: 100vh; width: 100vw;
    overflow: hidden;
    user-select: none;
    transition: background 0.3s, color 0.3s;
}

#main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }

#ui-layer {
    height: 60px; padding: 0 20px;
    background: var(--panel-bg);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    transition: background 0.3s;
    color: var(--main-text);
}

#game-board {
    flex: 1;
    background: var(--board-bg);
    position: relative;
    overflow: hidden;
    background-image: radial-gradient(circle, rgba(128,128,128,0.15) 1px, transparent 1px);
    background-size: 50px 75px;
    transition: background 0.3s;
}
#game-board.not-my-turn { pointer-events: none; opacity: 0.7; filter: brightness(0.8); }

body[data-theme='pink'] #game-board {
    background-color: var(--board-bg) !important;
    background-image: radial-gradient(circle, rgba(255, 102, 163, 0.2) 1px, transparent 1px) !important;
    filter: none !important;
}

.tile { 
    width: 44px; height: 64px; 
    background: var(--tile-bg) !important; 
    border-radius: 6px; 
    display: flex; justify-content: center; align-items: center; 
    font-weight: 800; font-size: 1.4rem; 
    box-shadow: 0 3px 0 #bbb, 0 4px 10px rgba(0,0,0,0.2); 
    border: 1px solid rgba(0,0,0,0.1);
    z-index: 10; cursor: grab; transition: transform 0.1s; 
}

.red    { color: #e44d26 !important; border-bottom: 4px solid #e44d26 !important; }
.blue   { color: #2980b9 !important; border-bottom: 4px solid #2980b9 !important; }
.yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }
.black  { color: var(--tile-text-black) !important; border-bottom: 4px solid #333 !important; }
.joker  { color: #8e44ad !important; font-size: 1.8rem !important; }

.selected-tile { 
    box-shadow: 0 0 10px 3px var(--turn-blue) !important; 
    transform: scale(1.05); 
    z-index: 50 !important;
}

#chat-wrapper {
    position: fixed;
    bottom: 270px !important;
    right: 20px;
    width: 500px;
    z-index: 20000;
    display: flex; flex-direction: column; gap: 5px;
    pointer-events: none;
}

#chat-log-container {
    display: none;
    gap: 5px;
    height: 280px; min-height: 100px; min-width: 250px;
    background: var(--chat-bg);
    color: var(--main-text);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(128,128,128,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    pointer-events: auto;
    resize: both; overflow: hidden;
    transition: background 0.3s;
}

#game-log { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.8rem; border-right: 1px solid rgba(0,0,0,0.1); }
#chat-box { flex: 1.2; padding: 10px; overflow-y: auto; font-size: 0.85rem; }
#chat-box div { margin-bottom: 4px; word-break: break-all; overflow-wrap: break-word; }

#chat-input-container {
    display: none;
    background: var(--rack-bg);
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    pointer-events: auto;
    align-items: center;
    padding: 5px; gap: 5px;
    position: relative;
    transition: background 0.3s;
}
#chat-input { flex: 1; background: transparent; border: none; padding: 8px; color: var(--main-text); outline: none; }

#my-rack { 
    height: 150px; 
    background: var(--rack-bg); 
    border-top: 2px solid rgba(0,0,0,0.1); 
    position: relative; 
    padding: 0 !important; 
    display: block !important;
    z-index: 600; 
    overflow-x: auto; 
    overflow-y: hidden; 
    transition: background 0.3s; 
}

#rack-controls { 
    position: absolute; 
    top: 5px; 
    right: 10px; 
    display: flex; 
    gap: 8px; 
    z-index: 700; 
    background: transparent !important;
}

button { 
    padding: 8px 16px; font-weight: 700; cursor: pointer; 
    border-radius: 8px; border: 1px solid rgba(128,128,128,0.2); 
    background: var(--btn-bg); color: var(--main-text); 
    transition: all 0.2s; 
}
button:hover { filter: brightness(1.1); transform: translateY(-1px); }

.player-badge {
    background: rgba(128,128,128,0.1); color: var(--main-text);
    padding: 5px 12px; border-radius: 15px;
    border: 1px solid rgba(0,0,0,0.1);
    font-size: 0.75rem; display: flex; align-items: center; gap: 8px;
    position: relative; transition: background 0.3s;
}
.active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52,152,219,0.2) !important; }
.tile-count { background: var(--main-text); color: var(--bg-color); padding: 1px 6px; border-radius: 5px; font-weight: 900; }

#overlay-layer, #entry-layer { 
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
    background: rgba(0,0,0,0.85); 
    backdrop-filter: blur(10px); 
    display: flex; justify-content: center; align-items: center; 
    z-index: 10000;
}
#entry-layer { z-index: 30000; }

.modal-card { 
    background: var(--modal-bg); color: var(--main-text); 
    padding: 40px; border-radius: 24px; text-align: center; min-width: 400px; 
    border: 1px solid rgba(255,255,255,0.1); 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: background 0.3s, color 0.3s;
}

#reg-score-badge {
    background: rgba(241,196,15,0.2); border: 1px solid var(--accent-gold);
    color: var(--accent-gold); padding: 5px 12px; border-radius: 15px;
    font-weight: 800; font-size: 0.8rem; margin-right: 10px; display: none;
}

.theme-selector { display: flex; gap: 5px; }
.theme-btn {
    width: 28px; height: 28px; padding: 0;
    display: flex; justify-content: center; align-items: center;
    font-size: 0.9rem;
    border-radius: 50% !important;
    border: 2px solid rgba(128,128,128,0.2) !important;
    cursor: pointer; background: white;
    transition: all 0.2s;
}
.theme-btn:hover { transform: scale(1.1); }
.theme-btn.active { border-color: var(--accent-purple) !important; box-shadow: 0 0 8px var(--accent-purple); }

@keyframes hint-glow {
    0%   { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
    50%  { box-shadow: 0 0 20px var(--accent-gold); transform: scale(1.05); }
    100% { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
}
.hint-target { animation: hint-glow 1s infinite; border: 2px solid var(--accent-gold) !important; z-index: 1000 !important; }

.lobby-player-tag { display: inline-flex; align-items: center; background: var(--turn-blue); color: #fff; padding: 8px 16px; border-radius: 20px; margin: 4px; font-weight: 800; font-size: 0.95rem; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
.lobby-player-tag.spec-tag { background: rgba(128,128,128,0.2); color: var(--main-text); border: 1px dashed rgba(128,128,128,0.5); box-shadow: none; }

.rank-table { width: 100%; margin-top: 15px; border-collapse: collapse; color: var(--main-text); font-size: 0.9rem; }
.rank-table th { border-bottom: 1px solid rgba(128,128,128,0.2); padding: 8px; color: var(--accent-gold); }
.rank-table td { padding: 8px; border-bottom: 1px solid rgba(128,128,128,0.1); }

#selection-box { position: absolute; border: 1px solid rgba(52,152,219,0.8); background: rgba(52,152,219,0.2); pointer-events: none; display: none; z-index: 9999; }

.emoji-bubble {
    position: absolute; 
    top: calc(100% + 5px);
    left: 50%;
    transform: translateX(-50%);
    background: white; 
    color: black;
    padding: 4px 10px;
    border-radius: 10px; 
    font-size: 0.85rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 99999; 
    pointer-events: none; 
    white-space: nowrap; 
    animation: bubble-pop 2.5s ease-in-out forwards;
    font-weight: 600;
}

.emote-btn { 
    font-size: 0.9rem;
    cursor: pointer; 
    background: rgba(255,255,255,0.05);
    border: none; 
    border-radius: 6px; 
    transition: all 0.2s; 
    padding: 6px 10px;
    color: var(--main-text); 
    width: calc(50% - 6px); 
    display: flex;
    align-items: center;
    gap: 6px;
}
.emoji-bubble::after { 
    content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    border-width: 0 6px 6px; border-style: solid; border-color: transparent transparent white;
}
@keyframes bubble-pop {
    0%   { opacity: 0; transform: translate(-50%, -10px) scale(0.5); }
    10%  { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
    20%  { transform: translate(-50%, 0) scale(1); }
    80%  { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, 15px); }
}

#emote-picker {
    display: none; 
    position: absolute; 
    bottom: 45px; 
    left: 0; 
    background: var(--panel-bg); 
    border-radius: 12px; 
    padding: 10px; 
    border: 1px solid rgba(0,0,0,0.1); 
    gap: 8px;
    flex-wrap: wrap; 
    width: 320px;
    z-index: 30000; 
    box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
    max-height: 250px;
    overflow-y: auto;
}

.emote-btn { 
    font-size: 1.1rem;
    cursor: pointer; 
    background: rgba(255,255,255,0.05);
    border: none; 
    border-radius: 8px;
    transition: all 0.2s; 
    padding: 8px 12px; 
    color: var(--main-text); 
    width: calc(50% - 8px);
    display: flex;
    align-items: center;
    gap: 10px;
}

.emote-btn:hover { 
    transform: translateY(-2px);
    background: rgba(255,255,255,0.15); 
}

body[data-theme='pink'] {
    --bg-color: #fff0f7 !important;
    --panel-bg: #ffd6e8 !important;
    --board-bg: #ffe8f3 !important;
    --rack-bg: #ffb6d4 !important;
    --modal-bg: #fff0f7 !important;
    --main-text: #b5005b !important;
    --turn-blue: #ff69b4 !important;
    --accent-gold: #ff85a1 !important;
    --accent-green:#ff4da6 !important;
    --btn-bg: rgba(255,182,210,0.4) !important;
    background-image: 
        radial-gradient(circle at 20% 20%, rgba(255,182,210,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,105,180,0.2) 0%, transparent 50%) !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🎀</text></svg>") 12 12, auto !important;
}

body[data-theme='pink'] #game-board {
    background-color: #ffe8f3 !important;
    background-image: 
        radial-gradient(circle, rgba(255,105,180,0.25) 1.5px, transparent 1.5px),
        radial-gradient(circle, rgba(255,182,210,0.15) 1px, transparent 1px) !important;
    background-size: 40px 40px, 20px 20px !important;
    background-position: 0 0, 10px 10px !important;
    filter: none !important;
}

body[data-theme='pink'] #ui-layer {
    background: linear-gradient(135deg, #ffd6e8 0%, #ffb6d4 50%, #ffd6e8 100%) !important;
    border-bottom: 3px solid #ff85a1 !important;
    box-shadow: 0 4px 15px rgba(255,105,180,0.3) !important;
}

body[data-theme='pink'] #my-rack {
    background: linear-gradient(180deg, #ffb6d4 0%, #ff85a1 100%) !important;
    border-top: 3px solid #ff69b4 !important;
    box-shadow: 0 -4px 15px rgba(255,105,180,0.3) !important;
}

body[data-theme='pink'] .tile,
body[data-theme='pink'] #main-container .tile,
body[data-theme='pink'] #game-board .tile,
body[data-theme='pink'] #my-rack .tile {
    background: linear-gradient(145deg, #fff5f8, #ffe4ef) !important;
    box-shadow: 
        0 4px 0 #e8789a,
        0 6px 15px rgba(255,105,180,0.35),
        inset 0 1px 0 rgba(255,255,255,0.9) !important;
    border: 1.5px solid #ffb6d4 !important;
    border-radius: 10px !important;
}

body[data-theme='pink'] button {
    background: linear-gradient(135deg, #fff0f7, #ffd6e8) !important;
    color: #b5005b !important;
    border: 1.5px solid #ff85a1 !important;
    border-radius: 20px !important;
    box-shadow: 0 3px 0 #e8789a, 0 4px 10px rgba(255,105,180,0.2) !important;
    font-weight: 800 !important;
}

body[data-theme='pink'] .player-badge {
    background: rgba(255,182,210,0.5) !important;
    border: 1.5px solid #ff85a1 !important;
    color: #b5005b !important;
    border-radius: 20px !important;
}

body[data-theme='pink'] .active-turn-badge {
    background: linear-gradient(135deg, #ff69b4, #ff85a1) !important;
    border-color: #ff3385 !important;
    color: white !important;
    animation: kitty-glow 1.5s ease-in-out infinite !important;
}

@keyframes kitty-glow {
    0%, 100% { box-shadow: 0 0 8px rgba(255,105,180,0.5); }
    50%       { box-shadow: 0 0 20px rgba(255,105,180,0.9); }
}

body[data-theme='dark'] {
    --bg-color: #0d0d0f !important;
    --panel-bg: #17181c !important;
    --board-bg: #111215 !important;
    --rack-bg: #0d0d0f !important;
    --modal-bg: #1c1d22 !important;
    --main-text: #e8e8f0 !important;
    --turn-blue: #5b8dee !important;
    --accent-gold: #e8b84b !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🖤</text></svg>") 12 12, auto !important;
}

body[data-theme='dark'] #game-board {
    background-color: #111215 !important;
    background-image:
        radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px) !important;
    background-size: 40px 40px, 20px 20px !important;
    filter: none !important;
}

body[data-theme='vintage'] {
    --bg-color: #f5ede0 !important;
    --panel-bg: #e8d5bc !important;
    --board-bg: #ede0cc !important;
    --rack-bg: #d9c4a8 !important;
    --main-text: #6b3a2a !important;
    --turn-blue: #c08060 !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🌸</text></svg>") 12 12, auto !important;
}

body[data-theme='kitty'] {
    --bg-color: #ffffff !important;
    --panel-bg: #fff0f0 !important;
    --board-bg: #fff5f5 !important;
    --rack-bg: #ffe0e0 !important;
    --main-text: #cc0000 !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🎀</text></svg>") 12 12, auto !important;
}

body[data-theme='cinnamoroll'] {
    --bg-color: #e8f4ff !important;
    --panel-bg: #c8e6ff !important;
    --board-bg: #daeeff !important;
    --rack-bg: #aed6f8 !important;
    --main-text: #1a4a7a !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>☁️</text></svg>") 12 12, auto !important;
}

body[data-theme='pochacco'] {
    --bg-color: #f0f0f8 !important;
    --panel-bg: #dcdcf0 !important;
    --board-bg: #e8e8f5 !important;
    --rack-bg: #c8c8e8 !important;
    --main-text: #2a2a5a !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🐾</text></svg>") 12 12, auto !important;
}

body[data-theme='navy'] {
    --bg-color: #0d1422 !important;
    --panel-bg: #162038 !important;
    --board-bg: #0f1828 !important;
    --rack-bg: #0d1422 !important;
    --main-text: #eef0f8 !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🌟</text></svg>") 12 12, auto !important;
}

body[data-theme='cyber'] {
    --bg-color: #050505 !important;
    --panel-bg: #0a0a0f !important;
    --board-bg: #08080a !important;
    --rack-bg: #050505 !important;
    --main-text: #00ffcc !important;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>⚡</text></svg>") 12 12, auto !important;
}

@keyframes screen-shake {
    0%   { transform: translate(0, 0) rotate(0deg); }
    10%  { transform: translate(-4px, -3px) rotate(-0.5deg); }
    20%  { transform: translate(4px, 3px) rotate(0.5deg); }
    30%  { transform: translate(-4px, 2px) rotate(0deg); }
    40%  { transform: translate(4px, -2px) rotate(0.3deg); }
    50%  { transform: translate(-3px, 3px) rotate(-0.3deg); }
    60%  { transform: translate(3px, -3px) rotate(0deg); }
    70%  { transform: translate(-2px, 2px) rotate(0.2deg); }
    80%  { transform: translate(2px, -1px) rotate(0deg); }
    90%  { transform: translate(-1px, 1px) rotate(0deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
}

.screen-shaking { animation: screen-shake 0.6s ease-in-out; }

.bgm-btn {
    font-size: 1rem;
    padding: 6px 10px;
    border-radius: 12px;
    background: var(--btn-bg);
    border: 1px solid rgba(128,128,128,0.3);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
}
.bgm-btn.playing {
    border-color: var(--accent-purple);
    color: var(--accent-purple);
    box-shadow: 0 0 10px rgba(157, 80, 187, 0.3);
}

/* ====================================================
   🎂 생일 축하 오버레이 스타일 (진금 전용)
   ==================================================== */
@keyframes bdFadeIn  { from{opacity:0;transform:scale(0.92);} to{opacity:1;transform:scale(1);} }
@keyframes bdFadeOut { from{opacity:1;transform:scale(1);}    to{opacity:0;transform:scale(0.92);} }

@keyframes bdBounce {
    0%,100% { transform: scale(1) rotate(-1.5deg); }
    50%     { transform: scale(1.1) rotate(1.5deg); }
}

@keyframes bdFloat {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-16px); }
}

@keyframes bdRainbow {
    0%   { color:#ff6b6b; text-shadow:0 0 30px rgba(255,100,100,0.8); }
    16%  { color:#ffd93d; text-shadow:0 0 30px rgba(255,220,60,0.8); }
    33%  { color:#6bcb77; text-shadow:0 0 30px rgba(107,203,119,0.8); }
    50%  { color:#4d96ff; text-shadow:0 0 30px rgba(77,150,255,0.8); }
    66%  { color:#c77dff; text-shadow:0 0 30px rgba(199,125,255,0.8); }
    83%  { color:#ff6b9d; text-shadow:0 0 30px rgba(255,107,157,0.8); }
    100% { color:#ff6b6b; text-shadow:0 0 30px rgba(255,100,100,0.8); }
}

@keyframes bdShimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
}

@keyframes bdSpark {
    0%   { opacity:0; transform:scale(0.4) rotate(0deg); }
    40%  { opacity:1; transform:scale(1.3) rotate(160deg); }

<script>
    let db; 
    let myName = "", myRole = "player", currentHost = "";
    let turnTimer = null, timeLeft = 60;
    let playerList = [], currentTurn = "", sortMode = 'color', manualOrder = [];
    let myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let initialBoardState = {};
    window.latestPlayersData = {};
    window.lastTileCounts = {};

    const SOUND_ASSETS = {
        bgm:       "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        tilePick:  "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3",
        tileDrop:  "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3",
        turnAlarm: "https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3",
        error:     "https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3",
        success:   "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3",
        dangerAlarm: "https://assets.mixkit.co/active_storage/sfx/997/997-preview.mp3"
    };

    const audioCtx = { bgm: new Audio(SOUND_ASSETS.bgm), isBGMPlaying: false, currentVolume: 0.5 };
    audioCtx.bgm.loop = true;

    function playSFX(key) {
        const sfx = new Audio(SOUND_ASSETS[key]);
        sfx.volume = audioCtx.currentVolume;
        sfx.play().catch(() => {});
    }

    window.updateVolume = (val) => { audioCtx.currentVolume = val; audioCtx.bgm.volume = val; };

    window.setTheme = function(themeName) {
        document.body.setAttribute('data-theme', themeName);
        localStorage.setItem('lumi-theme', themeName);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active', btn.classList.contains(themeName));
        });
        if(window.applyAutoSort) window.applyAutoSort();
    };

    window.addGameLog = function(message) {
        if (!myName) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        db.ref('logs').push(`[${timeStr}] ${message}`);
    };

    window.timeOutPenalty = function() {
        if (window.isPenalizing) return; 
        window.isPenalizing = true;
        alert("시간 초과! 바닥 초기화 및 벌칙 타일 3개.");
        window.addGameLog(`⏰ ${myName}님이 시간 초과로 벌칙 타일 3개를 받았습니다.`);
        const up = {};
        Object.keys(boardTiles).forEach(k => { if(!initialBoardState[k]) up[`hands/${myName}/${k}`] = boardTiles[k]; });
        up['board'] = initialBoardState;
        db.ref('pool').limitToFirst(3).once('value', s => {
            if (s.exists()) {
                const poolObj = s.val();
                Object.keys(poolObj).forEach(key => {
                    up[`hands/${myName}/tile_${Date.now()}_${Math.random().toString(36).substr(2,5)}`] = poolObj[key];
                    up[`pool/${key}`] = null;
                });
            }
            db.ref('/').update(up).then(() => { playSFX('error'); window.nextTurnAction(); window.isPenalizing = false; });
        });
    };

    window.showHint = function() {
        if (myRole !== 'player' || currentTurn !== myName) return alert("내 차례에만 사용할 수 있습니다.");
        document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target'));
        const sets = [];
        const hand = [...myHandData];
        const isReg = window.latestPlayersData[myName]?.registered;

        const numMap = {};
        hand.forEach(t => {
            if (t.num === 'J') return;
            if (!numMap[t.num]) numMap[t.num] = [];
            if (!numMap[t.num].find(it => it.color === t.color)) numMap[t.num].push(t);
        });
        Object.values(numMap).forEach(group => { 
            if (group.length >= 3) sets.push(group.map(t => ({ type: 'rack', id: t.id }))); 
        });

        const colorMap = { 'red': [], 'blue': [], 'yellow': [], 'black': [] };
        hand.forEach(t => { if (t.num !== 'J') colorMap[t.color].push(t); });
        Object.values(colorMap).forEach(tiles => {
            tiles.sort((a, b) => Number(a.num) - Number(b.num));
            let currentRun = [];
            for (let i = 0; i < tiles.length; i++) {
                if (currentRun.length === 0 || Number(tiles[i].num) === Number(currentRun[currentRun.length-1].num) + 1) {
                    currentRun.push(tiles[i]);
                } else if (Number(tiles[i].num) !== Number(currentRun[currentRun.length-1].num)) {
                    if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
                    currentRun = [tiles[i]];
                }
            }
            if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
        });

        if (sets.length === 0) return alert("현재 낼 수 있는 타일이 없습니다.");
        const allTargetIds = new Set();
        sets.forEach(setInfo => setInfo.forEach(item => allTargetIds.add(item.type === 'board' ? item.id : "rack-" + item.id)));
        allTargetIds.forEach(domId => { const el = document.getElementById(domId); if (el) el.classList.add('hint-target'); });
        setTimeout(() => document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target')), 5000);
    };

    // =====================================================
    // 🎂 생일 축하 시스템 (진금 전용)
    // =====================================================

    window.checkAndPlayBirthday = function(name) {
        if (name !== '진금') return;
        // 이번 브라우저 세션에서 이미 재생됐으면 스킵
        if (window.sessionStorage.getItem('birthday-played-jingeum')) return;
        window.sessionStorage.setItem('birthday-played-jingeum', '1');

        setTimeout(() => {
            window.launchConfetti();
            window.showBirthdayOverlay();
            window.playBirthdayMusic();
            // 다른 유저들에게도 공지 (Firebase 통해서)
            if (db) {
                db.ref('birthday_event').set({ name: '진금', time: Date.now() });
            }
        }, 800);
    };

    window.showBirthdayOverlay = function() {
        // 기존 오버레이가 있으면 제거
        const existing = document.getElementById('birthday-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.id = 'birthday-overlay';

        overlay.innerHTML = `
            <div id="bd-inner">
                <!-- 반짝이 스파크들 -->
                <div class="bd-spark" style="top:-10px;left:8%;animation-delay:0s;">✨</div>
                <div class="bd-spark" style="top:5px;right:12%;animation-delay:0.4s;">🌟</div>
                <div class="bd-spark" style="top:30%;left:-15px;animation-delay:0.7s;">⭐</div>
                <div class="bd-spark" style="top:30%;right:-15px;animation-delay:1.1s;">✨</div>
                <div class="bd-spark" style="bottom:15px;left:10%;animation-delay:0.2s;">🎊</div>
                <div class="bd-spark" style="bottom:20px;right:8%;animation-delay:0.9s;">🎉</div>
                <div class="bd-spark" style="top:50%;left:3%;animation-delay:0.5s;">💫</div>
                <div class="bd-spark" style="top:50%;right:3%;animation-delay:1.3s;">⚡</div>
                
                <!-- 리본 -->
                <div class="bd-ribbon" style="top:-20px;left:18%;animation-delay:0s;">🎀</div>
                <div class="bd-ribbon" style="top:-20px;right:18%;animation-delay:0.6s;">🎀</div>
                
                <!-- 케이크 -->
                <span id="bd-cake">🎂</span>
                
                <!-- 메인 텍스트 -->
                <div id="bd-main-text">생일 축하합니다!</div>
                <div id="bd-name-text">🎀 진금님, 오늘도 빛나는 하루! 🎀</div>
                <div id="bd-sub-text">
                    루미큐브에서도 행복한 생일 보내세요 🎮<br>
                    오늘 게임은 당연히 진금님 승리! 🏆
                </div>
                
                <!-- 닫기 버튼 -->
                <button id="bd-close-btn" onclick="window.closeBirthdayOverlay()">
                    🎁 고마워요!
                </button>
            </div>
        `;

        document.body.appendChild(overlay);

        // 12초 후 자동 닫기
        setTimeout(() => window.closeBirthdayOverlay(), 12000);
    };

    window.closeBirthdayOverlay = function() {
        const overlay = document.getElementById('birthday-overlay');
        if (!overlay) return;
        overlay.classList.add('closing');
        setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 500);

        const canvas = document.getElementById('birthday-confetti-canvas');
        if (canvas) canvas.remove();

        const banner = document.getElementById('bd-banner');
        if (banner) {
            banner.style.animation = 'bdFadeOut 0.4s ease forwards';
            setTimeout(() => { if (banner.parentNode) banner.remove(); }, 400);
        }
    };

    window.playBirthdayMusic = function() {
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            const ctx = new AC();

            // 🎵 Happy Birthday - C Major 음표 배열 [주파수(Hz), 박자길이(초)]
            const C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392.00,
                  A4=440.00, B4=493.88, C5=523.25, D5=587.33, E5=659.25,
                  F5=698.46, G5=783.99, A5=880.00;

            const song = [
                // "생일 축하합니다~" (x1)
                [C4,0.22],[C4,0.22],[D4,0.45],[C4,0.45],[F4,0.45],[E4,0.9],
                // "생일 축하합니다~" (x2)
                [C4,0.22],[C4,0.22],[D4,0.45],[C4,0.45],[G4,0.45],[F4,0.9],
                // "사랑하는 진금~"
                [C4,0.22],[C4,0.22],[C5,0.45],[A4,0.45],[F4,0.45],[E4,0.45],[D4,0.9],
                // "생일 축하합니다~" (마지막)
                [B4,0.22],[B4,0.22],[A4,0.45],[F4,0.45],[G4,0.45],[F4,1.1],
            ];

            // 멜로디 재생 함수
            function playNote(freq, startT, dur, vol=0.28, type='sine') {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, startT);
                gain.gain.setValueAtTime(0, startT);
                gain.gain.linearRampToValueAtTime(vol, startT + 0.02);
                gain.gain.setValueAtTime(vol * 0.85, startT + dur * 0.75);
                gain.gain.linearRampToValueAtTime(0, startT + dur);
                osc.start(startT);
                osc.stop(startT + dur + 0.01);
            }

            // 반주(코드) 재생
            function playChord(freqs, startT, dur) {
                freqs.forEach(f => playNote(f, startT, dur, 0.06, 'triangle'));
            }

            let t = ctx.currentTime + 0.15;
            song.forEach(([freq, dur]) => {
                playNote(freq, t, dur, 0.3, 'sine');
                playNote(freq * 2, t, dur, 0.06, 'triangle'); // 옥타브 배음
                t += dur;
            });

            // 🎺 노래 끝나면 팡파레!
            const fanfareStart = t + 0.3;
            const fanfare = [
                [G4, 0.12], [G4, 0.12], [G4, 0.12], [E5, 0.5],
                [D5, 0.12], [E5, 0.12], [D5, 0.12], [C5, 0.7],
            ];
            let ft = fanfareStart;
            fanfare.forEach(([freq, dur]) => {
                playNote(freq, ft, dur, 0.35, 'sawtooth');
                playNote(freq, ft, dur, 0.18, 'sine');
                ft += dur;
            });

            // 마지막 화음
            playChord([C4, E4, G4, C5], ft, 1.2);
            playNote(C5, ft, 1.2, 0.3, 'sine');

        } catch(e) {
            console.warn('생일 노래 재생 실패:', e);
        }
    };

    window.launchConfetti = function() {
        const existing = document.getElementById('birthday-confetti-canvas');
        if (existing) existing.remove();

        const canvas = document.createElement('canvas');
        canvas.id = 'birthday-confetti-canvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '9999999';
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        document.body.appendChild(canvas);

        const ctx = canvas.getContext('2d');
        const colors = [
            '#ff6b6b','#ffd93d','#6bcb77','#4d96ff',
            '#c77dff','#ff6b9d','#ffffff','#ffb347',
            '#00e5ff','#ff9ff3','#ff4757','#eccc68'
        ];
        const shapes = ['circle','rect','triangle','star','diamond'];

        function makeParticle(overrides) {
            return Object.assign({
                x: Math.random() * canvas.width,
                y: -20,
                vx: (Math.random() - 0.5) * 4,
                vy: 2 + Math.random() * 4,
                size: 6 + Math.random() * 10,
                color: colors[Math.floor(Math.random() * colors.length)],
                shape: shapes[Math.floor(Math.random() * shapes.length)],
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.2,
                opacity: 1,
                gravity: 0.07 + Math.random() * 0.07,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.03 + Math.random() * 0.05,
                delay: 0,
                dead: false,
            }, overrides);
        }

        const particles = [];

        // ① 위에서 내려오는 파티클 300개
        for (let i = 0; i < 300; i++) {
            particles.push(makeParticle({ delay: Math.floor(Math.random() * 80) }));
        }

        // ② 좌우에서 솟구치는 파티클 200개 (폭죽 효과)
        for (let i = 0; i < 200; i++) {
            const fromLeft = Math.random() < 0.5;
            particles.push(makeParticle({
                x:    fromLeft ? 0 : canvas.width,
                y:    canvas.height * 0.5 + (Math.random() - 0.5) * canvas.height * 0.4,
                vx:   (fromLeft ? 1 : -1) * (4 + Math.random() * 8),
                vy:   -7 - Math.random() * 9,
                gravity: 0.18 + Math.random() * 0.1,
                size: 8 + Math.random() * 11,
                delay: Math.floor(Math.random() * 30),
            }));
        }

        // ③ 화면 하단 중앙 버스트 100개
        for (let i = 0; i < 100; i++) {
            const angle = -Math.PI * (0.1 + Math.random() * 0.8);
            const speed = 5 + Math.random() * 10;
            particles.push(makeParticle({
                x:    canvas.width * 0.3 + Math.random() * canvas.width * 0.4,
                y:    canvas.height + 10,
                vx:   Math.cos(angle) * speed,
                vy:   Math.sin(angle) * speed,
                gravity: 0.15 + Math.random() * 0.1,
                delay: Math.floor(Math.random() * 20),
            }));
        }

        function drawShape(shape, size) {
            ctx.beginPath();
            switch(shape) {
                case 'circle':
                    ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                    break;
                case 'rect':
                    ctx.rect(-size / 2, -size / 4, size, size / 2);
                    break;
                case 'triangle':
                    ctx.moveTo(0, -size / 2);
                    ctx.lineTo(size / 2, size / 2);
                    ctx.lineTo(-size / 2, size / 2);
                    break;
                case 'diamond':
                    ctx.moveTo(0, -size / 2);
                    ctx.lineTo(size / 3, 0);
                    ctx.lineTo(0, size / 2);
                    ctx.lineTo(-size / 3, 0);
                    break;
                case 'star': {
                    const outerR = size / 2, innerR = size / 4.5;
                    for (let i = 0; i < 10; i++) {
                        const r = i % 2 === 0 ? outerR : innerR;
                        const a = (i * Math.PI) / 5 - Math.PI / 2;
                        i === 0 ? ctx.moveTo(r * Math.cos(a), r * Math.sin(a))
                                : ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                    }
                    break;
                }
            }
            ctx.closePath();
            ctx.fill();
        }

        const MARGIN = 60;
        let frame = 0;
        let rafId = null;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;

            let anyAlive = false;

            particles.forEach(p => {
                if (p.dead) return;
                if (frame < p.delay) { anyAlive = true; return; } // 딜레이 대기 중도 살아있음으로 처리

                p.wobble += p.wobbleSpeed;
                p.x += p.vx + Math.sin(p.wobble) * 1.5;
                p.y += p.vy;
                p.vy += p.gravity;
                p.rotation += p.rotSpeed;

                // 화면 밖으로 완전히 벗어나면 dead 처리
                if (p.y > canvas.height + MARGIN || p.x < -MARGIN || p.x > canvas.width + MARGIN) {
                    p.dead = true;
                    return;
                }

                // 후반부 서서히 페이드아웃
                if (p.y > canvas.height * 0.75) {
                    p.opacity = Math.max(0, 1 - (p.y - canvas.height * 0.75) / (canvas.height * 0.3));
                }
                if (p.opacity <= 0) { p.dead = true; return; }

                anyAlive = true;

                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 6;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                drawShape(p.shape, p.size);
                ctx.restore();
            });

            if (anyAlive) {
                rafId = requestAnimationFrame(animate);
            } else {
                if (canvas.parentNode) canvas.remove();
            }
        }

        rafId = requestAnimationFrame(animate);

        // 최대 15초 후 강제 종료 안전망
        setTimeout(() => {
            if (rafId) cancelAnimationFrame(rafId);
            if (canvas.parentNode) canvas.remove();
        }, 15000);
    };

    function isValidSet(tiles) {
        if (tiles.length < 3) return false;
        const jokers = tiles.filter(t => t.num === 'J');
        const nonJokers = tiles.filter(t => t.num !== 'J');
        if (nonJokers.length === 0) return true;

        const isGroup = () => {
            const targetNum = nonJokers[0].num;
            const colors = nonJokers.map(t => t.color);
            return nonJokers.every(t => t.num === targetNum) && 
                   (new Set(colors)).size === colors.length && 
                   tiles.length <= 4;
        };

        const isRun = () => {
            const targetColor = nonJokers[0].color;
            if (!nonJokers.every(t => t.color === targetColor)) return false;
            const nums = nonJokers.map(t => Number(t.num)).sort((a, b) => a - b);
            if (new Set(nums).size !== nums.length) return false;
            let gapSum = 0;
            for (let i = 0; i < nums.length - 1; i++) {
                gapSum += (nums[i + 1] - nums[i] - 1);
            }
            if (gapSum > jokers.length) return false;
            const remainingJokers = jokers.length - gapSum;
            const totalLength = (nums[nums.length-1] - nums[0] + 1) + remainingJokers;
            if (totalLength !== tiles.length) return false;
            return true; 
        };

        return isGroup() || isRun();
    }

    function validateBoard() {
        const rows = {};
        Object.values(boardTiles).forEach(t => { if (!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
        for (let y in rows) {
            const rowTiles = rows[y].sort((a,b) => a.x - b.x);
            let currentSet = [];
            for (let i = 0; i < rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                    if (!isValidSet(currentSet)) return false;
                    currentSet = [];
                }
            }
        }
        return true;
    }

    window.handleTurnEnd = function() {
        if (myRole !== 'player') return;
        if (Object.keys(boardTiles).length === Object.keys(initialBoardState).length) {
            return alert("패를 내거나 뽑으세요.");
        }
        if (!validateBoard()) {
            playSFX('error');
            return alert("보드 배치가 유효하지 않습니다!");
        }
        if (window.isGameEnding) return;

        db.ref(`players/${myName}/registered`).once('value', snap => {
            const isReg = snap.val();
            if (!isReg) {
                let isPiggy = false;
                const rows = {};
                Object.entries(boardTiles).forEach(([id, t]) => { 
                    t.id = id; 
                    if(!rows[t.y]) rows[t.y]=[]; 
                    rows[t.y].push(t); 
                });
                for (let y in rows) {
                    const rowTiles = rows[y].sort((a,b) => a.x - b.x);
                    let curr = [];
                    for (let i = 0; i < rowTiles.length; i++) {
                        curr.push(rowTiles[i]);
                        if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                            if (curr.some(t => initialBoardState[t.id]) && curr.some(t => !initialBoardState[t.id])) {
                                isPiggy = true;
                            }
                            curr = [];
                        }
                    }
                }
                if (isPiggy) { 
                    playSFX('error'); 
                    return alert("🚨 첫 등록 시에는 바닥 패에 붙일 수 없습니다."); 
                }
                let pts = 0;
                Object.entries(boardTiles).forEach(([id, t]) => { 
                    if (!initialBoardState[id]) pts += (t.num === 'J' ? 30 : Number(t.num)); 
                });
                if (pts < 30) { 
                    playSFX('error'); 
                    return alert(`등록 실패 (${pts}점)! 30점 이상 내야 합니다.`); 
                }
                db.ref(`players/${myName}`).update({ registered: true });
            }

            if (myHandData.length === 0) {
                window.isGameEnding = true;
                db.ref('hands').once('value', hSnap => {
                    const allHands = hSnap.val();
                    const scores = {};
                    playerList.forEach(p => { 
                        let s = 0; 
                        Object.values(allHands[p] || {}).forEach(t => s += (t.num === 'J' ? 50 : Number(t.num))); 
                        scores[p] = s; 
                    });
                    window.recordWin(myName);
                    db.ref('/').update({ 
                        "settings/status": "finished", 
                        "settings/gameResult": { winner: myName, scores } 
                    }).then(() => {
                        setTimeout(() => { window.isGameEnding = false; }, 3000);
                    });
                });
            } else {
                if (!isReg) {
                    window.addGameLog(`⭐ ${myName}님이 첫 등록에 성공했습니다!`);
                    db.ref('shake').set({ by: myName, time: Date.now() });
                } else {
                    window.addGameLog(`🔄 ${myName}님이 턴을 마쳤습니다.`);
                }
                window.nextTurnAction();
            }
        });

    window.drawTile = function() {
        if (myRole !== 'player') return;
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("패를 냈다면 무르거나 종료해야 합니다.");
        db.ref('pool').limitToFirst(1).once('value', s => {
            if (!s.exists()) return window.nextTurnAction();
            const poolObj = s.val(), key = Object.keys(poolObj)[0], up = {};
            up[`hands/${myName}/tile_${Date.now()}`] = poolObj[key];
            up[`pool/${key}`] = null;
            window.addGameLog(`🎴 ${myName}님이 타일을 1개 뽑았습니다.`);
            db.ref('/').update(up).then(() => { playSFX('tilePick'); window.nextTurnAction(); });
        });
    };

    window.startGame = function() {
        if (playerList.length < 2) return alert("최소 2명이 필요합니다.");
        const colors = ['red','blue','yellow','black'], sets = (gameMode === 'expert') ? 3 : 2;
        let pool = [];
        colors.forEach(c => { for(let i=1; i<=13; i++) { for(let j=0; j<sets; j++) pool.push({ num: i, color: c }); } });
        pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
        if (sets === 3) pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });

        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        const updates = { 'board': null, 'currentTurn': playerList[0], 'settings/status': "playing", 'chats': null, 'logs': null };
        const allHands = {};
        playerList.forEach(p => { allHands[p] = {}; updates[`players/${p}/registered`] = false; });

        for (let i = 0; i < 14; i++) {
            playerList.forEach(p => {
                const t = pool.pop();
                if (t) {
                    const tileId = 'tile_' + Math.random().toString(36).substr(2, 9);
                    allHands[p][tileId] = t;
                }
            });
        }

        updates['hands'] = allHands;
        const poolObj = {}; pool.forEach((t, idx) => { poolObj[`p_${idx}`] = t; });
        updates['pool'] = poolObj;

        db.ref('/').update(updates).then(() => {
            db.ref('settings/turnStartTime').set(firebase.database.ServerValue.TIMESTAMP);
            window.addGameLog(`📢 게임이 시작되었습니다!`);
        });
    };

    window.dropOnBoard = function(e) {
        e.preventDefault();
        const rawData = e.dataTransfer.getData("text/plain");
        if (!rawData) return;

        let dragInfo;
        try { dragInfo = JSON.parse(rawData); } 
        catch(err) { dragInfo = { primary: rawData, group: [rawData] }; }

        const primaryId = dragInfo.primary;
        const groupIds = dragInfo.group;

        const boardRect = document.getElementById('game-board').getBoundingClientRect();
        let dropX = e.clientX - boardRect.left - 22;
        let dropY = e.clientY - boardRect.top  - 32;

        const SNAP_DIST = 40;
        const TILE_W = 48;
        const TILE_H = 68;
        let snapped = false;

        Object.entries(boardTiles).forEach(([tid, t]) => {
            if (groupIds.includes(tid) || snapped) return; 
            const dx = dropX - t.x;
            const dy = dropY - t.y;
            if (Math.abs(dy) < SNAP_DIST) {
                if (dx > 0 && dx < SNAP_DIST * 2)  { dropX = t.x + TILE_W; dropY = t.y; snapped = true; }
                else if (dx < 0 && dx > -SNAP_DIST * 2) { dropX = t.x - TILE_W; dropY = t.y; snapped = true; }
            }
            if (!snapped && Math.abs(dx) < SNAP_DIST) {
                if (dy > 0 && dy < SNAP_DIST * 2)  { dropY = t.y + TILE_H; dropX = t.x; snapped = true; }
                else if (dy < 0 && dy > -SNAP_DIST * 2) { dropY = t.y - TILE_H; dropX = t.x; snapped = true; }
            }
        });

        const updates = {};
        let primaryTileData = boardTiles[primaryId];
        let deltaX = primaryTileData ? (dropX - primaryTileData.x) : 0;
        let deltaY = primaryTileData ? (dropY - primaryTileData.y) : 0;

        let isOverlapping = false;
        Object.entries(boardTiles).forEach(([tid, t]) => {
            if (groupIds.includes(tid)) return; 
            if (Math.abs(t.y - dropY) < 10 && Math.abs(t.x - dropX) < 10) isOverlapping = true;
        });

        if (isOverlapping) {
            const pushDist = TILE_W * groupIds.length;
            Object.entries(boardTiles).forEach(([tid, t]) => {
                if (groupIds.includes(tid)) return;
                if (Math.abs(t.y - dropY) < 10 && t.x >= dropX - 5) {
                    updates[`board/${tid}/x`] = t.x + pushDist;
                }
            });
        }

        db.ref(`hands/${myName}`).once('value', s => {
            const handData = s.val() || {};
            const isFromRack = (id) => !!handData[id];

            groupIds.forEach((id, idx) => {
                const fromRack = isFromRack(id);
                let targetX = fromRack ? dropX + (idx * 48) : boardTiles[id].x + deltaX;
                let targetY = fromRack ? dropY : boardTiles[id].y + deltaY;

                if (fromRack) {
                    updates[`board/${id}`] = { ...handData[id], x: targetX, y: targetY };
                    updates[`hands/${myName}/${id}`] = null;
                } else if (boardTiles[id]) {
                    updates[`board/${id}/x`] = targetX;
                    updates[`board/${id}/y`] = targetY;
                }
            });

            db.ref('/').update(updates)
                .then(() => playSFX('tileDrop'))
                .catch(err => console.error("타일 이동 에러:", err));
            
            document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
            selectedTiles = [];
        });
    };

    window.dropOnRack = function(e) {
        e.preventDefault();
        const rawData = e.dataTransfer.getData("text/plain") || e.dataTransfer.getData("text");
        if (!rawData) return;

        let id = rawData;
        try {
            const dragInfo = JSON.parse(rawData);
            id = dragInfo.primary;
        } catch(err) {}

        const updates = {};
        db.ref(`board/${id}`).once('value', s => {
            const rawTileData = s.exists() ? s.val() : myHandData.find(t => t.id === id);
            if (!rawTileData) return;

            const { x, y, ...cleanData } = rawTileData;
            updates[`hands/${myName}/${id}`] = cleanData;
            if (s.exists()) updates[`board/${id}`] = null;

            db.ref('/').update(updates).then(() => {
                playSFX('tilePick');
                if (!manualOrder.includes(id)) manualOrder.push(id);
                sortMode = 'manual';
                window.applyAutoSort();
                document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
                selectedTiles = [];
            });
        });
    };

    window.applyAutoSort = function() {
        const rEl = document.getElementById('my-rack');
        if (!rEl) return;

        if (sortMode === 'manual' && manualOrder.length > 0) {
            myHandData.sort((a, b) => {
                const ai = manualOrder.indexOf(a.id), bi = manualOrder.indexOf(b.id);
                if (ai === -1) return 1;
                if (bi === -1) return -1;
                return ai - bi;
            });
        } else {
            const coMap = { 'red':1, 'blue':2, 'yellow':3, 'black':4, 'joker':5 };
            myHandData.sort((a, b) => {
                const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num);
                return sortMode === 'color'
                    ? (coMap[a.color] - coMap[b.color] || vA - vB)
                    : (vA - vB || coMap[a.color] - coMap[b.color]);
            });
        }

        rEl.querySelectorAll('.tile').forEach(t => t.remove());

        myHandData.forEach((t, index) => {
            if (!t || t.num === undefined) return;
            const div = document.createElement('div');
            div.id = "rack-" + t.id;
            div.className = `tile ${t.color}`;
            div.innerText = t.num;
            div.draggable = (myRole === 'player');
            div.style.position = 'absolute';
            div.style.left = (index * 48 + 10) + 'px';
            div.style.top  = '45px';
            div.style.margin = '0';

            div.ondragstart = (e) => {
                if (myRole !== 'player') return e.preventDefault();
                let dragData = { primary: t.id, group: [t.id] };
                if (selectedTiles.includes(t.id)) {
                    dragData.group = selectedTiles;
                } else {
                    document.querySelectorAll('.selected-tile').forEach(el => el.classList.remove('selected-tile'));
                    selectedTiles = [];
                }
                e.dataTransfer.setData("text/plain", JSON.stringify(dragData));
                e.dataTransfer.setData("source", "rack");
                playSFX('tilePick');
            };
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                e.preventDefault(); e.stopPropagation();
                const dId = e.dataTransfer.getData("text"), src = e.dataTransfer.getData("source");
                if (src === "rack") window.moveTileInRack(dId, t.id);
                else window.dropOnRack(e);
            };
            rEl.appendChild(div);
        });
    };

    window.renderLobbyUI = function() {
        const modalBody = document.getElementById('modal-body');
        const isHost = (myName === currentHost);
        const allUsers = Object.entries(window.latestPlayersData);

        let tags = allUsers.map(([name, data]) => {
            if (!data.joined) return '';
            const isSpec = data.role === 'spectator';
            return `<span class="lobby-player-tag ${isSpec ? 'spec-tag' : ''}">${name === currentHost ? '👑 ' : ''}${name}${isSpec ? ' (관전)' : ''}</span>`;
        }).join('');

        const resetRankBtn = isHost ? `<button onclick="window.resetRank()" style="background:rgba(128,128,128,0.2); color:var(--main-text); padding:5px 10px; font-size:0.8rem; margin-top:10px; border:1px solid rgba(0,0,0,0.1);">전적 초기화</button>` : '';

        modalBody.innerHTML = `
            <h2 style="color:var(--main-text);">🎮 루미큐브 대기실</h2>
            <div style="text-align:left; background:rgba(128,128,128,0.1); padding:15px; border-radius:10px; margin-bottom:15px;">${tags}</div>
            <h3 style="color:var(--accent-gold); margin-bottom:5px;">🏆 명예의 전당</h3>
            <div id="rank-container" style="color:var(--main-text); font-size:0.9rem;">전적 로딩 중...</div>
            ${resetRankBtn}
            <div style="margin-top:20px; margin-bottom:20px;">
                <button class="mode-btn ${gameMode==='normal'?'selected':''}" onclick="db.ref('settings/gameMode').set('normal')">보통 (4인)</button>
                <button class="mode-btn ${gameMode==='expert'?'selected':''}" onclick="db.ref('settings/gameMode').set('expert')">전문가 (6인)</button>
            </div>
            ${isHost ? '<button onclick="window.startGame()" style="background:var(--accent-green); color:#000; width:100%; padding:15px; font-weight:900;">게임 시작</button>' : '<p style="color:var(--accent-gold);">방장이 게임을 시작하기를 기다리는 중...</p>'}
        `;

        window.getRankHtml().then(html => {
            const rankBox = document.getElementById('rank-container');
            if (rankBox) rankBox.innerHTML = html;
        });
    };

    window.renderResultUI = function() {
        db.ref('settings/gameResult').once('value', snap => {
            const data = snap.val(); if (!data) return;
            const modalBody = document.getElementById('modal-body');
            let html = `<h1 style="color:var(--accent-gold);">🏆 WINNER: ${data.winner}!</h1>`;
            Object.entries(data.scores).sort((a,b) => a[1]-b[1]).forEach(([name, score]) => {
                html += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(0,0,0,0.1);"><span>${name}</span><span>${name === data.winner ? 'WINNER' : score + '점'}</span></div>`;
            });
            if (myName === currentHost) html += `<button onclick="window.returnToLobby()" style="margin-top:20px; width:100%; padding:10px;">대기실로 돌아가기</button>`;
            modalBody.innerHTML = html;
        });
    };

    window.setSortMode = (m) => {
        sortMode = m;
        if (m === 'manual') manualOrder = myHandData.map(t => t.id);
        window.applyAutoSort();
    };

    window.nextTurnAction = () => {
        const nextPlayer = playerList[(playerList.indexOf(currentTurn) + 1) % playerList.length];
        db.ref('/').update({ 'currentTurn': nextPlayer, 'settings/turnStartTime': firebase.database.ServerValue.TIMESTAMP });
    };

    window.returnToLobby = () => {
        if (confirm("방 전체 데이터를 완전히 초기화할까요?"))
            db.ref('/').update({ "settings/status":"waiting", "board":null, "hands":null, "pool":null, "settings/gameResult":null });
    };

    window.moveTileInRack = function(dId, tId) {
        if (dId === tId) return;
        if (sortMode !== 'manual') { sortMode = 'manual'; manualOrder = myHandData.map(t => t.id); }
        const fIdx = manualOrder.indexOf(dId), tIdx = manualOrder.indexOf(tId);
        if (fIdx > -1 && tIdx > -1) {
            manualOrder.splice(fIdx, 1);
            manualOrder.splice(tIdx, 0, dId);
            playSFX('tileDrop');
            window.applyAutoSort();
        }
    };

    window.forceNextTurn = () => { if (confirm("다음 차례로 넘길까요?")) window.nextTurnAction(); };

    window.sendChat = () => {
        const input = document.getElementById('chat-input');
        if (!input || !input.value.trim()) return;
        const colorEl = document.getElementById('chat-color-input');
        const color = colorEl ? colorEl.value : "var(--main-text)";
        db.ref('chats').push({ name: myName, msg: input.value.trim(), color });
        input.value = '';
    };

    window.toggleBGM = () => {
        const btn = document.getElementById('bgm-toggle-btn');
        const icon = document.getElementById('bgm-icon');
        if (audioCtx.isBGMPlaying) {
            audioCtx.bgm.pause();
            audioCtx.isBGMPlaying = false;
            btn.classList.remove('playing');
            icon.innerText = '🔇';
            window.addGameLog("🎵 배경음악을 껐습니다.");
        } else {
            audioCtx.bgm.play().then(() => {
                audioCtx.isBGMPlaying = true;
                btn.classList.add('playing');
                icon.innerText = '🔊';
                window.addGameLog("🎵 배경음악을 켰습니다.");
            }).catch(err => {
                console.error("BGM 재생 실패:", err);
                alert("브라우저 설정에 의해 차단되었습니다. 화면을 한 번 클릭 후 다시 눌러주세요!");
            });
        }
    };

    window.viewPlayerHand = function(targetName) {
        if (myRole !== 'spectator') return;
        const regInfoEl = document.getElementById('reg-info');
        regInfoEl.innerText = `👀 ${targetName} 님의 패 관전 중...`;
        regInfoEl.style.color = "var(--turn-blue)";
        db.ref('hands/' + targetName).once('value', snap => {
            const handData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            const coMap = { 'red':1, 'blue':2, 'yellow':3, 'black':4, 'joker':5 };
            handData.sort((a,b) => {
                const vA = a.num==='J'?99:Number(a.num), vB = b.num==='J'?99:Number(b.num);
                return coMap[a.color]-coMap[b.color] || vA-vB;
            });
            const rEl = document.getElementById('my-rack');
            rEl.querySelectorAll('.tile').forEach(t => t.remove());
            handData.forEach((t, index) => {
                const div = document.createElement('div');
                div.className = `tile ${t.color}`;
                div.innerText = t.num;
                div.draggable = false;
                div.style.position = 'absolute';
                div.style.left = (index * 48 + 10) + 'px';
                div.style.top  = '45px';
                rEl.appendChild(div);
            });
        });
    };

    window.toggleChat = () => {
        const c = document.getElementById('chat-log-container');
        const i = document.getElementById('chat-input-container');
        const isVisible = c.style.display === 'flex';
        c.style.display = isVisible ? 'none' : 'flex';
        i.style.display = isVisible ? 'none' : 'flex';
    };

    window.updateRegScoreUI = function() {
        const scoreBadge = document.getElementById('reg-score-badge');
        const isReg = window.latestPlayersData[myName]?.registered;
        if (isReg || currentTurn !== myName || myRole !== 'player') { scoreBadge.style.display = 'none'; return; }
        let currentPts = 0;
        Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) currentPts += (t.num==='J' ? 30 : Number(t.num)); });
        scoreBadge.innerText = `등록 점수: ${currentPts} / 30`;
        scoreBadge.style.display = 'inline-block';
        scoreBadge.style.borderColor = currentPts >= 30 ? 'var(--accent-green)' : 'var(--accent-gold)';
        scoreBadge.style.color       = currentPts >= 30 ? 'var(--accent-green)' : 'var(--accent-gold)';
    };

    window.recordWin = function(winnerName) {
        if (!winnerName) return;
        const now = Date.now();
        if (window.lastWinRecordedTime && (now - window.lastWinRecordedTime < 3000)) {
            console.log("⚠️ 중복 승리 기록 시도 차단됨");
            return;
        }
        window.lastWinRecordedTime = now;
        db.ref(`stats/${winnerName}/wins`).transaction(curr => (curr || 0) + 1);
    };

    window.getRankHtml = function() {
        return new Promise(resolve => {
            db.ref('stats').once('value', snap => {
                const stats = snap.val() || {};
                let html = `<table class="rank-table"><tr><th>이름</th><th>누적 승리</th></tr>`;
                const sorted = Object.entries(stats).sort((a,b) => b[1].wins - a[1].wins);
                if (sorted.length === 0) html += `<tr><td colspan="2">전적이 없습니다.</td></tr>`;
                sorted.forEach(([name, data]) => { html += `<tr><td>${name}</td><td>${data.wins}회</td></tr>`; });
                html += `</table>`;
                resolve(html);
            });
        });
    };

    window.resetRank = function() {
        if (confirm("🏆 모든 명예의 전당 기록을 영구적으로 초기화할까요?"))
            db.ref('stats').remove().then(() => window.renderLobbyUI());
    };

    // === 드래그 선택 ===
    let isSelecting = false, startX, startY, selectedTiles = [];

    window.startSelection = function(e) {
        if (myRole !== 'player' || currentTurn !== myName) return;
        if (e.target.classList.contains('tile')) return;
        isSelecting = true;
        const rect = document.getElementById('game-board').getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        const selBox = document.getElementById('selection-box');
        selBox.style.cssText = `left:${startX}px; top:${startY}px; width:0; height:0; display:block;`;
        selectedTiles = [];
        document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
    };

    document.addEventListener('mousemove', function(e) {
        if (!isSelecting) return;
        const rect = document.getElementById('game-board').getBoundingClientRect();
        const curX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        const curY = Math.max(0, Math.min(e.clientY - rect.top,  rect.height));
        const left = Math.min(startX, curX), top = Math.min(startY, curY);
        const width = Math.abs(curX - startX), height = Math.abs(curY - startY);
        const selBox = document.getElementById('selection-box');
        selBox.style.left = left+'px'; selBox.style.top = top+'px';
        selBox.style.width = width+'px'; selBox.style.height = height+'px';
        selectedTiles = [];
        document.querySelectorAll('#game-board .tile').forEach(tile => {
            const tX = parseInt(tile.style.left), tY = parseInt(tile.style.top);
            const inBox = !(tX+44 < left || tX > left+width || tY+64 < top || tY > top+height);
            tile.classList.toggle('selected-tile', inBox);
            if (inBox) selectedTiles.push(tile.id);
        });
    });

    document.addEventListener('mouseup', function() {
        if (isSelecting) { isSelecting = false; document.getElementById('selection-box').style.display = 'none'; }
    });

    // === 이모트 ===
    const EMOTE_SETS = [
        { e: '😋', t: '이게 되네?' },
        { e: '🔥', t: '가능한.' },
        { e: '👀', t: '빤히...빤히...' },
        { e: '😭', t: '아 진짜 왜 이래' },
        { e: '😘', t: '고마워~' },
        { e: '😨', t: '안 돼 안 돼 안 돼' },
        { e: '💀', t: '실화임?' },
        { e: '😱', t: '등록하지마' }
    ];

    window.toggleEmotePicker = function() {
        const picker = document.getElementById('emote-picker');
        if (!picker) return;
        const isVisible = picker.style.display === 'flex';
        picker.style.display = isVisible ? 'none' : 'flex';
        if (!isVisible) {
            picker.innerHTML = ''; 
            EMOTE_SETS.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'emote-btn';
                btn.innerHTML = `<span>${item.e}</span> <span style="font-size:0.8rem; font-weight:normal;">${item.t}</span>`;
                btn.onclick = () => { window.sendEmote(`${item.e} ${item.t}`); };
                picker.appendChild(btn);
            });
        }
    };

    window.sendEmote = function(emote) {
        if (!myName || !db) return;
        db.ref('emotes').push({ name: myName, emote, time: Date.now() });
        const picker = document.getElementById('emote-picker');
        if (picker) picker.style.display = 'none';
    };

    window.showBubble = function(playerName, emote) {
        let badge = document.getElementById(`badge-${playerName}`);
        if (!badge) {
            const listEl = document.getElementById('player-list-container');
            if (!listEl) return;
            badge = document.createElement('span');
            badge.id = `badge-${playerName}`;
            badge.className = 'player-badge';
            badge.style.opacity = '0.6';
            badge.innerHTML = `👀 ${playerName}`;
            listEl.appendChild(badge);
        }
        const existing = badge.querySelector('.emoji-bubble');
        if (existing) existing.remove();
        const bubble = document.createElement('div');
        bubble.className = 'emoji-bubble';
        bubble.innerText = emote;
        badge.appendChild(bubble);
        setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 2500);
    };
</script>
</body>
</html>
