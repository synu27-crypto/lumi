#main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }

        #chat-box div { margin-bottom: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); } /* 색상 선택기 연동 */
        #chat-input-container { display: none; background: #1a1a1a; border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; align-items: center; padding: 5px; gap: 5px; }

        #my-rack { height: 210px; background: #151515; border-top: 2px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; background: #151515; padding-bottom: 10px; }

        .active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52, 152, 219, 0.2) !important; }
        .tile-count { background: #fff; color: #000; padding: 1px 6px; border-radius: 5px; font-weight: 900; }

        <div style="display: flex; gap: 8px; flex: 1.5; justify-content: flex-end;">

        </div>
    </div>
    <div id="game-board" ondragover="event.preventDefault()" ondrop="window.dropOnBoard(event)">

</div>

<script>
    let db, myName, currentHost = "";
let turnTimer = null; // 시계 장치를 담아둘 그릇
    let timeLeft = 60;    // 남은 시간 연료
    let playerList = [], currentTurn = "", sortMode = 'color', myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let isRegistered = false, initialBoardState = {};

    const SOUND_ASSETS = {
        bgm: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        tilePick: "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3",
        tileDrop: "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3",
        turnAlarm: "https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3",
        error: "https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3",
        success: "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    };

    const audioCtx = { bgm: new Audio(SOUND_ASSETS.bgm), isBGMPlaying: false, currentVolume: 0.5 };
    audioCtx.bgm.loop = true; audioCtx.bgm.volume = 0.5;

    window.updateVolume = (val) => { audioCtx.currentVolume = val; audioCtx.bgm.volume = val; };
    window.updateChatColor = (color) => { 
        document.documentElement.style.setProperty('--chat-text-color', color);
        localStorage.setItem('lumi-chat-color', color);
    };
window.startTurnTimer = function() {
        if (turnTimer) clearInterval(turnTimer); // 이미 시계가 가고 있으면 멈추고 새로 시작
        timeLeft = 60; // 시간을 60으로 리셋
        const timerEl = document.getElementById('timer-display'); // 숫자를 그릴 화면 위치 찾기
        
        turnTimer = setInterval(() => { // 1000ms(1초)마다 아래 내용을 실행해라
            timeLeft--; // 1씩 깎기
            timerEl.innerText = timeLeft + "s"; // 화면에 숫자 그리기
            
            if (timeLeft <= 0) { // 시간이 다 됐으면?
                clearInterval(turnTimer); // 시계 멈추고
                if (currentTurn === myName) { // 하필 그게 내 차례라면?
                    alert("시간 초과!"); // 경고 띄우고
                    window.drawTile(); // 강제로 타일 한 개 뽑기 (뽑으면 턴이 자동으로 넘어감)
                }
            }
        }, 1000);
    };

    function playSFX(key) { const sfx = new Audio(SOUND_ASSETS[key]); sfx.volume = audioCtx.currentVolume; sfx.play().catch(()=>{}); }

    window.toggleBGM = () => {
        const btn = document.getElementById('bgm-toggle');
        if (audioCtx.isBGMPlaying) { audioCtx.bgm.pause(); btn.innerText = "🎵 BGM OFF"; btn.classList.remove('playing'); }
        else { audioCtx.bgm.play().catch(() => alert("화면 클릭 후 재생 가능")); btn.innerText = "🎶 BGM ON"; btn.classList.add('playing'); }
        audioCtx.isBGMPlaying = !audioCtx.isBGMPlaying;
    };

    function isValidSet(tiles) {
        if (tiles.length < 3) return false;
        const nonJokers = tiles.filter(t => t.num !== 'J');
        if (nonJokers.length === 0) return true;
        const isGroup = () => {
            const num = nonJokers[0].num; const colors = nonJokers.map(t => t.color);
            return nonJokers.every(t => t.num === num) && (new Set(colors)).size === colors.length && tiles.length <= 4;
        };
        const isRun = () => {
            const color = nonJokers[0].color; if (!nonJokers.every(t => t.color === color)) return false;
            let lastNum = -1;
            for(let t of tiles) { if(t.num !== 'J') { if(lastNum !== -1 && Number(t.num) <= lastNum) return false; lastNum = Number(t.num); } }
            return true;
        };
        return isGroup() || isRun();
    }

    function validateBoard() {
        const rows = {}; Object.values(boardTiles).forEach(t => { if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
        for (let y in rows) {
            const rowTiles = rows[y].sort((a,b) => a.x - b.x); let currentSet = [];
            for (let i=0; i<rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) { if (!isValidSet(currentSet)) return false; currentSet = []; }
            }
        }
        return true;
    }

    // 변수 선언부 (기존 위치)
let db, myName, currentHost = "";
let myRole = ""; // 역할 저장 변수 추가
// ... 나머지 변수들

// --- 1. 입장 처리 함수 (window.onload 바깥에 두세요) ---
window.handleEntry = function(role, isAuto = false) {
    if (!isAuto) {
        const nickInput = document.getElementById('nick-input');
        if (!nickInput.value.trim()) return alert("닉네임을 입력하세요!");
        myName = nickInput.value.trim();
        myRole = role;
    }

    const ts = window.sessionStorage.getItem('lumi-timestamp') || Date.now();
    
    // 세션 저장 (새로고침 대비)
    window.sessionStorage.setItem('lumi-nick', myName);
    window.sessionStorage.setItem('lumi-role', myRole);
    window.sessionStorage.setItem('lumi-timestamp', ts);

    // Firebase DB 등록
    const pRef = db.ref('players/' + myName);
    pRef.update({ 
        joined: true, 
        timestamp: Number(ts), 
        role: myRole 
    });
    pRef.onDisconnect().remove();

    // UI 정리
    document.getElementById('entry-layer').style.display = 'none';
    if(!isAuto) playSFX('success');
};

// --- 2. 메인 로드 함수 ---
window.onload = function() {window.updatePlayerListUI = function() {

};
window.latestPlayersData = {};
window.latestPlayersData = {};
    const config = { 
        apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY", 
        authDomain: "lumi-b373e.firebaseapp.com", 
        databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/",

    firebase.initializeApp(config);

});

    db.ref('players').on('value', snap => {

    playerList = Object.entries(players)
        .filter(p => p[1].joined && p[1].role === 'player')

        .map(p => p[0]);

    // 방장 선출 (대표 한 명만 보고)

    window.updatePlayerListUI(); // 플레이어 정보 오면 그림 다시 그려!
    if (gameStatus === "waiting") window.renderLobbyUI();
});

        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            document.getElementById('overlay-layer').style.display = (gameStatus === "playing") ? 'none' : 'flex';

                document.getElementById('timer-display').innerText = "";
            }

            const isMy = (currentTurn === myName && myRole === 'player'); 
['btn-draw', 'btn-end', 'btn-rollback'].forEach(id => document.getElementById(id).disabled = !isMy);
            ['btn-draw', 'btn-end', 'btn-rollback'].forEach(id => document.getElementById(id).disabled = !isMy);
            document.getElementById('turn-info').innerText = isMy ? "내 차례!" : `차례: ${currentTurn}`;
            if(isMy && prev !== myName) playSFX('turnAlarm');

            // 턴 신호를 받을 때마다 타이머를 리셋하고 시작
            window.startTurnTimer();

        div.ondragstart = (e) => { 
    if (currentTurn !== myName || myRole !== 'player') return e.preventDefault();
            bEl.querySelectorAll('.tile').forEach(t => t.remove());
            Object.entries(boardTiles).forEach(([id, data]) => {
                const div = document.createElement('div'); div.className = `tile ${data.color}`; div.id = id; div.innerText = data.num; div.style.left = data.x + 'px'; div.style.top = data.y + 'px';
                div.draggable = true; div.ondragstart = (e) => {

                bEl.appendChild(div);
            });
        });

        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            window.applyAutoSort();
        });

        db.ref('pool').on('value', snap => { document.getElementById('pool-badge').innerText = `POOL: ${snap.exists() ? Object.keys(snap.val()).length : 0}`; });
        // 채팅 로그를 가져올 때 개별 설정된 색상을 입히는 로직
        db.ref('chats').limitToLast(20).on('child_added', snap => {
            const c = snap.val(); 
            const div = document.createElement('div');
            
            // 데이터베이스에 저장된 color 값이 있으면 적용, 없으면 기본 흰색(#ffffff) 적용
            div.style.color = c.color || "#ffffff"; 
            div.innerHTML = `<b>${c.name}:</b> ${c.msg}`;
            
            const box = document.getElementById('chat-box'); 
            box.appendChild(div); 
            box.scrollTop = box.scrollHeight;
        });
    };

    window.renderLobbyUI = function() {
        const modalBody = document.getElementById('modal-body'); const isHost = (myName === currentHost);
        let tags = playerList.map(name => `<span class="lobby-player-tag">${name === currentHost ? '👑 ' : ''}${name}</span>`).join('');
        let html = `<h2 style="color:white;">🎮 루미큐브 대기실</h2><div style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px;">${tags}</div>`;
        html += `<div style="margin-bottom:20px;"><p style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">게임 모드 설정</p>
            <button class="mode-btn ${gameMode==='normal'?'selected':''}" onclick="db.ref('settings/gameMode').set('normal')">보통 (4인)</button>
            <button class="mode-btn ${gameMode==='expert'?'selected':''}" onclick="db.ref('settings/gameMode').set('expert')">전문가 (6인)</button></div>`;
        if (isHost) html += `<button onclick="window.startGame()" style="background:var(--accent-green); color:#000; width:100%; padding:15px; font-weight:900;">게임 시작</button>`;
        else html += `<p style="color:var(--accent-gold);">방장이 모드를 설정 중입니다...</p>`;
        modalBody.innerHTML = html;
    };

    window.renderResultUI = function() {
        db.ref('settings/gameResult').once('value', snap => {
            const data = snap.val(); if (!data) return;
            const modalBody = document.getElementById('modal-body');
            let html = `<h1 style="color:var(--accent-gold); font-size:2.5rem; margin-bottom:10px;">🎉 WINNER: ${data.winner}! 🎉</h1>`;
            html += `<p style="color:#aaa; margin-bottom:20px;">남은 패 점수 합계 (낮을수록 좋음)</p><div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:25px; text-align:left;">`;
            const sorted = Object.entries(data.scores).sort((a, b) => a[1] - b[1]);
            sorted.forEach(([name, score]) => {
                const isWinner = name === data.winner;
                html += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #444; ${isWinner ? 'color:var(--accent-green); font-weight:bold;' : ''}">
                            <span>${isWinner ? '🏆' : '👤'} ${name}</span><span>${isWinner ? 'WINNER' : '-' + score + '점'}</span></div>`;
            });
            html += `</div>`;
            if (myName === currentHost) html += `<button onclick="window.returnToLobby()" style="background:var(--accent-purple); color:white; width:100%; padding:15px; font-weight:900;">대기실로 돌아가기</button>`;
            else html += `<p style="color:var(--accent-gold);">방장이 대기실로 이동시킬 때까지 대기하세요...</p>`;
            modalBody.innerHTML = html;
        });
    };

    window.startGame = function() {
        if (playerList.length < 2) return alert("최소 2명 필요");
        db.ref('/').once('value', snap => {
            const pool = []; const colors = ['red', 'blue', 'yellow', 'black']; const sets = (gameMode === 'expert') ? 3 : 2;
            colors.forEach(c => { for(let i=1; i<=13; i++) for(let j=0; j<sets; j++) pool.push({ num: i, color: c }); });
            for(let k=0; k<(sets === 3 ? 4 : 2); k++) pool.push({ num: 'J', color: 'joker' });
            pool.sort(() => Math.random() - 0.5);
            const up = { 'board': {}, 'currentTurn': playerList[0], 'settings/status': "playing", 'settings/activePlayers': playerList, 'chats': null, 'settings/gameResult': null };
            playerList.forEach(p => {
                const hand = {}; for(let i=0; i<14; i++) { const t = pool.pop(); hand['tile_'+Math.random().toString(36).substr(2,9)] = t; }
                up[`hands/${p}`] = hand; up[`players/${p}/registered`] = false;
            });
            up['pool'] = Object.assign({}, pool); db.ref('/').update(up);
        });
    };

    window.handleTurnEnd = function() {
        if (!validateBoard()) { playSFX('error'); return alert("유효하지 않은 세트!"); }
        db.ref(`players/${myName}/registered`).once('value', snap => {
            if (!snap.val()) {
                let pts = 0; Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) pts += (t.num === 'J' ? 30 : Number(t.num)); });
                if (pts < 30) { playSFX('error'); return alert(`등록 실패 (${pts}점)! 30점 이상 필요`); }
                db.ref('players/' + myName).update({ registered: true });
            }
            if (myHandData.length === 0) {
                db.ref('hands').once('value', hs => {
                    const res = {}; const hands = hs.val() || {};
                    playerList.forEach(p => { let s = 0; Object.values(hands[p]||{}).forEach(t => s += (t.num === 'J' ? 50 : Number(t.num))); res[p] = s; });
                    db.ref('/').update({ "settings/gameResult": { winner: myName, scores: res }, "settings/status": "finished" });
                });
            } else window.nextTurnAction();
        });
    };

    window.rollbackTurn = function() {
        if(confirm("무를까요?")) {
            const up = {}; const cKeys = Object.keys(boardTiles); const iKeys = Object.keys(initialBoardState);
            cKeys.forEach(id => { if (!iKeys.includes(id)) up[`hands/${myName}/${id}`] = boardTiles[id]; });
            up['board'] = initialBoardState; db.ref('/').update(up).then(() => playSFX('tilePick'));
        }
    };

    window.drawTile = function() {
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("낸 패를 무르거나 종료해야 함");
        db.ref('pool').limitToFirst(1).once('value', s => {
            if (!s.exists()) return window.nextTurnAction();
            const key = Object.keys(s.val())[0]; const up = {};
            up[`hands/${myName}/tile_${Date.now()}`] = s.val()[key]; up[`pool/${key}`] = null;
            db.ref('/').update(up).then(() => { playSFX('tilePick'); window.nextTurnAction(); });
        });
    };

   window.dropOnBoard = function(e) {
        e.preventDefault();
        if (currentTurn !== myName) return; // 내 차례가 아니면 무시

        const id = e.dataTransfer.getData("text");
        const rect = document.getElementById('game-board').getBoundingClientRect();
        
        // 마우스 위치에 따른 스냅(격자) 좌표 계산
        let sx = Math.round((e.clientX - rect.left - 22) / 50) * 50 + 2;
        let sy = Math.round((e.clientY - rect.top - 32) / 75) * 75 + 2;

        const inHand = myHandData.find(t => t.id === id);
        
        if (inHand) {
            // 1. 내 손에서 보드로 타일을 처음 낼 때
            const up = {};
            up[`board/${id}`] = { num: inHand.num, color: inHand.color, x: sx, y: sy };
            up[`hands/${myName}/${id}`] = null;
            db.ref('/').update(up);
            playSFX('tileDrop');
        } else {
            // 2. 이미 보드에 있는 타일을 다른 위치(열)로 옮길 때
            // 보드판 데이터(boardTiles)에 해당 타일이 있는지 확인 후 좌표 업데이트
            if (boardTiles && boardTiles[id]) {
                db.ref(`board/${id}`).update({ x: sx, y: sy });
                playSFX('tileDrop');
            }
        }
    };

    window.dropOnRack = function(e) {
        e.preventDefault(); const id = e.dataTransfer.getData("text");
        db.ref(`board/${id}`).once('value', s => { if (s.exists()) { const up = {}; up[`hands/${myName}/${id}`] = s.val(); up[`board/${id}`] = null; db.ref('/').update(up); playSFX('tilePick'); } });
    };

    window.applyAutoSort = function() {
        const coMap = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 };
        myHandData.sort((a, b) => {
            const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num);
            return sortMode === 'color' ? (coMap[a.color] - coMap[b.color] || vA - vB) : (vA - vB || coMap[a.color] - coMap[b.color]);
        });
        const rEl = document.getElementById('my-rack'); rEl.querySelectorAll('.tile').forEach(t => t.remove());
        myHandData.forEach(t => {
            const div = document.createElement('div'); div.className = `tile ${t.color}`; div.innerText = t.num; div.draggable = true;
            div.ondragstart = (e) => { e.dataTransfer.setData("text", t.id); playSFX('tilePick'); }; rEl.appendChild(div);
        });
    };

    window.setSortMode = (m) => { sortMode = m; window.applyAutoSort(); };
    window.nextTurnAction = () => { db.ref('settings/activePlayers').once('value', s => { const l = s.val() || []; db.ref('currentTurn').set(l[(l.indexOf(currentTurn) + 1) % l.length]); }); };
    window.returnToLobby = () => { if(confirm("초기화?")) db.ref('/').update({ "settings/status": "waiting", "board": {}, "hands": {}, "pool": {}, "settings/gameResult": null }); };
    window.forceNextTurn = () => { if(confirm("강제 이동?")) window.nextTurnAction(); };
    window.toggleChat = () => { const b = document.getElementById('chat-box'); const i = document.getElementById('chat-input-container'); const v = b.style.display === 'block'; b.style.display = v?'none':'block'; i.style.display = v?'none':'flex'; };
    window.sendChat = () => { 
    const i = document.getElementById('chat-input'); 
    const color = document.getElementById('chat-color-input').value; // 내가 고른 색상 가져오기
    
    if (i.value.trim()) { 
        db.ref('chats').push({ 
            name: myName, 
            msg: i.value, 
            color: color // DB에 색상 정보 포함해서 저장
        }); 
        i.value = ''; 
    } 
};
</script>
</body>
</html>
