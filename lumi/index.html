<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>루미 : 어반 에디션 Pro+ Ver 19.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212; --panel-bg: rgba(30, 30, 30, 0.95); --tile-bg: #f8f5f0;
            --accent-purple: #9d50bb; --accent-green: #2ecc71; --accent-gold: #f1c40f; --accent-red: #e74c3c;
            --turn-blue: #3498db; --chat-bg: rgba(25, 25, 25, 0.98);
        }
        body { background-color: var(--bg-color); color: #e0e0e0; margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; height: 100vh; overflow: hidden; user-select: none; }
        
        /* 🚨 테두리 반짝임 */
        @keyframes pulse-border {
            0%, 100% { box-shadow: inset 0 0 20px rgba(52, 152, 219, 0.3); }
            50% { box-shadow: inset 0 0 60px rgba(52, 152, 219, 0.6); }
        }
        body.is-my-turn-frame { animation: pulse-border 1.5s infinite; }

        /* 🚀 턴 알림 애니메이션 */
        @keyframes turn-popup {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }
        #turn-announcer {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); color: var(--turn-blue);
            padding: 20px 50px; border-radius: 50px; font-size: 2rem; font-weight: 900;
            z-index: 10000; pointer-events: none; border: 3px solid var(--turn-blue);
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.5); display: none;
        }

        #main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        #ui-layer { height: 60px; min-height: 60px; padding: 0 20px; background: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 500; gap: 10px; }
        
        #game-board { flex: 1; background: #1e1e1e; position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 75px; transition: opacity 0.3s; }
        #game-board.not-my-turn { pointer-events: none; opacity: 0.8; filter: brightness(0.8); }

        .audio-ctrl { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #vol-slider { width: 50px; accent-color: var(--accent-gold); cursor: pointer; height: 4px; }
        #btn-bgm { background: transparent; border: none; font-size: 0.65rem; color: #fff; cursor: pointer; font-weight: bold; padding: 0; }

        #reg-info { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 8px 25px; border-radius: 30px; border: 2px solid var(--accent-gold); color: var(--accent-gold); font-weight: bold; font-size: 0.85rem; z-index: 800; display: none; }

        .tile { width: 44px; height: 64px; background: var(--tile-bg); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.3rem; position: absolute; cursor: grab; border: 1px solid #d1d1d1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }
        .tile.rack-tile { position: relative !important; left: auto !important; top: auto !important; flex-shrink: 0; }
        .tile.locked { filter: brightness(0.6); cursor: not-allowed; border: 1px dashed #666; }
        
        .red { color: #d63031 !important; border-bottom: 4px solid #d63031 !important; }
        .blue { color: #0984e3 !important; border-bottom: 4px solid #0984e3 !important; }
        .yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }
        .black { color: #2d3436 !important; border-bottom: 4px solid #2d3436 !important; }
        .joker { color: #8e44ad !important; font-size: 1.7rem !important; }

        #chat-wrapper { position: fixed; bottom: 230px; right: 20px; width: 280px; z-index: 9999; display: flex; flex-direction: column; pointer-events: none; }
        #chat-box { height: 180px; background: var(--chat-bg); backdrop-filter: blur(10px); border-radius: 12px 12px 0 0; border: 1px solid rgba(255,255,255,0.15); overflow-y: auto; padding: 10px; pointer-events: auto; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #chat-box div { margin-bottom: 6px; font-size: 0.85rem; line-height: 1.4; word-break: break-all; }
        #chat-input-container { display: none; background: #1a1a1a; border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; align-items: center; padding-right: 8px; }
        #chat-input { flex: 1; background: transparent; border: none; padding: 10px; color: #fff; font-size: 0.8rem; outline: none; }
        #chat-color-picker { width: 24px; height: 24px; border: none; background: none; cursor: pointer; padding: 0; }
        #chat-toggle { align-self: flex-end; background: var(--accent-purple); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; pointer-events: auto; font-weight: bold; margin-top: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        #my-rack { height: 210px; min-height: 210px; background: #151515; border-top: 2px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; z-index: 700; background: #151515; padding-bottom: 10px; }
        
        button { padding: 6px 14px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 6px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; transition: 0.2s; white-space: nowrap; }
        button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.2); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .player-badge { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 15px; border: 1.5px solid rgba(255, 255, 255, 0.1); font-size: 0.75rem; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .is-reg-badge { border-color: var(--accent-green) !important; color: var(--accent-green) !important; }
        .active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52, 152, 219, 0.2) !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(52, 152, 219, 0.4); z-index: 100; }
        .tile-count { background: #fff; color: #000; padding: 1px 6px; border-radius: 5px; font-weight: 900; font-size: 0.7rem; }
        
        #pool-badge { background: rgba(157, 80, 187, 0.1); border: 1.5px solid var(--accent-purple); color: var(--accent-purple); padding: 5px 12px; border-radius: 6px; font-weight: 900; font-size: 0.75rem; display: inline-flex; align-items: center; white-space: nowrap; }

        #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: rgba(45, 45, 45, 0.95); padding: 30px; border-radius: 24px; text-align: center; min-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body onclick="if(window.initAudio) window.initAudio()">

<div id="turn-announcer"></div>

<div id="main-container">
    <div id="ui-layer">
        <div style="display: flex; align-items: center; gap: 15px; flex: 1.3;">
            <span style="font-weight: 900; font-size: 1.2rem; color: #fff;">루미</span>
            <div class="audio-ctrl">
                <button id="btn-bgm" onclick="toggleBGM()">🎵 OFF</button>
                <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.2" oninput="changeVolume(this.value)">
            </div>
            <div id="player-list-container" style="display: flex; gap: 8px;"></div>
        </div>
        
        <div id="turn-info" style="text-align: center; font-size: 0.8rem; font-weight: bold; color: var(--turn-blue); flex: 0.4;">연결 중...</div>
        
        <div style="display: flex; align-items: center; gap: 8px; flex: 1.3; justify-content: flex-end;">
            <button id="btn-force-lobby" onclick="returnToLobby()" style="background:var(--accent-red); display:none;">리셋</button>
            <button id="btn-force-next" onclick="forceNextTurn()" style="background:var(--accent-gold); color:#000; display:none;">턴 넘기기</button>
            <button id="btn-start" onclick="startGame()" style="background:var(--accent-green); color:#000; display:none;">시작</button>
            <span id="pool-badge">POOL: --</span>
            <button id="btn-rollback" onclick="rollbackTurn()" disabled style="background:#555;">무르기</button>
            <button id="btn-draw" onclick="drawTile()" disabled style="background:var(--accent-purple);">뽑기</button>
            <button id="btn-end" onclick="handleTurnEnd()" disabled style="background:#444;">종료</button>
        </div>
    </div>
    
    <div id="game-board" ondragover="event.preventDefault()" ondrop="dropOnBoard(event)">
        <div id="reg-info">등록 점수 계산 중...</div>
        <div id="chat-wrapper">
            <div id="chat-box"></div>
            <div id="chat-input-container">
                <input type="text" id="chat-input" placeholder="메시지..." onkeypress="if(event.keyCode==13) sendChat()">
                <input type="color" id="chat-color-picker" value="#f1c40f">
            </div>
            <button id="chat-toggle" onclick="toggleChat()">💬 채팅</button>
        </div>
        <div id="overlay-layer"><div class="modal-card" id="modal-body"><h2>준비 중...</h2></div></div>
    </div>

    <div id="my-rack" ondragover="event.preventDefault()" ondrop="dropOnRack(event)">
        <div id="rack-controls">
            <button onclick="setSortMode('number')">777 숫자</button>
            <button onclick="setSortMode('color')">123 색상</button>
            <button onclick="setSortMode('manual')">🖐 수동</button>
        </div>
    </div>
</div>

<audio id="bgm-audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg"></audio>

<script>
    window.onload = function() {
        const myName = prompt("닉네임을 입력하세요") || "게스트_" + Math.floor(Math.random()*100);
        const firebaseConfig = { apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY", authDomain: "lumi-b373e.firebaseapp.com", databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/", projectId: "lumi-b373e", storageBucket: "lumi-b373e.firebasestorage.app", messagingSenderId: "171246043706", appId: "1:171246043706:web:3733e35f0af044974b2b03", measurementId: "G-Q9F1532V40" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const UI = { set: (id, h) => { const el = document.getElementById(id); if (el) el.innerHTML = h; }, text: (id, t) => { const el = document.getElementById(id); if (el) el.innerText = t; }, show: (id, d = 'block') => { const el = document.getElementById(id); if (el) el.style.display = d; }, hide: (id) => { const el = document.getElementById(id); if (el) el.style.display = 'none'; }, disable: (id, b) => { const el = document.getElementById(id); if (el) el.disabled = b; } };

        let playerList = [], activePlayers = [], currentTurn = "", sortMode = 'color', myHandData = [], gameStatus = "waiting", boardTiles = {};
        let isRegistered = false, initialBoardState = {}, initialHandState = {}, registrationPoints = 0;
        let audioCtx = null, bgm = document.getElementById('bgm-audio');

        // 🚀 턴 알림 표시 함수
        function announceTurn(name) {
            const announcer = document.getElementById('turn-announcer');
            if (!announcer) return;
            announcer.innerText = `${name}님의 차례입니다!`;
            announcer.style.display = 'block';
            announcer.style.animation = 'none';
            announcer.offsetHeight; // Reflow
            announcer.style.animation = 'turn-popup 2s ease forwards';
            setTimeout(() => announcer.style.display = 'none', 2000);
        }

        db.ref(".info/connected").on("value", snap => {
            if (snap.val()) {
                const myRef = db.ref('players/' + myName);
                myRef.onDisconnect().remove();
                myRef.once('value', s => {
                    if (!s.exists()) myRef.set({ joined: true, timestamp: firebase.database.ServerValue.TIMESTAMP, registered: false });
                    else myRef.update({ joined: true, timestamp: firebase.database.ServerValue.TIMESTAMP });
                });
            }
        });

        db.ref('pool').on('value', snap => UI.text('pool-badge', "POOL: " + (snap.exists() ? Object.keys(snap.val()).length : 0)));
        db.ref('settings/activePlayers').on('value', snap => { activePlayers = snap.val() || []; });

        db.ref('players').on('value', pSnap => {
            const players = pSnap.val() || {};
            playerList = Object.entries(players).map(([n, d]) => ({ n, ...d })).sort((a, b) => (a.timestamp || Infinity) - (b.timestamp || Infinity)).map(p => p.n);
            isRegistered = players[myName]?.registered || false;
            const hostName = playerList.includes("계헌") ? "계헌" : playerList[0];
            const isHost = (myName === hostName);

            if (isHost) { UI.show('btn-start', 'inline-block'); UI.show('btn-force-next', 'inline-block'); UI.show('btn-force-lobby', 'inline-block'); } 
            else { UI.hide('btn-start'); UI.hide('btn-force-next'); UI.hide('btn-force-lobby'); }

            db.ref('hands').on('value', hSnap => {
                const allHands = hSnap.val() || {}, listEl = document.getElementById('player-list-container');
                if (!listEl) return; listEl.innerHTML = '';
                playerList.forEach((name) => {
                    const isActive = activePlayers.includes(name), reg = players[name]?.registered, count = allHands[name] ? Object.keys(allHands[name]).length : 0;
                    const isTurn = (name === currentTurn);
                    const isHostIcon = (name === hostName);
                    const badge = document.createElement('span'); 
                    badge.className = `player-badge ${isHostIcon ? 'is-host-badge' : ''} ${reg ? 'is-reg-badge' : ''} ${isTurn ? 'active-turn-badge' : ''}`;
                    if (!isActive && gameStatus === 'playing') badge.style.opacity = "0.5";
                    badge.innerHTML = `${isHostIcon ? '👑' : ''} ${name} ${isActive ? `<span class="tile-count">${count}</span>` : '<small>(관전)</small>'}`;
                    listEl.appendChild(badge);
                });
            });
        });

        window.initAudio = function() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); };
        window.toggleBGM = function() { if (bgm.paused) { bgm.play(); UI.text('btn-bgm', "🎵 ON"); } else { bgm.pause(); UI.text('btn-bgm', "🎵 OFF"); } };
        window.changeVolume = function(v) { bgm.volume = v; };
        window.forceNextTurn = function() { if(confirm("턴을 넘길까요?")) window.nextTurn(); };
        window.returnToLobby = function() { if(confirm("초기화할까요?")) db.ref('/').update({ "settings/status": "waiting", "board": null, "hands": null, "pool": null, "settings/activePlayers": null }); };

        window.toggleChat = function() {
            const box = document.getElementById('chat-box'), inp = document.getElementById('chat-input-container'), btn = document.getElementById('chat-toggle');
            const open = box.style.display === 'block'; box.style.display = open ? 'none' : 'block'; inp.style.display = open ? 'none' : 'flex';
            btn.innerText = open ? '💬 채팅' : '❌ 닫기'; if (!open) { box.scrollTop = box.scrollHeight; document.getElementById('chat-input').focus(); }
        };
        window.sendChat = function() { 
            const i = document.getElementById('chat-input'), cp = document.getElementById('chat-color-picker');
            if (!i.value.trim()) return; 
            db.ref('chat').push({ name: myName, msg: i.value.trim(), color: cp.value }); i.value = ''; 
        };
        db.ref('chat').limitToLast(20).on('child_added', snap => {
            const d = snap.val(), box = document.getElementById('chat-box'); if (!box) return;
            function getColor(n) { let h=0; for(let i=0; i<n.length; i++) h=n.charCodeAt(i)+((h<<5)-h); return `hsl(${Math.abs(h)%360},75%,75%)`; }
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:${d.color || getColor(d.name)}; font-weight:bold;">${d.name}:</span> <span style="color:#fff;">${d.msg}</span>`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        });

        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            if (gameStatus === "waiting") { UI.show('overlay-layer', 'flex'); UI.set('modal-body', `<h2>대기실</h2><p>방장이 게임을 시작하기를 기다리고 있습니다.</p>`); }
            else if (gameStatus === "finished") { UI.show('overlay-layer', 'flex'); showRanking(); }
            else UI.hide('overlay-layer');
        });

        // 🚀 차례 변경 감지 및 알림 트리거
        db.ref('currentTurn').on('value', snap => {
            const newTurn = snap.val();
            if (newTurn && currentTurn !== newTurn && gameStatus === "playing") announceTurn(newTurn);
            currentTurn = newTurn;
            const isMy = (currentTurn === myName);
            if (isMy) document.body.classList.add('is-my-turn-frame'); else document.body.classList.remove('is-my-turn-frame');
            document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
            UI.disable('btn-draw', !isMy); UI.disable('btn-end', !isMy); UI.disable('btn-rollback', !isMy);
            UI.set('turn-info', isMy ? `내 차례입니다!` : `차례: ${currentTurn || '-'}`);
        });

        function takeTurnSnapshot() {
            db.ref('board').once('value', s => { initialBoardState = JSON.parse(JSON.stringify(s.val() || {})); updateRegPoints(); });
            db.ref(`hands/${myName}`).once('value', s => { initialHandState = JSON.parse(JSON.stringify(s.val() || {})); });
        }
        window.rollbackTurn = function() { if (!confirm("모든 동작을 무를까요?")) return; registrationPoints = 0; db.ref('board').set(initialBoardState); db.ref(`hands/${myName}`).set(initialHandState); updateRegPoints(); };

        function renderTile(parent, id, data, isRack) {
            const div = document.createElement('div');
            const onBoard = !isRack, isMineInTurn = onBoard && !initialBoardState[id], isLocked = onBoard && !isMineInTurn && !isRegistered;
            div.className = "tile " + data.color + (isRack ? " rack-tile" : "") + (isLocked ? " locked" : "");
            div.innerText = data.num; div.id = id; div.draggable = !isLocked;
            if (onBoard) { div.style.left = data.x + 'px'; div.style.top = data.y + 'px'; }
            div.ondragstart = (e) => { if (isLocked || (onBoard && currentTurn !== myName)) return e.preventDefault(); e.dataTransfer.setData("text/plain", id); };
            parent.appendChild(div);
        }

        function updateRegPoints() {
            if (isRegistered) { UI.show('reg-info', 'block'); UI.set('reg-info', `<span style="color:var(--accent-green)">등록 완료</span> | 내 패: ${myHandData.length}장`); return; }
            const newTiles = Object.entries(boardTiles).filter(([id]) => !initialBoardState[id]);
            let pts = 0; newTiles.forEach(([id, t]) => { pts += (t.num === 'J' ? 10 : Number(t.num)); });
            registrationPoints = pts; UI.show('reg-info', 'block');
            UI.set('reg-info', `등록 점수: ${pts}/30 | 내 패: ${myHandData.length}장`);
        }

        window.dropOnBoard = function(e) {
            e.preventDefault(); if (currentTurn !== myName) return;
            const id = e.dataTransfer.getData("text/plain"), rect = document.getElementById('game-board').getBoundingClientRect();
            let snapX = Math.round((e.clientX - rect.left - 22) / 50) * 50 + 2, snapY = Math.round((e.clientY - rect.top - 32) / 75) * 75 + 2;
            const tileInHand = myHandData.find(t => t.id === id);
            if (tileInHand) { db.ref('board/' + id).set({ num: tileInHand.num, color: tileInHand.color, x: snapX, y: snapY }); db.ref('hands/' + myName + '/' + id).remove(); }
            else if (boardTiles[id]) db.ref('board/' + id).update({ x: snapX, y: snapY });
        };
        window.dropOnRack = function(e) {
            e.preventDefault(); const id = e.dataTransfer.getData("text/plain");
            if (!isRegistered && initialBoardState[id]) return; 
            db.ref('board/' + id).once('value', s => { if (s.exists() && currentTurn === myName) { db.ref('hands/' + myName + '/' + id).set({ num: s.val().num, color: s.val().color }); db.ref('board/' + id).remove(); } });
        };
        window.handleTurnEnd = function() {
            const newCount = Object.keys(boardTiles).length - Object.keys(initialBoardState).length;
            if (newCount === 0) return alert("패를 내지 않으려면 '뽑기'를 누르세요.");
            if (!validateBoard()) return alert("조합 규칙 위반입니다!");
            if (!isRegistered) { if (registrationPoints < 30) return alert("등록 점수 30점이 부족합니다!"); db.ref('players/' + myName).update({ registered: true }); isRegistered = true; }
            if (myHandData.length === 0) db.ref('settings/status').set("finished"); else window.nextTurn();
        };

        function validateBoard() {
            const groups = []; const rows = {};
            Object.values(boardTiles).forEach(t => { const y = Math.round(t.y / 75); if (!rows[y]) rows[y] = []; rows[y].push(t); });
            for (let y in rows) {
                const row = rows[y].sort((a, b) => a.x - b.x); let cur = [row[0]];
                for (let i = 1; i < row.length; i++) { if (row[i].x - row[i-1].x <= 60) cur.push(row[i]); else { groups.push(cur); cur = [row[i]]; } }
                groups.push(cur);
            }
            if (!isRegistered) { for (let id in initialBoardState) { const now = boardTiles[id]; if (!now || now.x !== initialBoardState[id].x || now.y !== initialBoardState[id].y) return false; } }
            for (let g of groups) {
                if (g.length < 3) return false;
                const nz = g.filter(t => t.num !== 'J'); if (nz.length === 0) continue;
                const isG = nz.every(t => t.num === nz[0].num), isR = nz.every(t => t.color === nz[0].color);
                if (isG) { const cls = nz.map(t => t.color); if (new Set(cls).size !== cls.length || g.length > 4) return false; }
                else if (isR) {
                    const s = g.map(t => t.num === 'J' ? -1 : Number(t.num)).sort((a, b) => a - b);
                    let jk = s.filter(v => v === -1).length, nums = s.filter(v => v !== -1);
                    for (let i=0; i<nums.length-1; i++) { const d = nums[i+1]-nums[i]; if (d===0) return false; jk -= (d-1); }
                    if (jk < 0) return false;
                } else return false;
            }
            return true;
        }

        window.nextTurn = function() { 
            if (activePlayers.length === 0) return;
            const idx = (activePlayers.indexOf(currentTurn) + 1) % activePlayers.length; 
            db.ref('currentTurn').set(activePlayers[idx]); 
        };
        window.startGame = function() {
            if (!confirm("게임을 시작할까요?")) return;
            db.ref('/').update({ "settings/status": "preparing", "board": null, "hands": null, "settings/activePlayers": playerList });
            playerList.forEach(p => db.ref('players/' + p).update({ registered: false }));
            let pool = []; const co = ['red', 'blue', 'yellow', 'black'];
            co.forEach(c => { for(let i=1; i<=13; i++) { for(let j=0; j<2; j++) pool.push({ num: i, color: c }); } });
            pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
            pool.sort(() => Math.random() - 0.5); db.ref('currentTurn').set(playerList[0]);
            const ups = {}; activePlayers.forEach(p => { for(let i=0; i<14; i++) { const t = pool.pop(), id = 'tile_' + Math.random().toString(36).substr(2,9); ups['hands/' + p + '/' + id] = t; } });
            db.ref('/').update({ ...ups, pool: Object.assign({}, pool), "settings/status": "playing" });
        };
        window.drawTile = function() {
            if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) return alert("판에 낸 타일을 회수해야 뽑을 수 있습니다.");
            db.ref('pool').limitToFirst(1).once('value', s => { if (!s.exists()) return; const key = Object.keys(s.val())[0]; db.ref('hands/' + myName + '/tile_' + Date.now()).set(s.val()[key]); db.ref('pool/' + key).remove(); window.nextTurn(); });
        };
        function showRanking() {
            db.ref('hands').once('value', s => {
                const h = s.val() || {}; let res = activePlayers.map(n => { let sum = 0; Object.values(h[n]||{}).forEach(t => sum += (t.num === 'J' ? 30 : Number(t.num))); return { n, sum }; }).sort((a,b) => a.sum - b.sum);
                let html = `<h2>🎮 게임 결과</h2><table style="width:100%">`;
                res.forEach((p, i) => html += `<tr style="${i===0?'color:var(--accent-gold)':''}"><td>${i+1}위</td><td>${p.n}</td><td>${p.sum}점</td></tr>`);
                UI.set('modal-body', html + `</table><button onclick="location.reload()" style="margin-top:20px; background:var(--accent-green); width:100%;">대기실</button>`);
            });
        }
        db.ref('board').on('value', snap => { const bEl = document.getElementById('game-board'); if(!bEl) return; bEl.querySelectorAll('.tile').forEach(t => t.remove()); boardTiles = snap.val() || {}; for (let id in boardTiles) renderTile(bEl, id, boardTiles[id], false); if (currentTurn === myName) updateRegPoints(); });
        db.ref('hands/' + myName).on('value', snap => { myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val })); if(sortMode!=='manual') applyAutoSort(); renderRack(); if (currentTurn === myName) updateRegPoints(); });
        window.setSortMode = function(m) { sortMode = m; applyAutoSort(); renderRack(); };
        function applyAutoSort() { const co = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 }; myHandData.sort((a, b) => { const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); return sortMode === 'color' ? (co[a.color] - co[b.color] || vA - vB) : (vA - vB || co[a.color] - co[b.color]); }); }
        function renderRack() { const rEl = document.getElementById('my-rack'); if(!rEl) return; rEl.querySelectorAll('.tile').forEach(el => el.remove()); myHandData.forEach(t => renderTile(rEl, t.id, t, true)); }
    };
</script>
</body>
