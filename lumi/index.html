<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루미큐브 : Ver. 37 </title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Pretendard:wght@600&display=swap" rel="stylesheet">

    <style>
/* 이 부분을 <style> 바로 아래에 추가하세요! */
        body[data-theme='dark'] {
            --bg-color: #0a0a0a; --panel-bg: rgba(15, 15, 15, 0.98);
            --tile-bg: #2d2d2d; --tile-text: #eee;
        }
        body[data-theme='pink'] {
            --bg-color: #fff0f5; --panel-bg: rgba(255, 240, 245, 0.98);
            --tile-bg: #ffe6ee; --tile-text: #ff4d94;
        }
        /* 기존 .tile 클래스를 아래 내용으로 수정 (color 속성 추가) */
        .tile { 
            width: 44px; height: 64px; 
            background: var(--tile-bg) !important; color: var(--tile-text); /* <- color 추가됨 */
            border-radius: 6px; display: flex; justify-content: center; align-items: center; 
            font-weight: 800; font-size: 1.3rem; border: 1px solid #d1d1d1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; cursor: grab;
            transition: background 0.3s, color 0.3s;
        }
        :root {
            --bg-color: #121212; --panel-bg: rgba(30, 30, 30, 0.98); --tile-bg: #f8f5f0;
            --accent-purple: #9d50bb; --accent-green: #2ecc71; --accent-gold: #f1c40f; --accent-red: #e74c3c;
            --turn-blue: #3498db; --chat-bg: rgba(25, 25, 25, 0.98);
            --chat-text-color: #ffffff;
        }
        
body { background-color: var(--bg-color); color: #e0e0e0; margin: 0; font-family: 'Inter', 'Pretendard', sans-serif; height: 100vh; width: 100vw; overflow: hidden; user-select: none; }
        
        #main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        #ui-layer { height: 60px; padding: 0 20px; background: var(--panel-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        #game-board { flex: 1; background: #1e1e1e; position: relative; overflow: hidden; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 75px; }
        #game-board.not-my-turn { pointer-events: none; opacity: 0.7; filter: brightness(0.6); }

        .tile { width: 44px; height: 64px; background: var(--tile-bg); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.3rem; border: 1px solid #d1d1d1; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; cursor: grab; }
        #game-board .tile { position: absolute; }
        #my-rack .tile { position: relative; flex-shrink: 0; }

        .red { color: #d63031 !important; border-bottom: 4px solid #d63031 !important; }
        .blue { color: #0984e3 !important; border-bottom: 4px solid #0984e3 !important; }
        .yellow { color: #f39c12 !important; border-bottom: 4px solid #f39c12 !important; }
        .black { color: #2d3436 !important; border-bottom: 4px solid #2d3436 !important; }
        .joker { color: #8e44ad !important; font-size: 1.7rem !important; }

        /* 기존 #chat-wrapper 관련 스타일들을 아래 내용으로 교체 */
#chat-wrapper { position: fixed; bottom: 230px; right: 20px; width: 500px; z-index: 20000; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
/* resize 속성을 추가하여 우측 상단 모서리를 잡고 크기를 조절할 수 있게 합니다 */
#chat-log-container { display: flex; gap: 5px; height: 280px; min-height: 100px; min-width: 250px; background: var(--chat-bg); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; display: none; resize: both; overflow: hidden; }
#game-log { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.8rem; border-right: 1px solid rgba(255,255,255,0.1); color: #ccc; }
#chat-box { flex: 1.2; padding: 10px; overflow-y: auto; font-size: 0.85rem; }
/* word-break 속성을 추가하여 긴 글이나 띄어쓰기 없는 영어도 강제로 다음 줄로 넘깁니다 */
#chat-box div { margin-bottom: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); word-break: break-all; overflow-wrap: break-word; }
#log-entry { margin-bottom: 3px; font-family: monospace; }
#log-time { color: var(--accent-gold); margin-right: 5px; }

#chat-input-container { display: none; background: #1a1a1a; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); pointer-events: auto; align-items: center; padding: 5px; gap: 5px; }
#chat-input { flex: 1; background: transparent; border: none; padding: 8px; color: #fff; outline: none; }

        #audio-controls { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; margin-top: 5px; pointer-events: auto; }
        #audio-buttons { display: flex; gap: 5px; }
        #chat-toggle, #bgm-toggle { background: var(--accent-purple); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        #bgm-toggle { background: #444; }
        #bgm-toggle.playing { background: var(--accent-green); color: #000; }

        .volume-container, .color-picker-container { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .volume-container span, .color-picker-container span { font-size: 0.7rem; color: #aaa; font-weight: bold; }
        #bgm-volume { cursor: pointer; accent-color: var(--accent-green); width: 80px; height: 4px; }
        #chat-color-input { cursor: pointer; border: none; width: 20px; height: 20px; background: none; padding: 0; }

        #my-rack { height: 210px; background: #151515; border-top: 2px solid rgba(255, 255, 255, 0.1); position: relative; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; z-index: 600; overflow-y: auto; }
        #rack-controls { position: sticky; top: 0; width: 100%; display: flex; justify-content: flex-end; gap: 8px; background: #151515; padding-bottom: 10px; }
        
        button { padding: 8px 16px; font-weight: 700; cursor: pointer; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .mode-btn { border: 1px solid #555; background: #333; margin: 0 5px; font-size: 0.8rem; }
        .mode-btn.selected { background: var(--accent-purple); border-color: #fff; }
        .player-badge { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .active-turn-badge { border-color: var(--turn-blue) !important; background: rgba(52, 152, 219, 0.2) !important; }
        .tile-count { background: #fff; color: #000; padding: 1px 6px; border-radius: 5px; font-weight: 900; }
        
        #overlay-layer, #entry-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        #entry-layer { z-index: 30000; }
        .modal-card { background: #2a2a2a; padding: 40px; border-radius: 24px; text-align: center; min-width: 400px; border: 1px solid #444; }

        @keyframes hint-glow {
            0% { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
            50% { box-shadow: 0 0 20px var(--accent-gold); transform: scale(1.05); }
            100% { box-shadow: 0 0 5px var(--accent-gold); transform: scale(1); }
        }
        .hint-target {
            animation: hint-glow 1s infinite;
            border: 2px solid var(--accent-gold) !important;
            z-index: 1000 !important;
        }
/* 대기실 플레이어 닉네임 태그 디자인 */
        .lobby-player-tag {
            display: inline-flex;
            align-items: center;
            background: var(--turn-blue);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px; /* 동글동글한 캡슐 모양 */
            margin: 4px; /* 이름 사이 간격 */
            font-weight: 800;
            font-size: 0.95rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        
        /* 대기실 관전자 닉네임 태그 디자인 */
        .lobby-player-tag.spec-tag {
            background: #333;
            color: #aaa;
            border: 1px dashed #777;
            box-shadow: none;
        }
/* 실시간 점수 표시 스타일 */
#reg-score-badge { background: rgba(241, 196, 15, 0.2); border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 5px 12px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; margin-right: 10px; display: none; }
/* 전적 테이블 스타일 */
.rank-table { width: 100%; margin-top: 15px; border-collapse: collapse; color: white; font-size: 0.9rem; }
.rank-table th { border-bottom: 1px solid #555; padding: 8px; color: var(--accent-gold); }
.rank-table td { padding: 8px; border-bottom: 1px solid #333; }

/* === 드래그 선택 박스 스타일 === */
#selection-box {
    position: absolute;
    border: 1px solid rgba(52, 152, 219, 0.8);
    background: rgba(52, 152, 219, 0.2);
    pointer-events: none; /* 마우스 이벤트 방해 금지 */
    display: none;
    z-index: 9999;
}
/* 선택된 타일 강조 효과 */
.selected-tile {
    box-shadow: 0 0 10px 3px var(--turn-blue) !important;
    transform: scale(1.05);
    z-index: 50 !important;
}

/* === 테마 설정 === */
body[data-theme='classic'] { --tile-bg: #f8f5f0; --tile-text: #000; }
body[data-theme='dark'] { --tile-bg: #2d2d2d; --tile-text: #fff; }
body[data-theme='pink'] { --tile-bg: #ffeaf2; --tile-text: #ff4d94; }

/* 타일 스타일 수정 (기존 .tile 클래스를 아래 내용으로 덮어쓰거나 수정하세요) */
.tile { 
    width: 44px; height: 64px; 
    background: var(--tile-bg) !important; /* 테마 변수 적용 */
    border-radius: 6px; display: flex; justify-content: center; align-items: center; 
    font-weight: 800; font-size: 1.3rem; 
    border: 1px solid rgba(0,0,0,0.1); 
    box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    z-index: 10; cursor: grab; 
    transition: background 0.3s, color 0.3s; /* 부드러운 전환 */
}

/* 테마 선택 버튼 스타일 */
.theme-btn { padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; border: 1px solid #555; cursor: pointer; }
.theme-btn.classic { background: #f8f5f0; color: #000; }
.theme-btn.dark { background: #2d2d2d; color: #fff; }
.theme-btn.pink { background: #ffeaf2; color: #ff4d94; }

/* === 이모티콘 말풍선 스타일 (플레이어 배지 '밑'에 배치) === */
.emoji-bubble {
    position: absolute;
    top: 38px; /* 배지 높이에 맞춰 조정 (배지 바로 밑) */
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 5px 12px;
    border-radius: 15px;
    font-weight: 800;
    font-size: 1.2rem;
    white-space: nowrap;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    animation: fade-down-out 3s forwards; /* 아래로 내려가는 애니메이션 */
}

/* 말풍선 꼬리 (위쪽을 향하게) */
.emoji-bubble::after {
    content: '';
    position: absolute;
    top: -5px; 
    left: 50%;
    transform: translateX(-50%);
    border-width: 0 5px 5px;
    border-style: solid;
    border-color: transparent transparent white;
}

/* 아래로 스르륵 내려가며 사라지는 효과 */
@keyframes fade-down-out {
    0% { opacity: 0; transform: translate(-50%, -10px); }
    10% { opacity: 1; transform: translate(-50%, 0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, 15px); }
}
/* 퀵 버튼 스타일 */
.quick-emoji-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 5px;
    padding: 5px 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: 0.2s;
}
.quick-emoji-btn:hover { background: var(--accent-purple); }

/* === 타일 개수 위험 알림 스타일 === */
.danger-player {
    animation: danger-pulse 1.5s infinite; /* 빨간색으로 깜빡이는 효과 */
    border: 2px solid #ff4d4d !important;
    position: relative;
}

.danger-tag {
    position: absolute;
    top: -12px;
    right: -5px;
    background: #ff4d4d;
    color: white;
    font-size: 0.6rem;
    padding: 2px 5px;
    border-radius: 4px;
    font-weight: bold;
    text-transform: uppercase;
}

@keyframes danger-pulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); background-color: rgba(255, 77, 77, 0.1); }
    70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); background-color: rgba(255, 77, 77, 0.3); }
    100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
}

    </style>
</head>
<body>

<div id="entry-layer">
    <div class="modal-card">
        <h2 style="color:white; margin-bottom:10px;">🎮 루미큐브</h2>
        <input type="text" id="nick-input" placeholder="닉네임을 입력하세요" style="width: 80%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; outline: none; text-align: center; font-size: 1.1rem;">
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button onclick="window.handleEntry('player')" style="background: var(--accent-purple); padding: 15px 30px; font-weight: 900; cursor: pointer;">플레이어로 참여</button>
            <button onclick="window.handleEntry('spectator')" style="background: var(--accent-green); color: #000; padding: 15px 30px; font-weight: 900; cursor: pointer;">관전자로 참여</button>
        </div>
    </div>
</div>

<div id="overlay-layer">
    <div class="modal-card" id="modal-body"><h2>서버 연결 중...</h2></div>
</div>

<div id="main-container">
    
    <div id="ui-layer">
        <div style="display: flex; align-items: center; gap: 15px; flex: 1.5;">
            <span style="font-weight: 900; font-size: 1.2rem; color: #fff;">루미큐브</span>
            <div style="display: flex; gap: 5px; margin-left: 10px;">
                <button class="theme-btn classic" onclick="window.setTheme('classic')">표준</button>
                <button class="theme-btn dark" onclick="window.setTheme('dark')">다크</button>
                <button class="theme-btn pink" onclick="window.setTheme('pink')">키티</button>
            </div>
            <div id="player-list-container" style="display: flex; gap: 8px; margin-left: 10px;"></div>
        </div>
        <div id="turn-info" style="font-weight: bold; color: var(--turn-blue); flex: 1; text-align: center;">연결 중...</div>
        <div id="timer-display" style="font-weight: 900; color: var(--accent-red); font-size: 1.5rem; flex: 0.5; text-align: center;"></div>
        <div style="display: flex; gap: 8px; flex: 1.5; justify-content: flex-end;">
            <button id="btn-hint" onclick="window.showHint()" style="background:var(--accent-gold); color:#000;">힌트</button>
            <button id="btn-force-lobby" onclick="window.returnToLobby()" style="background:var(--accent-red); display:none;">리셋</button>
            <span id="reg-score-badge">등록 점수: 0 / 30</span>
            <button id="btn-force-next" onclick="window.forceNextTurn()" style="background:var(--accent-gold); color:#000; display:none;">강제 턴</button>
            <span id="pool-badge" style="color:var(--accent-purple); font-weight:900; align-self:center; margin-right:10px;">POOL: --</span>
            <button id="btn-rollback" onclick="window.rollbackTurn()" disabled>무르기</button>
            <button id="btn-draw" onclick="window.drawTile()" disabled style="background:var(--accent-purple);">뽑기</button>
            <button id="btn-end" onclick="window.handleTurnEnd()" disabled style="background:var(--accent-green); color:#000;">종료</button>
        </div>
    </div>

    <div id="game-board" ondragover="event.preventDefault()" ondrop="window.dropOnBoard(event)" onmousedown="window.startSelection(event)">
        <div id="reg-info" style="position: absolute; top: 10px; width: 100%; text-align: center; color: var(--accent-gold); font-weight: bold; z-index: 100;"></div>
        <div id="selection-box"></div>
    </div>

    <div id="rack-controls">
        <div id="quick-emojis" style="display: flex; gap: 5px; margin-right: auto; padding-left: 10px;">
            <button class="quick-emoji-btn" onclick="window.sendEmoji('⚡')">⚡</button>
            <button class="quick-emoji-btn" onclick="window.sendEmoji('👍')">👍</button>
            <button class="quick-emoji-btn" onclick="window.sendEmoji('🤔')">🤔</button>
            <button class="quick-emoji-btn" onclick="window.sendEmoji('🙇')">🙇</button>
            <button class="quick-emoji-btn" onclick="window.sendEmoji('😭')">😭</button>
            <button class="quick-emoji-btn" onclick="window.sendEmoji('🔥')">🔥</button>
        </div>
        <button onclick="window.setSortMode('number')">777 숫자</button>
        <button onclick="window.setSortMode('color')">123 색상</button>
        <button onclick="window.setSortMode('manual')" style="background:var(--accent-purple);">수동 정렬</button>
    </div>
    <div id="my-rack" ondragover="event.preventDefault()" ondrop="window.dropOnRack(event)"></div>

</div> <div id="chat-wrapper">
    <div id="chat-log-container">
        <div id="game-log"></div>
        <div id="chat-box"></div>
    </div>
    <div id="chat-input-container">
        <input type="text" id="chat-input" placeholder="메시지..." onkeypress="if(event.keyCode==13) window.sendChat()">
    </div>
    <div id="audio-controls">
        <div class="color-picker-container">
            <span>TXT</span>
            <input type="color" id="chat-color-input" value="#ffffff" oninput="window.updateChatColor(this.value)">
        </div>
        <div class="volume-container">
            <span>VOL</span>
            <input type="range" id="bgm-volume" min="0" max="1" step="0.01" value="0.5" oninput="window.updateVolume(this.value)">
        </div>
        <div id="audio-buttons">
            <button id="btn-clear-logs" onclick="window.clearAllLogs()" style="display:none; background:var(--accent-red); color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold; font-size:0.8rem;">🗑️ 로그 초기화</button>
            <button id="bgm-toggle" onclick="window.toggleBGM()">🎵 BGM OFF</button>
            <button id="chat-toggle" onclick="window.toggleChat()">📜 로그/채팅</button>
        </div>
    </div>
</div>

<script>
    let db; 
    let myName = "", myRole = "player", currentHost = "";
    let turnTimer = null, timeLeft = 60;
    let playerList = [], currentTurn = "", sortMode = 'color', manualOrder = [];
    let myHandData = [], gameStatus = "waiting", boardTiles = {}, gameMode = "normal";
    let initialBoardState = {};
    window.latestPlayersData = {}; 

    const SOUND_ASSETS = {
        bgm: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        tilePick: "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3",
        tileDrop: "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3",
        turnAlarm: "https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3",
        error: "https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3",
        success: "https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"
    };

    const audioCtx = { bgm: new Audio(SOUND_ASSETS.bgm), isBGMPlaying: false, currentVolume: 0.5 };
    audioCtx.bgm.loop = true;

    function playSFX(key) {
        const sfx = new Audio(SOUND_ASSETS[key]);
        sfx.volume = audioCtx.currentVolume;
        sfx.play().catch(() => {});
    }

    // ==========================================
    // 1. 전역 함수 선언부 (HTML 버튼들이 이 함수들을 찾습니다)
    // ==========================================
    window.updateVolume = (val) => { audioCtx.currentVolume = val; audioCtx.bgm.volume = val; };
    window.updateChatColor = (color) => { 
        document.documentElement.style.setProperty('--chat-text-color', color);
        localStorage.setItem('lumi-chat-color', color);
    };

    window.setTheme = function(themeName) {
        document.body.setAttribute('data-theme', themeName);
        localStorage.setItem('lumi-theme', themeName); 
    };

    window.handleEntry = function(role, isAuto = false) {
        if (!isAuto) {
            const nickInput = document.getElementById('nick-input');
            if (!nickInput.value.trim()) return alert("닉네임을 입력하세요!");
            myName = nickInput.value.trim(); myRole = role; 
        } else {
            myName = window.sessionStorage.getItem('lumi-nick');
            myRole = window.sessionStorage.getItem('lumi-role') || "player";

        db.ref('players/' + myName).onDisconnect().remove();
        document.getElementById('entry-layer').style.display = 'none';
        if(!isAuto) playSFX('success');

        db.ref('hands/' + myName).on('value', snap => {
            myHandData = Object.entries(snap.val() || {}).map(([id, val]) => ({ id, ...val }));
            db.ref('players/' + myName).update({ tileCount: myHandData.length });
            window.applyAutoSort();
        });

    window.startGame = function() {
        if (playerList.length < 2) return alert("최소 2명이 필요합니다.");
        const colors = ['red', 'blue', 'yellow', 'black'], sets = (gameMode === 'expert') ? 3 : 2;
        let pool = [];
        colors.forEach(c => { for(let i=1; i<=13; i++) { for(let j=0; j<sets; j++) { pool.push({ num: i, color: c }); } } });
        pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
        if(sets === 3) pool.push({ num: 'J', color: 'joker' }, { num: 'J', color: 'joker' });
        pool.sort(() => Math.random() - 0.5);
        
        const updates = { 'board': null, 'currentTurn': playerList[0], 'settings/status': "playing" }, allHands = {};
        
        playerList.forEach(p => {
            const hand = {};
            for(let i=0; i<14; i++) { const t = pool.pop(); if(t) hand['tile_' + Math.random().toString(36).substr(2,9)] = t; }
            allHands[p] = hand; updates[`players/${p}/registered`] = false;
        });
        updates['hands'] = allHands;
        const poolObj = {}; pool.forEach((t, idx) => { poolObj[`p_${idx}`] = t; });
        updates['pool'] = poolObj;
        window.addGameLog(`📢 게임이 시작되었습니다!`);
        
        db.ref('/').update(updates).then(() => {
            db.ref('settings/turnStartTime').set(firebase.database.ServerValue.TIMESTAMP);
        });
    };

    window.showHint = function() {
        if (myRole !== 'player' || currentTurn !== myName) return alert("내 차례에만 사용할 수 있습니다.");
        document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target'));
        const sets = [];
        const hand = [...myHandData];
        const isReg = window.latestPlayersData[myName]?.registered;

        const numMap = {};
        hand.forEach(t => {
            if (t.num === 'J') return;
            if (!numMap[t.num]) numMap[t.num] = [];
            if (!numMap[t.num].find(it => it.color === t.color)) numMap[t.num].push(t);
        });
        Object.values(numMap).forEach(group => { 
            if (group.length >= 3) sets.push(group.map(t => ({ type: 'rack', id: t.id }))); 
        });

        const colorMap = { 'red': [], 'blue': [], 'yellow': [], 'black': [] };
        hand.forEach(t => { if (t.num !== 'J') colorMap[t.color].push(t); });
        Object.values(colorMap).forEach(tiles => {
            tiles.sort((a, b) => Number(a.num) - Number(b.num));
            let currentRun = [];
            for (let i = 0; i < tiles.length; i++) {
                if (currentRun.length === 0 || Number(tiles[i].num) === Number(currentRun[currentRun.length - 1].num) + 1) {
                    currentRun.push(tiles[i]);
                } else if (Number(tiles[i].num) !== Number(currentRun[currentRun.length - 1].num)) {
                    if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
                    currentRun = [tiles[i]];
                }
            }
            if (currentRun.length >= 3) sets.push(currentRun.map(t => ({ type: 'rack', id: t.id })));
        });

        if (isReg) {
            const rows = {};
            Object.entries(boardTiles).forEach(([id, t]) => { t.id = id; if(!rows[t.y]) rows[t.y] = []; rows[t.y].push(t); });
            for (let y in rows) {
                const rowTiles = rows[y].sort((a,b) => a.x - b.x);
                let currentBoardSet = [];
                for (let i = 0; i < rowTiles.length; i++) {
                    currentBoardSet.push(rowTiles[i]);
                    if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                        if (currentBoardSet.length >= 3) {
                            const nonJokers = currentBoardSet.filter(t => t.num !== 'J');
                            if (nonJokers.length > 0) {
                                const isGroup = nonJokers.every(t => t.num === nonJokers[0].num);
                                hand.forEach(handTile => {
                                    if (handTile.num === 'J') return;
                                    if (isGroup && currentBoardSet.length < 4) {
                                        const boardColors = currentBoardSet.map(t => t.color);
                                        if (handTile.num === nonJokers[0].num && !boardColors.includes(handTile.color)) {
                                            sets.push([{ type: 'rack', id: handTile.id }, ...currentBoardSet.map(t => ({ type: 'board', id: t.id }))]);
                                        }
                                    } else if (!isGroup) {
                                        const color = nonJokers[0].color;
                                        const firstRealIdx = currentBoardSet.findIndex(t => t.num !== 'J');
                                        const firstRealNum = Number(currentBoardSet[firstRealIdx].num);
                                        const firstNum = firstRealNum - firstRealIdx;
                                        const lastNum = firstNum + currentBoardSet.length - 1;
                                        const hn = Number(handTile.num);
                                        if (handTile.color === color && ((hn === firstNum - 1 && hn >= 1) || (hn === lastNum + 1 && hn <= 13))) {
                                            sets.push([{ type: 'rack', id: handTile.id }, ...currentBoardSet.map(t => ({ type: 'board', id: t.id }))]);
                                        }
                                    }
                                });
                            }
                        }
                        currentBoardSet = [];
                    }
                }
            }
        }

        if (sets.length === 0) return alert("현재 낼 수 있는 타일이 없습니다.");

        const allTargetIds = new Set();
        sets.forEach(setInfo => {
            setInfo.forEach(item => {
                allTargetIds.add(item.type === 'board' ? item.id : "rack-" + item.id);
            });
        });

        allTargetIds.forEach(domId => {
            let el = document.getElementById(domId);
            if (el) el.classList.add('hint-target');
        });

        setTimeout(() => document.querySelectorAll('.hint-target').forEach(t => t.classList.remove('hint-target')), 5000);
    };

    window.dropOnBoard = function(e) {
        e.preventDefault();
        if (myRole !== 'player' || currentTurn !== myName) return;
        
        const id = e.dataTransfer.getData("text");
        const rect = document.getElementById('game-board').getBoundingClientRect();
        const TILE_WIDTH = 50; 
        const TILE_HEIGHT = 75;
        let dropX = Math.round((e.clientX - rect.left - 22) / TILE_WIDTH) * TILE_WIDTH + 2;
        let dropY = Math.round((e.clientY - rect.top - 32) / TILE_HEIGHT) * TILE_HEIGHT + 2;

        const tilesOnSameRow = Object.values(boardTiles).filter(t => t.y === dropY);
        const up = {}; 

        const overlappingTiles = tilesOnSameRow.filter(t => t.x >= dropX);
        if (overlappingTiles.length > 0 && overlappingTiles.some(t => t.x === dropX)) {
            overlappingTiles.sort((a, b) => a.x - b.x);
            let currentShiftX = dropX;
            for (let i = 0; i < overlappingTiles.length; i++) {
                const t = overlappingTiles[i];
                if (t.x === currentShiftX) {
                    const originalId = Object.keys(boardTiles).find(key => boardTiles[key] === t);
                    up[`board/${originalId}/x`] = t.x + TILE_WIDTH;
                    currentShiftX += TILE_WIDTH;
                } else break;
            }
        }

        const inHand = myHandData.find(t => t.id === id);
        if (inHand) {
            up[`board/${id}`] = { num: inHand.num, color: inHand.color, x: dropX, y: dropY };
            up[`hands/${myName}/${id}`] = null; 
            db.ref('/').update(up); 
            playSFX('tileDrop');
        } else if (boardTiles[id]) {
            if (!window.latestPlayersData[myName]?.registered && initialBoardState[id]) { 
                playSFX('error'); 
                return alert("등록 전에는 바닥 패를 조작할 수 없습니다."); 
            }
            if (selectedTiles.includes(id)) {
                const originX = boardTiles[id].x;
                const originY = boardTiles[id].y;
                const dx = dropX - originX;
                const dy = dropY - originY;

                selectedTiles.forEach(tileId => {
                    if (!boardTiles[tileId]) return;
                    if (!window.latestPlayersData[myName]?.registered && initialBoardState[tileId]) return;
                    up[`board/${tileId}/x`] = boardTiles[tileId].x + dx;
                    up[`board/${tileId}/y`] = boardTiles[tileId].y + dy;
                });
                selectedTiles = [];
                document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
            } else {
                up[`board/${id}/x`] = dropX;
                up[`board/${id}/y`] = dropY;
            }
            db.ref('/').update(up); 
            playSFX('tileDrop');
        }
    };

    window.dropOnRack = function(e) {
        e.preventDefault();
        if (myRole !== 'player') return;
        const id = e.dataTransfer.getData("text");
        db.ref(`board/${id}`).once('value', s => { if (s.exists()) { const up = {}; up[`hands/${myName}/${id}`] = s.val(); up[`board/${id}`] = null; db.ref('/').update(up); playSFX('tilePick'); } });
    };

    window.applyAutoSort = function() {
        const rEl = document.getElementById('my-rack');
        if(!rEl) return;
        if (sortMode === 'manual' && manualOrder.length > 0) { myHandData.sort((a, b) => manualOrder.indexOf(a.id) - manualOrder.indexOf(b.id)); }
        else {
            const coMap = { 'red': 1, 'blue': 2, 'yellow': 3, 'black': 4, 'joker': 5 };
            myHandData.sort((a, b) => { const vA = a.num === 'J' ? 99 : Number(a.num), vB = b.num === 'J' ? 99 : Number(b.num); return sortMode === 'color' ? (coMap[a.color] - coMap[b.color] || vA - vB) : (vA - vB || coMap[a.color] - coMap[b.color]); });
        }
        rEl.querySelectorAll('.tile').forEach(t => t.remove());
        myHandData.forEach(t => {
            if (!t || t.num === undefined) return;
            const div = document.createElement('div');
            div.id = "rack-" + t.id; div.className = `tile ${t.color}`; div.innerText = t.num; div.draggable = (myRole === 'player');
            div.ondragstart = (e) => { if (myRole !== 'player') return e.preventDefault(); e.dataTransfer.setData("text", t.id); e.dataTransfer.setData("source", "rack"); playSFX('tilePick'); };
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => { e.preventDefault(); e.stopPropagation(); const dId = e.dataTransfer.getData("text"), src = e.dataTransfer.getData("source"); if (src === "rack") window.moveTileInRack(dId, t.id); else window.dropOnRack(e); };
            rEl.appendChild(div);
        });
    };

    window.moveTileInRack = function(dId, tId) { if (dId === tId) return; if (sortMode !== 'manual') { sortMode = 'manual'; manualOrder = myHandData.map(t => t.id); } const fIdx = manualOrder.indexOf(dId), tIdx = manualOrder.indexOf(tId); if (fIdx > -1 && tIdx > -1) { manualOrder.splice(fIdx, 1); manualOrder.splice(tIdx, 0, dId); playSFX('tileDrop'); window.applyAutoSort(); } };

                let html = `<table class="rank-table"><tr><th>이름</th><th>누적 승리</th></tr>`;

        if (e.target.classList.contains('tile')) return;

        isSelecting = true;
        const board = document.getElementById('game-board');
        const rect = board.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;

        const selBox = document.getElementById('selection-box');
        selBox.style.left = startX + 'px';
        selBox.style.top = startY + 'px';
        selBox.style.width = '0px';
        selBox.style.height = '0px';
        selBox.style.display = 'block';

        selectedTiles = [];
        document.querySelectorAll('.selected-tile').forEach(t => t.classList.remove('selected-tile'));
    };

    document.addEventListener('mousemove', function(e) {
        if (!isSelecting) return;
        
        const board = document.getElementById('game-board');
        const rect = board.getBoundingClientRect();
        let currentX = e.clientX - rect.left;
        let currentY = e.clientY - rect.top;

        currentX = Math.max(0, Math.min(currentX, rect.width));
        currentY = Math.max(0, Math.min(currentY, rect.height));

        const selBox = document.getElementById('selection-box');
        const left = Math.min(startX, currentX);
        const top = Math.min(startY, currentY);
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);

        selBox.style.left = left + 'px';
        selBox.style.top = top + 'px';
        selBox.style.width = width + 'px';
        selBox.style.height = height + 'px';

        selectedTiles = [];
        document.querySelectorAll('#game-board .tile').forEach(tile => {
            const tX = parseInt(tile.style.left);
            const tY = parseInt(tile.style.top);
            const tRight = tX + 44; 
            const tBottom = tY + 64; 

            if (!(tRight < left || tX > left + width || tBottom < top || tY > top + height)) {
                tile.classList.add('selected-tile');
                selectedTiles.push(tile.id);
            } else {
                tile.classList.remove('selected-tile');
            }
        });
    });

    document.addEventListener('mouseup', function() {
        if (isSelecting) {
            isSelecting = false;
            document.getElementById('selection-box').style.display = 'none';
        }
    });

        });
        db.ref('chats').push({ name: myName, msg: msg, color: '#f1c40f' });
    };

    window.showEmojiOnScreen = function(senderName, msg) {
        const badges = document.querySelectorAll('.player-badge');
        let targetBadge = null;
        badges.forEach(b => {
            if (b.innerText.includes(senderName)) targetBadge = b;
        });

        if (targetBadge) {
            const oldBubble = targetBadge.querySelector('.emoji-bubble');
            if (oldBubble) oldBubble.remove();

            const bubble = document.createElement('div');
            bubble.className = 'emoji-bubble';
            bubble.innerText = msg;
            targetBadge.style.position = 'relative'; 
            targetBadge.appendChild(bubble);

            setTimeout(() => bubble.remove(), 3000);
        }
    };

    // 타임아웃 페널티 로직
    window.timeOutPenalty = function() {
        if (window.isPenalizing) return; 
        window.isPenalizing = true;

        alert("시간 초과! 바닥 초기화 및 벌칙 타일 3개.");
        window.addGameLog(`⏰ ${myName}님이 시간 초과로 벌칙 타일 3개를 받았습니다.`);
        const up = {};
        Object.keys(boardTiles).forEach(k => { if(!initialBoardState[k]) up[`hands/${myName}/${k}`] = boardTiles[k]; });
        up['board'] = initialBoardState;
        
        db.ref('pool').limitToFirst(3).once('value', s => {
            if (s.exists()) {
                const poolObj = s.val();
                Object.keys(poolObj).forEach(key => {
                    up[`hands/${myName}/tile_${Date.now()}_${Math.random().toString(36).substr(2,5)}`] = poolObj[key];
                    up[`pool/${key}`] = null;
                });
            }
            db.ref('/').update(up).then(() => { 
                playSFX('error'); 
                window.nextTurnAction(); 
                window.isPenalizing = false;
            });
        });
    };

    // 보드 검증 로직
    function isValidSet(tiles) {
        if (tiles.length < 3) return false;
        const nonJokers = tiles.filter(t => t.num !== 'J');
        if (nonJokers.length === 0) return true;
        const isGroup = () => {
    const num = nonJokers[0].num;
    const realColors = nonJokers.map(t => t.color);
    // 조커를 제외한 순수 패들끼리 색이 중복되지 않는지 확인
    const isColorUnique = (new Set(realColors)).size === realColors.length;
    // 패의 총 개수가 3~4개이고, 숫자가 모두 같으며, 색이 중복되지 않아야 함
    return nonJokers.every(t => t.num === num) && isColorUnique && tiles.length >= 3 && tiles.length <= 4;
};
        const isRun = () => {
    const color = nonJokers[0].color;
    if (!nonJokers.every(t => t.color === color)) return false;

    // 타일들을 X 좌표 순서대로 정렬해서 실제 배치된 순서로 확인
    const sortedTiles = [...tiles].sort((a, b) => a.x - b.x);
    let firstNum = -1;
    let firstNumIdx = -1;

    for (let i = 0; i < sortedTiles.length; i++) {
        if (sortedTiles[i].num !== 'J') {
            firstNum = Number(sortedTiles[i].num);
            firstNumIdx = i;
            break;
        }
    }

    // 첫 번째 숫자를 기준으로 앞뒤 조커들이 가질 숫자를 계산해서 유효성 검사
    for (let i = 0; i < sortedTiles.length; i++) {
        const expectedNum = firstNum - (firstNumIdx - i);
        if (expectedNum < 1 || expectedNum > 13) return false; // 1~13 범위를 벗어나면 불가
        if (sortedTiles[i].num !== 'J' && Number(sortedTiles[i].num) !== expectedNum) return false;
    }
    return true;
};

    function validateBoard() {
        const rows = {};
        Object.values(boardTiles).forEach(t => { if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
        for (let y in rows) {
            const rowTiles = rows[y].sort((a,b) => a.x - b.x);
            let currentSet = [];
            for (let i=0; i<rowTiles.length; i++) {
                currentSet.push(rowTiles[i]);
                if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                    if (!isValidSet(currentSet)) return false;
                    currentSet = [];
                }
            }
        }
        return true;
    }

    window.drawTile = function() {
        if (myRole !== 'player' || currentTurn !== myName) return; 
        
        if (Object.keys(boardTiles).length > Object.keys(initialBoardState).length) {
            playSFX('error');
            return alert("패를 내려놓은 상태에서는 뽑을 수 없습니다. 무르거나 턴을 종료하세요.");
        }

        if (!validateBoard()) { 
            playSFX('error'); 
            return alert("바닥 패 배치가 어긋나 있습니다! '무르기'를 누른 후 타일을 뽑아주세요."); 
        }

        db.ref('pool').limitToFirst(1).once('value', s => {
            if (!s.exists()) return window.nextTurnAction();
            const poolObj = s.val(), key = Object.keys(poolObj)[0], up = {};
            up[`hands/${myName}/tile_${Date.now()}`] = poolObj[key];
            up[`pool/${key}`] = null;
            window.addGameLog(`🎴 ${myName}님이 타일을 1개 뽑았습니다.`);
            db.ref('/').update(up).then(() => { playSFX('tilePick'); window.nextTurnAction(); });
        });
    };

    window.handleTurnEnd = function() {
        if (myRole !== 'player') return;
        if (Object.keys(boardTiles).length === Object.keys(initialBoardState).length) return alert("패를 내거나 뽑으세요.");
        if (!validateBoard()) { playSFX('error'); return alert("보드 배치가 유효하지 않습니다!"); }
        
        db.ref(`players/${myName}/registered`).once('value', snap => {
            const isReg = snap.val();
            if (!isReg) {
                let isPiggy = false;
                const rows = {};
                Object.entries(boardTiles).forEach(([id, t]) => { t.id = id; if(!rows[t.y]) rows[t.y]=[]; rows[t.y].push(t); });
                for (let y in rows) {
                    const rowTiles = rows[y].sort((a,b) => a.x - b.x);
                    let curr = [];
                    for (let i=0; i<rowTiles.length; i++) {
                        curr.push(rowTiles[i]);
                        if (!rowTiles[i+1] || rowTiles[i+1].x - rowTiles[i].x > 55) {
                            if (curr.some(t => initialBoardState[t.id]) && curr.some(t => !initialBoardState[t.id])) isPiggy = true;
                            curr = [];
                        }
                    }
                }
                if (isPiggy) { playSFX('error'); return alert("🚨 첫 등록 시에는 바닥 패에 붙일 수 없습니다."); }
                let pts = 0;
                Object.entries(boardTiles).forEach(([id, t]) => { if (!initialBoardState[id]) pts += (t.num === 'J' ? 30 : Number(t.num)); });
                if (pts < 30) { playSFX('error'); return alert(`등록 실패 (${pts}점)! 30점 이상 내야 합니다.`); }
                db.ref(`players/${myName}`).update({ registered: true });
            }
            
            if (myHandData.length === 0) {
                db.ref('hands').once('value', hSnap => {
                    const allHands = hSnap.val(), scores = {};
                    playerList.forEach(p => { let s = 0; Object.values(allHands[p] || {}).forEach(t => s += (t.num === 'J' ? 50 : Number(t.num))); scores[p] = s; });
                    
                    window.recordWin(myName);
                    
                    db.ref('/').update({ "settings/status": "finished", "settings/gameResult": { winner: myName, scores: scores } });
                });
            } else { 
                if (!isReg) {
                    window.addGameLog(`⭐ ${myName}님이 첫 등록에 성공했습니다!`);
                } else {
                    window.addGameLog(`🔄 ${myName}님이 턴을 마쳤습니다.`);
                }
                window.nextTurnAction(); 
            }
        });
    };


    // ==========================================
    // 2. 페이지 로딩 완료 시 실행되는 초기화 로직
    // ==========================================
    window.onload = function() {
        const config = { 
            apiKey: "AIzaSyCgkQbHc48s68MFAy7pf2RyTSjtq0tF0bY", 
            authDomain: "lumi-b373e.firebaseapp.com", 
            databaseURL: "https://lumi-b373e-default-rtdb.firebaseio.com/", 
            projectId: "lumi-b373e" 
        };
        if (!firebase.apps.length) firebase.initializeApp(config);
        db = firebase.database();
        
        const savedTheme = localStorage.getItem('lumi-theme') || 'classic';
        window.setTheme(savedTheme);

        if (window.sessionStorage.getItem('lumi-nick')) {
            window.handleEntry(null, true);
        } else {
            document.getElementById('entry-layer').style.display = 'flex';
        }

        db.ref('settings/host').on('value', snap => { 
            currentHost = snap.val(); 
            if(typeof window.updatePlayerListUI === 'function') window.updatePlayerListUI(); 
            if (gameStatus === "waiting" && typeof window.renderLobbyUI === 'function') window.renderLobbyUI(); 
        });
        
        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            window.latestPlayersData = players;
            playerList = Object.entries(players).filter(p => p[1].joined && p[1].role === 'player').sort((a,b) => (a[1].timestamp||0) - (b[1].timestamp||0)).map(p => p[0]);
            if (playerList.length > 0) {
                let targetHost = playerList.includes("계헌") ? "계헌" : playerList[0];
                if (currentHost !== targetHost) db.ref('settings/host').set(targetHost);
            } else if (Object.keys(players).length === 0) { db.ref('settings/host').set(""); }
            if(typeof window.updatePlayerListUI === 'function') window.updatePlayerListUI();
            if (gameStatus === "waiting") window.renderLobbyUI();
        });

        db.ref('settings/status').on('value', snap => {
            gameStatus = snap.val() || "waiting";
            document.getElementById('overlay-layer').style.display = (gameStatus === "playing") ? 'none' : 'flex';
            if (gameStatus === "waiting") window.renderLobbyUI();
            else if (gameStatus === "finished") window.renderResultUI();
            if (gameStatus !== "playing" && turnTimer) { clearInterval(turnTimer); document.getElementById('timer-display').innerText = ""; }
        });

        db.ref('currentTurn').on('value', snap => {
            currentTurn = snap.val();
            const isMy = (currentTurn === myName && myRole === 'player');
            document.getElementById('game-board').classList.toggle('not-my-turn', !isMy);
            ['btn-draw', 'btn-end', 'btn-rollback'].forEach(id => {
                if(document.getElementById(id)) document.getElementById(id).disabled = !isMy;
            });
            const turnInfo = document.getElementById('turn-info');
            if(turnInfo) turnInfo.innerText = isMy ? "내 차례!" : `차례: ${currentTurn}`;
            if(isMy) { playSFX('turnAlarm'); initialBoardState = JSON.parse(JSON.stringify(boardTiles)); }
            if(typeof window.updatePlayerListUI === 'function') window.updatePlayerListUI();
            if(typeof window.updateRegScoreUI === 'function') window.updateRegScoreUI();
        });

        db.ref('settings/turnStartTime').on('value', snap => {
            const startTime = snap.val();
            const timerEl = document.getElementById('timer-display');
            if (!startTime || gameStatus !== "playing") {
                if (timerEl) timerEl.innerText = "";
                return;
            }
            if (turnTimer) clearInterval(turnTimer);
            turnTimer = setInterval(() => {
                const now = Date.now();
                const elapsed = Math.floor((now - startTime) / 1000);
                timeLeft = 60 - elapsed;
                if (timerEl) { timerEl.innerText = (timeLeft > 0 ? timeLeft : 0) + "s"; }
                if (timeLeft <= 0 && currentTurn === myName && myRole === 'player') {
                    clearInterval(turnTimer);
                    window.timeOutPenalty();
                }
            }, 1000);
        });

        db.ref('board').on('value', snap => {
            boardTiles = snap.val() || {};
            if(typeof window.updateRegScoreUI === 'function') window.updateRegScoreUI();
            const bEl = document.getElementById('game-board');
            if(!bEl) return;
            
            // 기존 선택 박스와 정보 창은 지우지 않도록 처리
            const selBox = document.getElementById('selection-box');
            const regInfo = document.getElementById('reg-info');
            bEl.innerHTML = '';
            if(regInfo) bEl.appendChild(regInfo);
            if(selBox) bEl.appendChild(selBox);

            Object.entries(boardTiles).forEach(([id, data]) => {
                if (!data || data.num === undefined) return; 
                const div = document.createElement('div');
                div.className = `tile ${data.color}`; div.id = id; div.innerText = data.num;
                div.style.left = data.x + 'px'; div.style.top = data.y + 'px';
                div.draggable = (myRole === 'player');
                div.ondragstart = (e) => {
                    if (currentTurn !== myName || myRole !== 'player') return e.preventDefault();
                    e.dataTransfer.setData("text", id); playSFX('tilePick');
                };
                bEl.appendChild(div);
            });
        });

window.rollbackTurn = function() {
    if (myRole !== 'player' || currentTurn !== myName) return;
    
    if (confirm("이번 턴에 수정한 내용을 모두 되돌릴까요?")) {
        db.ref('board').set(initialBoardState).then(() => {
            playSFX('tileDrop');
            window.addGameLog(`↩️ ${myName}님이 보드를 되돌렸습니다.`);
        });
    }
};

        db.ref('pool').on('value', snap => { 
            const poolBadge = document.getElementById('pool-badge');
            if(poolBadge) poolBadge.innerText = `POOL: ${snap.exists() ? Object.keys(snap.val()).length : 0}`; 
        });

        db.ref('chats').limitToLast(20).on('child_added', snap => {
            const c = snap.val();
            const div = document.createElement('div');
            div.style.color = c.color || "#ffffff";
            div.innerHTML = `<b>${c.name}:</b> ${c.msg}`;
            const box = document.getElementById('chat-box');
            if(box) { box.appendChild(div); box.scrollTop = box.scrollHeight; }
        });

        db.ref('logs').limitToLast(30).on('child_added', snap => {
            const log = snap.val();
            const div = document.createElement('div');
            div.id = 'log-entry';
            div.innerHTML = `<span id="log-time">[${log.time}]</span> ${log.msg}`;
            const logBox = document.getElementById('game-log');
            if(logBox) { logBox.appendChild(div); logBox.scrollTop = logBox.scrollHeight; }
        });

        db.ref('chats').on('value', snap => { if (!snap.exists()) { const box = document.getElementById('chat-box'); if (box) box.innerHTML = ''; } });
        db.ref('logs').on('value', snap => { if (!snap.exists()) { const logBox = document.getElementById('game-log'); if (logBox) logBox.innerHTML = ''; } });
        
        // 이모티콘 수신 리스너
        db.ref('emoji_events').on('child_added', snap => {
            const event = snap.val();
            // 3초 이내의 최신 이벤트만 처리
            if (Date.now() - event.time < 3000) {
                window.showEmojiOnScreen(event.name, event.msg);
            }
        });
    }; 
</script>
